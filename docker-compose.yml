# The Remnant Fortress — full stack, two-network air-gap edition.
#
# USER WORKFLOW
# -------------
#   First boot (one time, needs internet):
#       docker compose --profile bootstrap up
#       # open http://localhost:${HOST_PORT:-1582}
#       # watch the splash show download progress for the models;
#       # it auto-transitions to the game client when ready.
#
#   Subsequent boots (no internet needed):
#       docker compose up
#       # open http://localhost:${HOST_PORT:-1582}
#
#   Re-bootstrap (e.g. to update a model):
#       docker compose --profile bootstrap up
#
# ARCHITECTURE
# ------------
# Two networks isolate runtime traffic from bootstrap downloads:
#
#   bootstrap-net  — default bridge, HAS internet. Only the two
#                    bootstrap-* services attach here; they download
#                    models into shared named volumes and exit.
#   play-net       — internal: true, NO internet. All runtime
#                    services (nginx, flask-sd, ollama, diag)
#                    attach here. Zero egress once bootstrap is done.
#
# Runtime services block at startup on per-service sentinel files in
# the remnant-status volume, written by the bootstrap services. On a
# warm boot (no --profile bootstrap), the sentinels from the previous
# bootstrap run are still in the persistent remnant-status volume, so
# runtime services unblock immediately.
#
# nginx is the ONLY service published to the host. It serves the
# splash page during download and reverse-proxies /app/ to the
# game UI (web/) served by the diag sidecar once everything is ready.

services:

  # =====================================================================
  #                             RUNTIME STACK
  # =====================================================================
  # All runtime services attach only to play-net (no egress). They are
  # the default compose graph (no profile), so `docker compose up`
  # starts this set.

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: remnant-nginx
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-1582}:80"
    volumes:
      - remnant-status:/remnant-status:ro
      # Upstream proxy cache — the "nginx librarian" store. Holds every
      # byte the stack ever fetches from huggingface.co, pypi, pytorch.org,
      # ollama.com. In dev this is bind-mounted to dev-cache/nginx-cache
      # via docker-compose.dev.yml; in prod it's a plain named volume.
      - nginx-cache:/var/cache/nginx/upstream
    networks:
      # nginx is the ONLY service on both networks. play-net carries
      # client traffic from inside the stack; bootstrap-net is nginx's
      # lone egress path to the real internet for upstream caching.
      - play-net
      - bootstrap-net
    # nginx has no dependencies — it serves the splash immediately so
    # the user sees something even while bootstrap is still downloading.

  flask-sd:
    build:
      context: .
      dockerfile: docker/flask-sd/Dockerfile
    container_name: remnant-flask-sd
    restart: unless-stopped
    expose:
      - "1592"
    volumes:
      - hf-cache:/root/.cache/huggingface
      - flask-gallery:/data/gallery
      - remnant-status:/remnant-status
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=1592
      - IMAGE_GALLERY_DIR=/data/gallery
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      # Refuse to hit the network — if models aren't cached we fail
      # loudly instead of silently hanging on a dead connection.
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - STATUS_DIR=/remnant-status
      # Entrypoint polls for this sentinel before exec'ing the API.
      - WAIT_FOR_SENTINEL=/remnant-status/flask-sd-ready
      - WAIT_TIMEOUT_SECONDS=1800
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:1592/api/health'); sys.exit(0)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - play-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama:
    build:
      context: .
      dockerfile: docker/ollama/Dockerfile
    container_name: remnant-ollama
    restart: unless-stopped
    expose:
      - "1593"
    volumes:
      - ollama-data:/root/.ollama
      - remnant-status:/remnant-status
    environment:
      - OLLAMA_HOST=0.0.0.0:1593
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
      - OLLAMA_KEEP_ALIVE=-1
      - MODE=runtime
      - STATUS_DIR=/remnant-status
      - WAIT_FOR_SENTINEL=/remnant-status/ollama-ready
      - WAIT_TIMEOUT_SECONDS=1800
    networks:
      - play-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Flask-Music (MusicGen) ───────────────────────────────────────────
  # CPU-only MusicGen-small service. Generates short ambient WAV clips from
  # a mood prompt. CPU avoids VRAM conflict with Ollama. Sentinel-gated so
  # it won't try to load the model before bootstrap has downloaded it.
  flask-music:
    build:
      context: .
      dockerfile: docker/flask-music/Dockerfile
    container_name: remnant-flask-music
    restart: unless-stopped
    expose:
      - "1596"
    volumes:
      - hf-cache:/root/.cache/huggingface
      - remnant-status:/remnant-status
    environment:
      - LISTEN_PORT=1596
      - MUSICGEN_MODEL=${MUSICGEN_MODEL:-facebook/musicgen-small}
      - HF_HOME=/root/.cache/huggingface
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - STATUS_DIR=/remnant-status
      - WAIT_FOR_SENTINEL=/remnant-status/flask-music-ready
      - WAIT_TIMEOUT_SECONDS=1800
    networks:
      - play-net

  # ── TTS (Kokoro) ──────────────────────────────────────────────────────
  # High-quality neural TTS via Kokoro FastAPI. CPU-only image so it runs
  # without a GPU. Exposed to the stack via nginx /api/tts/ route.
  # Game integration (SAY channel → speech) is deferred; the service is
  # reachable now so the feature can be wired in without a stack restart.
  tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: remnant-tts
    restart: unless-stopped
    expose:
      - "8880"
    networks:
      - play-net

  # ── STT (Whisper) ──────────────────────────────────────────────────────
  # OpenAI Whisper wrapped in a REST API. Accepts audio POSTs, returns
  # transcription JSON. Exposed via nginx /api/stt/ route.
  # Game integration (mic → text input) is deferred; the service is
  # reachable now so the feature can be wired in without a stack restart.
  stt:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: remnant-stt
    restart: unless-stopped
    expose:
      - "9000"
    environment:
      - ASR_MODEL=${WHISPER_MODEL:-base.en}
    networks:
      - play-net

  # Diagnostics sidecar — tiny stdlib-only Python service. nginx
  # proxies host:1582/diagnostics/ai.json and /diagnostics/actions/*
  # to this container. Attaches ONLY to play-net (no egress); reads +
  # writes remnant-status so it can reset coordination state and
  # append to diagnostics.log.
  diag:
    build:
      context: .
      dockerfile: docker/diag/Dockerfile
    image: remnant-diag:latest
    container_name: remnant-diag
    restart: unless-stopped
    expose:
      - "1591"
    volumes:
      - remnant-status:/remnant-status
      - chroma-db:/remnant-chroma
    environment:
      - STATUS_DIR=/remnant-status
      - FLASK_SD_URL=http://flask-sd:1592
      - OLLAMA_URL=http://ollama:1593
      - OLLAMA_MODEL=qwen2.5:14b
      - FLASK_MUSIC_URL=http://flask-music:1596
      - LISTEN_PORT=1591
      - CHROMA_DB_PATH=/remnant-chroma
      - EMBED_MODEL=nomic-embed-text
    networks:
      - play-net

  # =====================================================================
  #                          BOOTSTRAP STACK
  # =====================================================================
  # These services run ONLY when `docker compose --profile bootstrap up`
  # is invoked. They have internet access via bootstrap-net, populate
  # the shared model volumes, write per-service sentinel files into
  # remnant-status, then exit with code 0. They do NOT restart.

  bootstrap-flask-sd:
    profiles: ["bootstrap"]
    build:
      context: .
      dockerfile: docker/flask-sd/Dockerfile
    container_name: remnant-bootstrap-flask-sd
    entrypoint: []
    command:
      - /bin/sh
      - -c
      - |
        set -e
        python /app/download_flask_sd.py
        touch /remnant-status/flask-sd-ready
        echo "[bootstrap-flask-sd] done, sentinel written"
    volumes:
      - hf-cache:/root/.cache/huggingface
      - remnant-status:/remnant-status
    environment:
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      - STATUS_DIR=/remnant-status
      # Route all huggingface_hub traffic through nginx. hf_hub respects
      # HF_ENDPOINT natively — snapshot_download / hf_hub_download / HfApi
      # all rewrite their base URL to this value. nginx reverse-proxies
      # to huggingface.co (and to the LFS/Xet CDNs via the redirect
      # rewrites) WITHOUT attempting to cache; caching is done by the
      # hf_hub client in its own on-disk store (hf-cache volume). This
      # keeps nginx as the single egress keyhole while letting HF's own
      # repository manager handle the protocol correctly.
      - HF_ENDPOINT=http://nginx/hf
    networks:
      # Play-net only — bootstrap-flask-sd has no direct egress. All
      # HuggingFace traffic goes through nginx on play-net, preserving
      # the "nginx is the only service that ever touches the internet"
      # invariant.
      - play-net
    restart: "no"

  bootstrap-flask-music:
    profiles: ["bootstrap"]
    build:
      context: .
      dockerfile: docker/flask-music/Dockerfile
    container_name: remnant-bootstrap-flask-music
    entrypoint: []
    command:
      - /bin/sh
      - -c
      - |
        set -e
        python /app/download_flask_music.py
        touch /remnant-status/flask-music-ready
        echo "[bootstrap-flask-music] done, sentinel written"
    volumes:
      - hf-cache:/root/.cache/huggingface
      - remnant-status:/remnant-status
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HF_ENDPOINT=http://nginx/hf
      - STATUS_DIR=/remnant-status
    networks:
      - play-net
    restart: "no"

  bootstrap-ollama:
    profiles: ["bootstrap"]
    build:
      context: .
      dockerfile: docker/ollama/Dockerfile
    container_name: remnant-bootstrap-ollama
    # Reuse the image's entrypoint.sh directly (MODE=bootstrap), then
    # write the sentinel. We clear the image ENTRYPOINT so `command:`
    # becomes the full invocation rather than args appended to
    # /entrypoint.sh.
    entrypoint: []
    environment:
      - MODE=bootstrap
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
      - STATUS_DIR=/remnant-status
    command:
      - /bin/sh
      - -c
      - |
        /entrypoint.sh
        touch /remnant-status/ollama-ready
        echo "[bootstrap-ollama] done, sentinel written"
    volumes:
      - ollama-data:/root/.ollama
      - remnant-status:/remnant-status
    networks:
      - bootstrap-net
    restart: "no"
    # ollama's own GPU isn't strictly needed for pulling models (it's
    # just a registry fetch) — commented for faster first-boot setup.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

networks:
  bootstrap-net:
    driver: bridge
  play-net:
    driver: bridge
    internal: true   # no egress — the whole point of Phase B

volumes:
  hf-cache:           # HuggingFace weights (flask-sd) — the hf_hub client's
                      # on-disk cache (~/.cache/huggingface/hub layout).
                      # Populated by bootstrap-flask-sd via huggingface_hub,
                      # which talks to nginx (HF_ENDPOINT=http://nginx/hf)
                      # as a passthrough to the real HF hostnames. Caching
                      # happens HERE, in the client's own store — not in
                      # nginx. Bind-mounted to dev-cache/hf-cache in dev.
  ollama-data:        # Ollama models (hybrid exception — bootstrap-ollama
                      # fetches these directly because ollama's registry
                      # protocol isn't proxyable through nginx).
  nginx-cache:        # nginx upstream proxy_cache — caches pypi/pytorch.org/
                      # ollama.com static CDN fetches (forward-compat for
                      # the slimming work that moves torch wheels + ollama
                      # CUDA libs to first-boot download). Empty today.
                      # Bind-mounted to dev-cache/nginx-cache in dev.
  flask-gallery:      # Generated images (LIVING world data).
  remnant-status:     # Shared status JSON + sentinels (persistent).
  chroma-db:          # ChromaDB vector index — narrator turn embeddings for
                      # semantic memory retrieval (RAG). Grows with play history.
