<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Remnant</title>
<link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #09090e;
  --surface: #111118;
  --border:  rgba(255,255,255,0.06);
  --dim:     rgba(255,255,255,0.28);
  --ink:     #cdc5b0;
  /* channel colours */
  --c-say:   rgba(200, 220, 255, 0.88);
  --c-do:    rgba(186, 104, 200, 0.90);
  --c-touch: #ba68c8;
  --c-smell: #00c853;
  --c-sound: #29b6f6;
  --c-sight: #ff8c00;
  --c-taste: #ffd600;
  --c-env:   #81d4fa;
  --c-ins:   rgba(129, 212, 250, 0.72);
  --c-player:#64b5f6;
}

html {
  zoom: 1.2; /* native 120% — matches the legible zoom users prefer */
}
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: "Iosevka", "Consolas", ui-monospace, monospace;
  font-size: 14px;
  line-height: 1.65;
  overflow: hidden;
}

/* scene-bg removed — gallery panel shows scene images; full-bleed blur is no longer needed */

/* ── Layout ── */
#app {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
  background: transparent;
}

/* ── Topbar — Star Trek console lights ── */
#topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  height: 40px;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}

.light-cluster { display: flex; gap: 7px; align-items: center; }

.light-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: default;
  position: relative;
  user-select: none;
}
.light-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  transition: background 0.5s, box-shadow 0.5s, opacity 0.5s;
}
.light-label {
  font-size: 6.5px;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.15);
  transition: color 0.5s;
}

/* States: class on .light-wrap */
/* Dormant (no state class): faintly visible so the bar reads as populated */
.light-wrap:not(.idle):not(.active):not(.busy):not(.off) .light-dot {
  background: var(--lc, rgba(255,255,255,0.18));
  opacity: 0.25;
}
.light-wrap:not(.idle):not(.active):not(.busy):not(.off) .light-label {
  color: rgba(255,255,255,0.3);
}
.light-wrap.idle   .light-dot  { background: var(--lc); opacity: 0.4;  box-shadow: 0 0 5px 1px var(--lc); }
.light-wrap.active .light-dot  { background: var(--lc); opacity: 0.85; box-shadow: 0 0 8px 2px var(--lc); }
.light-wrap.busy   .light-dot  {
  background: var(--lc); opacity: 1; box-shadow: 0 0 12px 3px var(--lc);
  animation: light-pulse 0.75s ease-in-out infinite;
}
.light-wrap.idle   .light-label,
.light-wrap.active .light-label,
.light-wrap.busy   .light-label { color: var(--lc); opacity: 0.75; }
.light-wrap.off { opacity: 0.22; }

@keyframes light-pulse {
  0%,100% { box-shadow: 0 0 7px 2px var(--lc);  opacity: 0.8; }
  50%      { box-shadow: 0 0 16px 5px var(--lc); opacity: 1.0; }
}

/* Per-light brand colors */
#light-story    { --lc: #4488ff; }
#light-image    { --lc: #cc44cc; }
#light-audio    { --lc: #ff8844; }
#light-gpu      { --lc: #ff4444; }
#light-vram     { --lc: #ff7744; }
#light-cpu      { --lc: #ffcc44; }
#light-ram      { --lc: #44bbcc; }
#light-conn     { --lc: #6fa86a; }

/* Turn counter — sits right of the light cluster, clearly readable */
.light-turn-count {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  font-variant-numeric: tabular-nums;
  color: rgba(68, 160, 255, 0.80);
  min-width: 36px;
  text-align: right;
  padding: 0 4px;
  transition: color 0.4s;
  align-self: center;
  font-family: 'Courier New', monospace;
}

#activity-label {
  flex: 1;
  text-align: center;
  font-size: 9px;
  color: var(--dim);
  font-style: italic;
  letter-spacing: 0.3px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

/* Thinking indicator */
.entry.thinking .entry-text {
  color: var(--dim);
  font-style: italic;
  letter-spacing: 2px;
}
@keyframes thinking-pulse {
  0%, 100% { opacity: 0.25; }
  50%       { opacity: 0.85; }
}
.entry.thinking { animation: thinking-pulse 1.2s ease-in-out infinite; }

/* ── Main area: feed + gallery side by side ── */
#main-area {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* Narrative feed */
#feed {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 18px 24px 12px 24px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  scrollbar-width: none;
  background: rgba(9, 9, 14, 0.82);
}
#feed::-webkit-scrollbar { display: none; }

#empty-msg {
  margin: auto;
  color: var(--dim);
  font-size: 12px;
  text-align: center;
}

/* ── Gallery panel ── */
#gallery-panel {
  width: 380px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-left: 1px solid var(--border);
  background: rgba(9, 9, 14, 0.90);
  overflow: hidden;
}

#gallery-current {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #06060a;
  min-height: 0;
}

#gallery-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity 0.4s ease;
}

#gallery-status {
  position: absolute;
  bottom: 8px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 9px;
  color: rgba(255,255,255,0.5);
  font-style: italic;
  letter-spacing: 0.4px;
  pointer-events: none;
}

/* ── NPC presence strip ── */
#npc-presence {
  display: none;
  flex-direction: row;
  gap: 8px;
  padding: 8px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
  background: rgba(6, 6, 10, 0.6);
  flex-shrink: 0;
  min-height: 72px;
  align-items: center;
}
#npc-presence::-webkit-scrollbar { display: none; }

.npc-avatar-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: default;
  flex-shrink: 0;
  position: relative;
}
.npc-avatar-img {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.12);
  opacity: 0.88;
  transition: opacity 0.2s;
}
.npc-avatar-wrap:hover .npc-avatar-img { opacity: 1; }
/* Initial-letter fallback when no portrait yet */
.npc-avatar-wrap.no-portrait::before {
  content: attr(data-initial);
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  font-size: 18px;
  color: var(--dim);
}
.npc-avatar-label {
  font-size: 8px;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  color: var(--dim);
  max-width: 50px;
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Sense enrichment lines — aligned with .entry-text column ── */
.sense-line {
  /* match indent: avatar(28px) + gap(8px) + speaker(60px) + gap(8px) = 104px */
  padding: 1px 14px 1px 104px;
  font-size: 11.5px;
  line-height: 1.55;
  font-style: italic;
}
.sense-tag {
  font-style: normal;
  font-size: 8px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-right: 7px;
  color: rgba(255,255,255,0.3);  /* fallback, overridden per channel */
}
/* Per-channel tag colours */
.sense-line[data-channel="sight"]       .sense-tag { color: var(--c-sight); }
.sense-line[data-channel="sound"]       .sense-tag { color: var(--c-sound); }
.sense-line[data-channel="smell"]       .sense-tag { color: var(--c-smell); }
.sense-line[data-channel="touch"]       .sense-tag { color: var(--c-touch); }
.sense-line[data-channel="environment"] .sense-tag { color: var(--c-env); }
.sense-line[data-channel="mood"]        .sense-tag { color: #8844ff; }
.sense-body { color: rgba(205, 218, 230, 0.68); }

/* ── Gallery thumbnails ── */
#gallery-thumbs {
  height: 72px;
  flex-shrink: 0;
  display: flex;
  gap: 4px;
  padding: 4px;
  overflow-x: auto;
  border-top: 1px solid var(--border);
  scrollbar-width: none;
}
#gallery-thumbs::-webkit-scrollbar { display: none; }

.gallery-thumb {
  height: 64px;
  width: 64px;
  flex-shrink: 0;
  object-fit: cover;
  border-radius: 3px;
  cursor: pointer;
  opacity: 0.65;
  transition: opacity 0.2s;
  border: 1px solid transparent;
}
.gallery-thumb:hover { opacity: 1; }
.gallery-thumb.active { opacity: 1; border-color: rgba(255,255,255,0.3); }

/* ── Entry rows ── */
.entry {
  display: flex;
  gap: 8px;
  align-items: baseline;
  overflow-wrap: anywhere;
  word-break: break-word;
}
.entry-avatar {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  object-fit: cover;
  opacity: 0.72;
  align-self: flex-start;
  margin-top: 1px;
  border: 1px solid rgba(255,255,255,0.06);
}
.entry-avatar.hidden { visibility: hidden; }
.entry-speaker {
  flex-shrink: 0;
  width: 60px;
  text-align: right;
  font-size: 10px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--dim);
  padding-top: 1px;
}
.entry-text { flex: 1; min-width: 0; }

/* channel colours */
.entry.say        .entry-text { color: var(--c-say); }
.entry.do         .entry-text { color: var(--c-do); font-style: italic; }
.entry.insights   .entry-text { color: var(--c-ins); font-style: italic; }
.entry.sense-touch       .entry-text { color: var(--c-touch); font-style: italic; }
.entry.sense-smell       .entry-text { color: var(--c-smell); font-style: italic; }
.entry.sense-sound       .entry-text { color: var(--c-sound); font-style: italic; }
.entry.sense-sight       .entry-text { color: var(--c-sight); font-style: italic; }
.entry.sense-taste       .entry-text { color: var(--c-taste); font-style: italic; }
.entry.sense-environment .entry-text { color: var(--c-env);   font-style: italic; }
.entry.is-player  .entry-text { color: var(--c-player); font-style: normal; }

/* NPC character dialogue — distinct speaker colour, slightly indented feel */
.entry.character-line .entry-speaker { color: rgba(255, 200, 100, 0.85); }
.entry.character-line .entry-text    { color: rgba(255, 220, 140, 0.80); font-style: italic; }

/* arrival animation */
.arriving { animation: arrive 0.22s ease-out both; }
@keyframes arrive {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: none; }
}

/* ── Input bar ── */
#bottombar {
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
}
#player-input {
  flex: 1;
  min-width: 0;
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 10px;
  font: inherit;
  font-size: 13px;
  resize: none;
  outline: none;
  line-height: 1.5;
}
#player-input::placeholder { color: var(--dim); }
#player-input:focus { border-color: rgba(255,255,255,0.18); }
#input-hint {
  flex-shrink: 0;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.3px;
  align-self: flex-end;
  padding-bottom: 8px;
  min-width: 28px;
  text-align: right;
  transition: color 0.3s;
}
#input-hint.urgent { color: rgba(196,106,90,0.8); }

/* ── VAD state — input border reflects mic activity ── */
#player-input[data-vad-state="speaking"]   { border-color: rgba(255,136,68,0.70); box-shadow: 0 0 0 2px rgba(255,136,68,0.12); }
#player-input[data-vad-state="processing"] { border-color: rgba(255,136,68,0.30); }
#player-input[data-vad-state="ready"]      { border-color: rgba(68,187,204,0.55); }

/* ── Dev / Player mode ── */
body.player-mode #topbar   { display: none; }
body.dev-mode    #topbar   { display: flex; }
body.player-mode #thinking-bar { display: flex; }
body.dev-mode    #thinking-bar { display: none; }

/* Clickable sense toggles — only interactive in dev mode */
body.dev-mode .light-wrap.toggleable { cursor: pointer; transition: opacity 0.3s; }
body.dev-mode .light-wrap.toggleable:hover { opacity: 0.85; }
body.dev-mode .light-wrap.toggleable.sense-off { opacity: 0.22; }
body.dev-mode .light-wrap.toggleable.sense-off .light-dot { animation: none !important; }

/* ── Thinking bar (player mode only) ── */
#thinking-bar {
  display: none;
  flex-shrink: 0;
  align-items: center;
  gap: 8px;
  padding: 0 14px;
  height: 40px;
  border-bottom: 1px solid var(--border);
}
#thinking-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #d4a84b;
  flex-shrink: 0;
  display: none;
}
#thinking-bar.active #thinking-dot {
  display: block;
  animation: light-pulse 1.4s ease-in-out infinite;
}
#thinking-bar.active { --lc: #d4a84b; }
#thinking-text {
  font-size: 11px;
  color: var(--dim);
  font-style: italic;
  letter-spacing: 0.3px;
}

/* ── Mood text entries (shown when muted instead of generating music) ── */
.mood-entry {
  display: flex; gap: 12px; align-items: baseline;
  opacity: 0.7;
}
.mood-label {
  flex-shrink: 0; width: 68px; text-align: right;
  font-size: 10px; letter-spacing: 0.5px; font-weight: bold;
  color: #8844ff;
}
.mood-text { flex: 1; min-width: 0; font-size: 12px; color: rgba(160,130,220,0.80); font-style: italic; }

/* ── META canon events ── */
.meta-event {
  display: flex; gap: 12px; align-items: baseline;
  color: #a07820; font-style: italic; opacity: 0.82;
}
.meta-label {
  flex-shrink: 0; width: 68px; text-align: right;
  font-size: 10px; letter-spacing: 0.5px; font-weight: bold;
  font-style: normal; color: #b8960c;
}
.meta-text { flex: 1; min-width: 0; font-size: 12px; }
.meta-btn {
  background: none; border: 1px solid #b8960c; color: #b8960c;
  border-radius: 3px; padding: 1px 6px; cursor: pointer;
  font: inherit; font-size: 11px; margin: 0 2px;
}
.meta-btn:hover { background: rgba(184,150,12,0.15); }
.meta-btn:disabled { opacity: 0.4; cursor: default; }

/* CSS-only tooltips via data-tip */
[data-tip] { position: relative; }
[data-tip]:hover::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: #1a1a24;
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--ink);
  font-size: 10px;
  padding: 4px 8px;
  border-radius: 4px;
  white-space: nowrap;
  z-index: 200;
  pointer-events: none;
  font-style: normal;
  letter-spacing: 0;
  text-transform: none;
}
</style>
</head>
<body>
<div id="app">

  <!-- ── Topbar: console lights ── -->
  <div id="topbar">
    <div id="activity-label"></div>

    <div class="light-cluster" id="all-lights">
      <div class="light-wrap" id="light-story" data-tip="Story — Ollama, SillyTavern, all text processing">
        <div class="light-dot"></div><span class="light-label">story</span></div>
      <div class="light-wrap toggleable" id="light-image" data-tip="Image — Stable Diffusion scenes &amp; portraits · click to toggle">
        <div class="light-dot"></div><span class="light-label">image</span></div>
      <div class="light-wrap toggleable" id="light-audio" data-tip="Audio — MusicGen, TTS, STT · click to toggle">
        <div class="light-dot"></div><span class="light-label">audio</span></div>
      <div class="light-wrap" id="light-gpu"  data-tip="GPU utilisation">
        <div class="light-dot"></div><span class="light-label">gpu</span></div>
      <div class="light-wrap" id="light-vram" data-tip="VRAM usage">
        <div class="light-dot"></div><span class="light-label">vram</span></div>
      <div class="light-wrap" id="light-cpu"  data-tip="CPU utilisation">
        <div class="light-dot"></div><span class="light-label">cpu</span></div>
      <div class="light-wrap" id="light-ram"  data-tip="System RAM">
        <div class="light-dot"></div><span class="light-label">ram</span></div>
      <div class="light-wrap" id="light-conn" data-tip="SSE connection">
        <div class="light-dot"></div><span class="light-label">conn</span></div>
      <span class="light-turn-count" id="narrator-turn-count" title="narrator turns this session">T0</span>
    </div>
  </div>

  <!-- ── Thinking bar (player mode only — replaces star trek panel) ── -->
  <div id="thinking-bar">
    <span id="thinking-dot"></span>
    <span id="thinking-text"></span>
  </div>

  <!-- ── Main area: narrative feed + image gallery ── -->
  <div id="main-area">
    <div id="feed">
      <div id="empty-msg">Waiting for The Fortress…</div>
    </div>

    <div id="gallery-panel">
      <div id="gallery-current">
        <img id="gallery-img" src="/game/assets/fortress-interior.jpg" alt="Current scene">
        <div id="gallery-status"></div>
      </div>
      <div id="npc-presence"></div>
      <div id="gallery-thumbs"></div>
    </div>
  </div>

  <!-- ── Input bar ── -->
  <div id="bottombar">
    <textarea id="player-input" rows="2" placeholder="Speak, act, or perceive…"></textarea>
    <span id="input-hint"></span>
  </div>
</div>

<script>
const feed     = document.getElementById('feed');
const emptyMsg = document.getElementById('empty-msg');
let _lastLocation = '';
let _thinkTimer   = null;
const _pendingPlayerTexts = new Set();

// Speaker portrait map — defaults from static assets, updated by SSE meta portrait events.
// '__player__' is the player's avatar (SVG inline, no file needed).
const _PLAYER_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='8' r='4' fill='%2364b5f6' opacity='0.75'/%3E%3Cpath d='M4 21v-1a8 8 0 0 1 16 0v1' fill='%2364b5f6' opacity='0.5'/%3E%3C/svg%3E";

const _portraitMap = {
  'Narrator':     '/game/assets/the-remnant-portrait.png',
  'The Fortress': '/game/assets/fortress-interior.jpg',
  'The Remnant':  '/game/assets/the-remnant-portrait.png',
  '__player__':   _PLAYER_AVATAR,
};

// Current player name — set by player_alias / player_switch meta events.
let _playerName = 'You';

// Track last rendered speaker to suppress repeated avatar/label.
let _lastSpeaker = '';

// NPC presence map — name → {name, description, portraitUrl}
// Populated by INTRODUCE markers; cleared on location change.
const _presentNPCs = new Map();

// ── Console light helpers ──
function _setLight(id, state, tipSuffix) {
  const el = document.getElementById('light-' + id);
  if (!el) return;
  el.className = 'light-wrap ' + state;
  if (tipSuffix !== undefined) {
    const base = (el.dataset.tip || '').split(' ·')[0].trim();
    el.dataset.tip = base + (tipSuffix ? ' · ' + tipSuffix : '');
  }
}

function _setResourceLight(id, pct, tipSuffix) {
  if (pct == null) return;
  const state = pct < 5 ? 'idle' : pct >= 85 ? 'busy' : 'active';
  _setLight(id, state, tipSuffix);
}

// Pre-wrap text locally so optimistic render matches SSE echo.
function _localWrap(text) {
  const t = text.trim();
  if (t.startsWith('"'))  return { channel: 'say', wrapped: t.endsWith('"') ? t : t + '"' };
  if (t.startsWith("'"))  return { channel: 'say', wrapped: t };
  if (t.startsWith('*'))  return { channel: 'do',  wrapped: t.endsWith('*') ? t : t + '*' };
  if (t.startsWith('['))  return { channel: 'sense', wrapped: t };
  return { channel: 'do', wrapped: '*' + t + '*' };
}

function esc(s) {
  return String(s).replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

// ── NPC presence ──
const _introduceRe = /\[INTRODUCE\(([^)]+)\)\s*:\s*"?([^"\]\n]+)"?\]/gi;

function _renderNpcPresence() {
  const el = document.getElementById('npc-presence');
  if (!el) return;
  el.innerHTML = '';
  if (_presentNPCs.size === 0) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  for (const npc of _presentNPCs.values()) {
    const wrap = document.createElement('div');
    wrap.className = 'npc-avatar-wrap';
    wrap.dataset.tip = npc.description || npc.name;
    if (npc.portraitUrl) {
      const img = document.createElement('img');
      img.className = 'npc-avatar-img';
      img.src = npc.portraitUrl;
      img.alt = npc.name;
      wrap.appendChild(img);
    } else {
      wrap.classList.add('no-portrait');
      wrap.dataset.initial = (npc.name[0] || '?').toUpperCase();
    }
    const label = document.createElement('span');
    label.className = 'npc-avatar-label';
    label.textContent = npc.name.split(' ')[0];
    wrap.appendChild(label);
    el.appendChild(wrap);
  }
}

function _extractIntroductions(rawText) {
  if (!rawText) return;
  _introduceRe.lastIndex = 0;
  let m;
  let changed = false;
  while ((m = _introduceRe.exec(rawText)) !== null) {
    const name = m[1].trim();
    const desc = m[2].trim();
    if (!_presentNPCs.has(name)) {
      _presentNPCs.set(name, {
        name,
        description: desc,
        portraitUrl: _portraitMap[name] || '',
      });
      changed = true;
    }
  }
  if (changed) _renderNpcPresence();
}

function _removeThinking() {
  const el = document.getElementById('thinking-indicator');
  if (el) el.remove();
  if (_thinkTimer) { clearTimeout(_thinkTimer); _thinkTimer = null; }
  _setLight('story', 'idle');
  _setThinking(false);
}

function renderTurn(turn, instant) {
  const blocks = turn.parsed_blocks || [];
  let added = 0;
  const isNarratorTurn = blocks.some(b => !b.isPlayer);

  if (isNarratorTurn && !instant) _removeThinking();

  if (isNarratorTurn) {
    const loc = (turn.context || {}).location || '';
    if (loc && loc !== _lastLocation) {
      _lastLocation = loc;
      _lastSpeaker = ''; // reset so first speaker after location break shows avatar
      // Location changed — clear NPCs (they haven't followed unless re-introduced)
      _presentNPCs.clear();
      _renderNpcPresence();
      const locEl = document.createElement('div');
      locEl.className = 'meta-event' + (instant ? '' : ' arriving');
      locEl.innerHTML =
        '<span class="meta-label">LOCATION</span>' +
        '<span class="meta-text">' + esc(loc) + '</span>';
      feed.appendChild(locEl);
      added++;
    }
    // Extract NPC introductions from raw text
    _extractIntroductions(turn.raw_text || '');
  }

  for (const b of blocks) {
    const text = (b.text || '').trim();
    if (!text) continue;
    if (/^\[[A-Z_]/.test(text) && !b.isPlayer) continue;

    const div = document.createElement('div');
    div.className = 'entry';

    if (b.senseType) {
      div.classList.add('sense-' + b.senseType.toLowerCase());
    } else if (b.channel) {
      div.classList.add(b.channel);
    }
    if (b.isPlayer) div.classList.add('is-player');
    if (!instant) div.classList.add('arriving');

    const isCharacter = b.channel === 'character';
    if (isCharacter) div.classList.add('character-line');
    const speaker = b.isPlayer
      ? (_playerName || 'You')
      : (isCharacter ? (b.speaker || 'NPC') : (turn.narrator_name || 'The Fortress'));
    const avatarUrl = b.isPlayer ? (_portraitMap['__player__'] || _PLAYER_AVATAR) : (_portraitMap[speaker] || '');
    const speakerChanged = speaker !== _lastSpeaker;
    _lastSpeaker = speaker;
    div.innerHTML =
      '<img class="entry-avatar' + (!speakerChanged || !avatarUrl ? ' hidden' : '') + '" src="' +
      (avatarUrl ? esc(avatarUrl) : '') + '" alt="">' +
      '<span class="entry-speaker"' + (!speakerChanged ? ' style="visibility:hidden"' : '') + '>' + esc(speaker) + '</span>' +
      '<span class="entry-text">' + esc(text) + '</span>';

    feed.appendChild(div);
    added++;
  }

  if (added) {
    emptyMsg.style.display = 'none';
    feed.scrollTop = feed.scrollHeight;
  }

  // Speak narrator text for new (non-history) turns
  if (!instant && isNarratorTurn && _sense.audio) {
    const ttsText = blocks
      .filter(b => !b.isPlayer && !b.senseType)
      .map(b => (b.text || '').trim())
      .filter(Boolean)
      .join(' ');
    if (ttsText) _speakTTS(ttsText);
  }
}

function renderMetaEvent(data) {
  const el = document.createElement('div');
  el.className = 'meta-event';
  if (!data.type) return;

  if (data.type === 'portrait' && data.name && data.url) {
    _portraitMap[data.name] = data.url;
    if (_presentNPCs.has(data.name)) {
      _presentNPCs.get(data.name).portraitUrl = data.url;
      _renderNpcPresence();
    }
  }

  if ((data.type === 'player_alias' || data.type === 'player_switch' || data.type === 'player_restore') && data.name) {
    _playerName = data.name;
    _lastSpeaker = ''; // force avatar to show on next player turn
  }

  if (data.type === 'player_portrait' && data.url) {
    // Sherri finished outfitting — replace SVG placeholder with real SD portrait
    _portraitMap['__player__'] = data.url;
    _lastSpeaker = ''; // force re-render with new avatar on next player turn
  }

  const label = data.type === 'reset'           ? 'RESET:' + (data.level || 'scene').toUpperCase()
              : data.type === 'portrait'         ? 'PORTRAIT'
              : data.type === 'portrait_saved'   ? 'FOREVER'
              : data.type === 'player_alias'     ? 'ALIAS'
              : data.type === 'player_switch'    ? 'NEW PLAYER'
              : data.type === 'player_restore'   ? 'RESTORED'
              : data.type === 'player_dressed'   ? 'DRESSED'
              : data.type === 'player_portrait'  ? 'AVATAR'
              :                                    'FOREVER';
  const text = data.name || data.text || (data.url ? data.url.split('/').pop() : '');
  el.innerHTML =
    '<span class="meta-label">' + esc(label) + '</span>' +
    '<span class="meta-text">' + esc(text) + '</span>';
  feed.appendChild(el);
  emptyMsg.style.display = 'none';
  feed.scrollTop = feed.scrollHeight;
}

// ── Topbar polling ──
async function _pollServiceStatus() {
  try {
    const res = await fetch('/ai.json');
    if (!res.ok) return;
    const data = await res.json();
    const svcs = data.services || {};
    const ollamaModel = (data.environment || {}).OLLAMA_MODEL || 'llm';

    const _svcState = (svc) => {
      const probe = (svcs[svc] || {}).probe || {};
      const sf    = (svcs[svc] || {}).status_file || {};
      const phase = sf.phase || (probe.reachable ? 'ready' : 'down');
      return { phase, probe, reachable: probe.reachable, lat: probe.latency_ms };
    };

    const ollama = _svcState('ollama');
    const st     = _svcState('sillytavern');
    const sd     = _svcState('flask-sd');

    // story = any text processing service reachable (Ollama, SillyTavern)
    _setLight('story', ollama.reachable ? 'idle' : 'off',
              `Story · ${ollamaModel} · ${ollama.phase}` + (ollama.lat ? ` · ${Math.round(ollama.lat)}ms` : ''));
    _setLight('image', sd.reachable ? 'idle' : 'off',
              `Image · SD · ${sd.phase}` + (sd.lat ? ` · ${Math.round(sd.lat)}ms` : ''));
    // audio = tts + stt + music consolidated
    const music = _svcState('flask-music');
    const audioUp = svcs['tts'] || svcs['stt'] || music.reachable;
    const audioTip = [
      svcs['tts']      ? 'TTS'           : null,
      svcs['stt']      ? 'STT'           : null,
      music.reachable  ? 'MusicGen'      : null,
    ].filter(Boolean).join(', ') || 'none';
    _setLight('audio', audioUp ? 'idle' : 'off', `Audio · ${audioTip}`);
  } catch(_) {}
}

async function _pollSystemMetrics() {
  try {
    const res = await fetch('/system-metrics');
    if (!res.ok) return;
    const d = await res.json();
    if (d.gpu)  _setResourceLight('gpu',  d.gpu.util_pct,
                  `${d.gpu.name} · ${d.gpu.util_pct}%`);
    if (d.gpu)  _setResourceLight('vram', Math.round(d.gpu.vram_used_mb * 100 / d.gpu.vram_total_mb),
                  `${(d.gpu.vram_used_mb/1024).toFixed(1)}G / ${Math.round(d.gpu.vram_total_mb/1024)}G`);
    if (d.cpu)  _setResourceLight('cpu',  d.cpu.pct, `${d.cpu.pct}%`);
    if (d.ram)  _setResourceLight('ram',  d.ram.pct, `${(d.ram.used_mb/1024).toFixed(1)}G`);
  } catch(_) {}
}

// ── SSE connection ──
function connect() {
  const es = new EventSource('/game/events');

  // Narrator turn counter — counts non-player turns received this session.
  let _narratorTurnCount = 0;
  function _updateNarratorCount() {
    const el = document.getElementById('narrator-turn-count');
    if (el) el.textContent = `T${_narratorTurnCount}`;
  }

  es.addEventListener('history', e => {
    try {
      const turns = JSON.parse(e.data);
      for (const t of turns) {
        renderTurn(t, true);
        if (!(t.parsed_blocks || []).some(b => b.isPlayer)) _narratorTurnCount++;
      }
      _updateNarratorCount();
      feed.scrollTop = feed.scrollHeight;
    } catch (_) {}
  });

  es.addEventListener('turn', e => {
    try {
      const turn = JSON.parse(e.data);
      const isPlayerTurn = (turn.parsed_blocks || []).some(b => b.isPlayer);
      if (isPlayerTurn) {
        const rawText = (turn.raw_text || '').trim();
        for (const pending of _pendingPlayerTexts) {
          if (rawText === pending || rawText.includes(pending) || pending.includes(rawText)) {
            _pendingPlayerTexts.delete(pending);
            return;
          }
        }
      } else {
        _narratorTurnCount++;
        _updateNarratorCount();
      }
      renderTurn(turn, false);
    } catch (_) {}
  });

  es.addEventListener('meta', e => {
    try { renderMetaEvent(JSON.parse(e.data)); } catch (_) {}
  });

  es.addEventListener('scene_image', e => {
    try {
      const data = JSON.parse(e.data);
      if (data.image && _sense.image) {
        _setGalleryImage(data.image, data.kind, data.description);
        galleryStatus.textContent = '';
      }
    } catch (_) {}
  });

  es.addEventListener('scene_caption', e => {
    try {
      const data = JSON.parse(e.data);
      if (data.caption && _galleryHistory.length) {
        _galleryHistory[0].description = data.caption;
        const thumbs = galleryThumbs.querySelectorAll('.gallery-thumb');
        if (thumbs.length) thumbs[0].title = data.caption;
        if (galleryImg.src === _galleryHistory[0].dataUrl) galleryImg.title = data.caption;
      }
    } catch (_) {}
  });

  es.addEventListener('activity', e => {
    try {
      const data = JSON.parse(e.data);
      const text = data.text || '';
      document.getElementById('activity-label').textContent = text;
      const lc = text.toLowerCase();
      if (lc.includes('image') || lc.includes('render') || lc.includes('scene') ||
          lc.includes('portrait') || lc.includes('sketch') || lc.includes('paint') || lc.includes('repaint')) {
        _setLight('image', text ? 'busy' : 'idle');
        galleryStatus.textContent = text || '';
      } else if (lc.includes('thinking') || lc.includes('narrator') || lc.includes('continuing') ||
                 lc.includes('music') || lc.includes('mood') || lc.includes('tts') || lc.includes('speech')) {
        _setLight('story', text ? 'busy' : 'idle');
        if (lc.includes('music') || lc.includes('mood') || lc.includes('tts') || lc.includes('speech')) {
          _setLight('audio', text ? 'busy' : 'idle');
        }
      }
      if (!text) {
        _setLight('image', 'idle');
        _setLight('story', 'idle');
        _setLight('audio', 'idle');
        galleryStatus.textContent = '';
      }
    } catch (_) {}
  });

  es.addEventListener('sense', e => {
    try {
      const data = JSON.parse(e.data);
      if (!data.channel || !data.text) return;
      const div = document.createElement('div');
      div.className = 'sense-line';
      div.dataset.channel = data.channel.toLowerCase();
      div.innerHTML = `<span class="sense-tag">[${data.channel.toUpperCase()}]</span> <span class="sense-body">${data.text}</span>`;
      feed.appendChild(div);
      feed.scrollTop = feed.scrollHeight;
    } catch (_) {}
  });

  es.addEventListener('mood', e => {
    try {
      const data = JSON.parse(e.data);
      if (data.text) _onMoodEvent(data.text);
    } catch (_) {}
  });

  es.onopen = () => {
    _setLight('conn', 'active');
    loadLatestSceneImage();
    _pollServiceStatus();
    _pollSystemMetrics();
  };

  es.onerror = () => {
    _setLight('conn', 'busy');
    es.close();
    setTimeout(connect, 3000);
  };
}

// ── TTS engine ──
let _ttsSource = null;
let _ttsAbort  = null;

async function _speakTTS(text) {
  // Cancel any in-flight TTS request and stop any playing speech
  if (_ttsAbort) { _ttsAbort.abort(); _ttsAbort = null; }
  if (_ttsSource) { try { _ttsSource.stop(); } catch (_) {} _ttsSource = null; }
  if (!_sense.audio) return;

  const ctrl = new AbortController();
  _ttsAbort = ctrl;
  _setLight('audio', 'busy');
  try {
    const res = await fetch('/api/tts/v1/audio/speech', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({model: 'kokoro', input: text, voice: 'am_michael'}),
      signal: ctrl.signal,
    });
    if (!res.ok) { _setLight('audio', 'idle'); return; }
    const buf = await res.arrayBuffer();
    const ctx = _ensureAudioCtx();
    const audio = await ctx.decodeAudioData(buf);
    const src = ctx.createBufferSource();
    src.buffer = audio;
    src.connect(ctx.destination);
    src.onended = () => { _ttsSource = null; _ttsAbort = null; _setLight('audio', 'idle'); };
    _ttsSource = src;
    src.start();
  } catch (e) {
    if (e.name !== 'AbortError') console.warn('[tts]', e);
    _setLight('audio', 'idle');
  }
}

// ── Music engine (Web Audio API) ──
let _audioCtx = null;
let _musicSource = null;
let _musicGain = null;

function _ensureAudioCtx() {
  if (!_audioCtx) _audioCtx = new AudioContext();
  // Resume if suspended (browsers auto-suspend idle contexts)
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

async function _playMusicBuffer(audioBuffer) {
  const ctx = _ensureAudioCtx();
  const newGain = ctx.createGain();
  newGain.gain.setValueAtTime(0, ctx.currentTime);
  newGain.gain.linearRampToValueAtTime(0.55, ctx.currentTime + 4);
  newGain.connect(ctx.destination);
  const src = ctx.createBufferSource();
  src.buffer = audioBuffer;
  src.loop = true;
  src.connect(newGain);
  src.start();
  // Fade out and stop old track
  if (_musicGain) {
    _musicGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 4);
    const old = _musicSource;
    setTimeout(() => { try { old.stop(); } catch (_) {} }, 5000);
  }
  _musicSource = src;
  _musicGain = newGain;
}


function _renderMoodAsText(moodText) {
  const el = document.createElement('div');
  el.className = 'mood-entry arriving';
  el.innerHTML =
    '<span class="mood-label">MOOD</span>' +
    '<span class="mood-text">' + esc(moodText) + '</span>';
  feed.appendChild(el);
  emptyMsg.style.display = 'none';
  feed.scrollTop = feed.scrollHeight;
}

async function _onMoodEvent(moodText) {
  if (!_sense.audio) {
    _renderMoodAsText(moodText);
    return;
  }
  _setLight('audio', 'busy');
  try {
    const res = await fetch('/api/music/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt: moodText, duration: 30}),
    });
    if (!res.ok) throw new Error(`music gen ${res.status}`);
    const data = await res.json();
    if (!data.audio) throw new Error('no audio in response');
    const bytes = Uint8Array.from(atob(data.audio), c => c.charCodeAt(0));
    const ctx = _ensureAudioCtx();
    const audioBuffer = await ctx.decodeAudioData(bytes.buffer.slice(0));
    await _playMusicBuffer(audioBuffer);
    _setLight('audio', 'idle');
  } catch (e) {
    console.warn('[music]', e);
    _setLight('audio', 'off');
  }
}

// ── Player input ──
const inputEl = document.getElementById('player-input');
const hintEl  = document.getElementById('input-hint');

const AUTO_SEND_MS = 5000;
let _autoTimer = null;
let _countdown = 0;
let _tickTimer = null;
let _sending   = false;

function _clearTimers() {
  clearTimeout(_autoTimer);
  clearInterval(_tickTimer);
  _autoTimer = _tickTimer = null;
  hintEl.textContent = '';
  hintEl.classList.remove('urgent');
}

function _startCountdown(delayMs = AUTO_SEND_MS) {
  _clearTimers();
  if (!inputEl.value.trim()) return;
  _countdown = Math.round(delayMs / 1000);
  hintEl.textContent = _countdown + 's';
  _tickTimer = setInterval(() => {
    _countdown--;
    hintEl.textContent = _countdown > 0 ? _countdown + 's' : '';
    if (_countdown <= 3) hintEl.classList.add('urgent');
  }, 1000);
  _autoTimer = setTimeout(() => {
    const text = inputEl.value.trim();
    if (text) sendInput(text + '…');
  }, delayMs);
}

async function sendInput(overrideText) {
  if (_sending) return;
  const text = overrideText || inputEl.value.trim();
  if (!text) return;
  _sending = true;
  _clearTimers();
  inputEl.value = '';

  const { channel, wrapped } = _localWrap(text);
  const optimEl = document.createElement('div');
  optimEl.className = 'entry ' + channel + ' is-player arriving';
  optimEl.innerHTML =
    '<img class="entry-avatar hidden" alt="">' +
    '<span class="entry-speaker">You</span>' +
    '<span class="entry-text">' + esc(wrapped) + '</span>';
  feed.appendChild(optimEl);
  emptyMsg.style.display = 'none';
  feed.scrollTop = feed.scrollHeight;
  _pendingPlayerTexts.add(wrapped);

  try {
    const res = await fetch('/player-input', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text}),
    });
    const data = res.ok ? await res.json() : {};

    if (data.meta) {
      optimEl.remove();
      _pendingPlayerTexts.delete(wrapped);
    } else {
      if (data.wrapped && data.wrapped !== wrapped) {
        const ch = (data.intent || channel).toLowerCase();
        optimEl.className = 'entry ' + ch + ' is-player';
        optimEl.querySelector('.entry-text').textContent = data.wrapped;
        _pendingPlayerTexts.delete(wrapped);
        _pendingPlayerTexts.add(data.wrapped);
      }
      _removeThinking();
      const thinkEl = document.createElement('div');
      thinkEl.id = 'thinking-indicator';
      thinkEl.className = 'entry say thinking arriving';
      thinkEl.innerHTML =
        '<span class="entry-speaker">The Fortress</span>' +
        '<span class="entry-text">· · ·</span>';
      feed.appendChild(thinkEl);
      feed.scrollTop = feed.scrollHeight;
      _thinkTimer = setTimeout(_removeThinking, 90000);
      _setLight('story', 'busy');  // story light pulses while thinking
      _setThinking(true);          // player-mode thinking bar
    }
  } catch (_) {}
  _sending = false;
  inputEl.focus();
}

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendInput(); }
});
inputEl.addEventListener('input', () => {
  if (inputEl.value.trim()) _startCountdown(); else _clearTimers();
});

// ── Always-on VAD (Voice Activity Detection) ──
const _DEFAULT_PLACEHOLDER = 'Speak, act, or perceive…';

function _sttMime() {
  const candidates = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
  return candidates.find(t => { try { return MediaRecorder.isTypeSupported(t); } catch(_){return false;} }) || '';
}

const VAD_THRESHOLD  = 0.015;  // RMS energy to count as speech
const VAD_ONSET_MS   = 120;    // speech must persist this long before we start recording
const VAD_SILENCE_MS = 1400;   // silence after speech before we stop and transcribe

let _vadStream      = null;
let _vadAnalyser    = null;
let _vadRecorder    = null;
let _vadChunks      = [];
let _vadSpeaking    = false;
let _vadSpeechStart = null;
let _vadSilStart    = null;
let _vadBuf         = null;

function _vadRMS() {
  _vadAnalyser.getFloatTimeDomainData(_vadBuf);
  let s = 0;
  for (let v of _vadBuf) s += v * v;
  return Math.sqrt(s / _vadBuf.length);
}

function _vadTick() {
  if (!_vadAnalyser) return;
  requestAnimationFrame(_vadTick);

  // Don't capture while TTS is speaking (prevents echo)
  if (_ttsSource) { _vadSpeaking = false; _vadSpeechStart = null; _vadSilStart = null; return; }
  // Don't overwrite if user is actively typing
  if (document.activeElement === inputEl && inputEl.value.trim()) return;

  const rms  = _vadRMS();
  const loud = rms > VAD_THRESHOLD;
  const now  = Date.now();

  if (loud) {
    _vadSilStart = null;
    if (!_vadSpeaking) {
      if (!_vadSpeechStart) { _vadSpeechStart = now; }
      else if (now - _vadSpeechStart >= VAD_ONSET_MS) { _vadBeginRecord(); }
    }
  } else {
    _vadSpeechStart = null;
    if (_vadSpeaking) {
      if (!_vadSilStart) { _vadSilStart = now; }
      else if (now - _vadSilStart >= VAD_SILENCE_MS) { _vadEndRecord(); }
    }
  }
}

function _vadBeginRecord() {
  if (_vadSpeaking) return;
  _vadSpeaking = true;
  _vadChunks   = [];
  const mime   = _sttMime();
  _vadRecorder = new MediaRecorder(_vadStream, mime ? {mimeType: mime} : {});
  _vadRecorder.ondataavailable = e => { if (e.data.size > 0) _vadChunks.push(e.data); };
  _vadRecorder.onstop = _vadProcess;
  _vadRecorder.start();
  inputEl.dataset.vadState = 'speaking';
  inputEl.placeholder = 'Listening…';
}

function _vadEndRecord() {
  _vadSpeaking = false;
  _vadSilStart = null;
  if (_vadRecorder && _vadRecorder.state === 'recording') _vadRecorder.stop();
  inputEl.dataset.vadState = 'processing';
  inputEl.placeholder = 'Transcribing…';
}

async function _vadProcess() {
  if (!_vadChunks.length) {
    inputEl.dataset.vadState = '';
    inputEl.placeholder = _DEFAULT_PLACEHOLDER;
    return;
  }
  const mime = (_vadRecorder && _vadRecorder.mimeType) || 'audio/webm';
  const ext  = mime.includes('ogg') ? 'ogg' : mime.includes('mp4') ? 'mp4' : 'webm';
  const blob = new Blob(_vadChunks, {type: mime});
  const form = new FormData();
  form.append('file', new File([blob], `rec.${ext}`, {type: mime}));
  form.append('model', 'whisper-1');
  form.append('response_format', 'json');
  try {
    const res  = await fetch('/api/stt/v1/audio/transcriptions', {method: 'POST', body: form});
    if (!res.ok) throw new Error(`STT ${res.status}`);
    const data = await res.json();
    const text = (data.text || '').trim();
    if (text) {
      inputEl.value = text;
      inputEl.dataset.vadState = 'ready';
      _startCountdown(2500);
    } else {
      inputEl.dataset.vadState = '';
    }
  } catch (err) {
    console.warn('[vad]', err);
    inputEl.dataset.vadState = '';
  } finally {
    inputEl.placeholder = _DEFAULT_PLACEHOLDER;
  }
}

async function _initVAD() {
  try {
    _vadStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000 },
    });
  } catch (e) {
    console.warn('[vad] mic unavailable:', e.message);
    return;
  }
  const ctx     = _ensureAudioCtx();
  const src     = ctx.createMediaStreamSource(_vadStream);
  _vadAnalyser  = ctx.createAnalyser();
  _vadAnalyser.fftSize = 256;
  _vadBuf       = new Float32Array(_vadAnalyser.fftSize);
  src.connect(_vadAnalyser);
  requestAnimationFrame(_vadTick);
  console.log('[vad] always-on listening active');
}

// ── Initialise on load ──
_setDevMode(_devMode);
_initLightToggles();
_initVAD();
</script>
</body>
</html>
