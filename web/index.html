<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Remnant</title>
<link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #09090e;
  --surface: #111118;
  --border:  rgba(255,255,255,0.06);
  --dim:     rgba(255,255,255,0.28);
  --ink:     #cdc5b0;
  /* channel colours */
  --c-say:   rgba(200, 220, 255, 0.88);
  --c-do:    rgba(186, 104, 200, 0.90);
  --c-touch: #ba68c8;
  --c-smell: #00c853;
  --c-sound: #29b6f6;
  --c-sight: #ff8c00;
  --c-taste: #ffd600;
  --c-env:   #81d4fa;
  --c-ins:   rgba(129, 212, 250, 0.72);
  --c-player:#64b5f6;
}

html {
  zoom: 1.2; /* native 120% — matches the legible zoom users prefer */
}
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: "Iosevka", "Consolas", ui-monospace, monospace;
  font-size: 14px;
  line-height: 1.65;
  overflow: hidden;
}

/* scene-bg removed — gallery panel shows scene images; full-bleed blur is no longer needed */

/* ── Layout ── */
#app {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
  background: transparent;
}

/* ── Status bar — single bar, two faces ── */
#status-bar {
  flex-shrink: 0;
  position: relative;
  height: 40px;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}

/* ── Simple face: big amber status text, left-justified, click to flip ── */
#status-simple {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  cursor: pointer;
  transition: opacity 0.25s;
}
#status-simple:hover { background: rgba(212,168,75,0.03); }

#status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
  transition: background 0.4s, box-shadow 0.4s;
  background: rgba(212,168,75,0.18);
}
#status-dot.pulsing {
  animation: light-pulse 1.2s ease-in-out infinite;
}
#status-text {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: rgba(212,168,75,0.35);   /* Fortress amber, dim when idle */
  transition: color 0.4s;
  white-space: nowrap;
}
#status-text.active {
  color: #d4a84b;   /* full amber when anything is happening */
  text-shadow: 0 0 18px rgba(212,168,75,0.4);
}

/* ── Dev face: star trek lights + hide button ── */
#status-dev {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 8px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}

/* Flip state */
#status-bar.dev-open #status-simple { opacity: 0; pointer-events: none; }
#status-bar.dev-open #status-dev    { opacity: 1; pointer-events: all; }

/* "hide the madness" button */
#hide-dev-btn {
  margin-left: auto;
  flex-shrink: 0;
  background: none;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 3px;
  color: rgba(255,255,255,0.20);
  cursor: pointer;
  font: inherit;
  font-size: 8px;
  letter-spacing: 0.6px;
  padding: 3px 8px;
  transition: color 0.2s, border-color 0.2s;
}
#hide-dev-btn:hover { color: var(--dim); border-color: rgba(255,255,255,0.15); }

.light-cluster { display: flex; gap: 7px; align-items: center; }

.light-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: default;
  position: relative;
  user-select: none;
}
.light-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  transition: background 0.5s, box-shadow 0.5s, opacity 0.5s;
}
.light-label {
  font-size: 6.5px;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.15);
  transition: color 0.5s;
}

/* States: class on .light-wrap */
/* Dormant (no state class): faintly visible so the bar reads as populated */
.light-wrap:not(.idle):not(.active):not(.busy):not(.off) .light-dot {
  background: var(--lc, rgba(255,255,255,0.18));
  opacity: 0.25;
}
.light-wrap:not(.idle):not(.active):not(.busy):not(.off) .light-label {
  color: rgba(255,255,255,0.3);
}
.light-wrap.idle   .light-dot  { background: var(--lc); opacity: 0.4;  box-shadow: 0 0 5px 1px var(--lc); }
.light-wrap.active .light-dot  { background: var(--lc); opacity: 0.85; box-shadow: 0 0 8px 2px var(--lc); }
.light-wrap.busy   .light-dot  {
  background: var(--lc); opacity: 1; box-shadow: 0 0 12px 3px var(--lc);
  animation: light-pulse 0.75s ease-in-out infinite;
}
.light-wrap.idle   .light-label,
.light-wrap.active .light-label,
.light-wrap.busy   .light-label { color: var(--lc); opacity: 0.75; }
.light-wrap.off { opacity: 0.22; }

@keyframes light-pulse {
  0%,100% { box-shadow: 0 0 7px 2px var(--lc);  opacity: 0.8; }
  50%      { box-shadow: 0 0 16px 5px var(--lc); opacity: 1.0; }
}

/* Per-light brand colors */
#light-story    { --lc: #4488ff; }
#light-image    { --lc: #cc44cc; }
#light-audio    { --lc: #ff8844; }
#light-gpu      { --lc: #ff4444; }
#light-vram     { --lc: #ff7744; }
#light-cpu      { --lc: #ffcc44; }
#light-ram      { --lc: #44bbcc; }
#light-conn     { --lc: #6fa86a; }

/* Turn counter — sits right of the light cluster, clearly readable */
.light-turn-count {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  font-variant-numeric: tabular-nums;
  color: rgba(68, 160, 255, 0.80);
  min-width: 36px;
  text-align: right;
  padding: 0 4px;
  transition: color 0.4s;
  align-self: center;
  font-family: 'Courier New', monospace;
}

#activity-label { display: none; } /* subsumed by status-text */

/* Thinking indicator */
.entry.thinking .entry-text {
  color: var(--dim);
  font-style: italic;
  letter-spacing: 2px;
}
@keyframes thinking-pulse {
  0%, 100% { opacity: 0.25; }
  50%       { opacity: 0.85; }
}
.entry.thinking { animation: thinking-pulse 1.2s ease-in-out infinite; }

/* ── Main area: feed + gallery side by side ── */
#main-area {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* Narrative feed */
#feed {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 18px 24px 12px 24px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  scrollbar-width: none;
  background: rgba(9, 9, 14, 0.82);
}
#feed::-webkit-scrollbar { display: none; }

#empty-msg {
  margin: auto;
  color: var(--dim);
  font-size: 12px;
  text-align: center;
}

/* ── Gallery panel ── */
#gallery-panel {
  width: 380px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-left: 1px solid var(--border);
  background: rgba(9, 9, 14, 0.90);
  overflow: hidden;
}

#gallery-current {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #06060a;
  min-height: 0;
}

#gallery-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity 0.4s ease, filter 0.5s ease;
  cursor: pointer;
}
#gallery-img.regen-pending {
  filter: blur(8px) brightness(0.45) grayscale(0.4);
  cursor: wait;
}
#gallery-current::after {
  content: '';
  display: none;
  position: absolute; inset: 0;
  background: rgba(0,0,0,0);
  pointer-events: none;
}
#gallery-img.regen-pending ~ #gallery-status::before {
  content: '\21BB  regenerating\2026';
  display: block;
  font-size: 10px;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.5px;
}

#gallery-status {
  position: absolute;
  bottom: 8px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 9px;
  color: rgba(255,255,255,0.5);
  font-style: italic;
  letter-spacing: 0.4px;
  pointer-events: none;
}
/* ── Comic speech bubble ── */
#speech-bubble {
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  border: 2px solid #1a1a2e;
  border-radius: 14px;
  padding: 10px 14px;
  max-width: 84%;
  max-height: 38%;
  overflow-y: auto;
  color: #111;
  font-family: inherit;
  font-size: 13px;
  line-height: 1.45;
  box-shadow: 2px 4px 14px rgba(0,0,0,0.65);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s ease;
  z-index: 20;
  scrollbar-width: none;
  white-space: pre-wrap;
}
#speech-bubble.visible { opacity: 1; }
#speech-bubble.fading  { opacity: 0; transition: opacity 0.5s ease; }
#speech-bubble::-webkit-scrollbar { display: none; }
#bubble-speaker {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.6px;
  color: #555;
  text-transform: uppercase;
  margin-bottom: 5px;
}
/* bubble tail — outer dark border */
#speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -18px;
  left: 50%;
  transform: translateX(-50%);
  border: 9px solid transparent;
  border-top-color: #1a1a2e;
  pointer-events: none;
}
/* bubble tail — inner white fill */
#speech-bubble::before {
  content: '';
  position: absolute;
  bottom: -15px;
  left: 50%;
  transform: translateX(-50%);
  border: 8px solid transparent;
  border-top-color: #fff;
  z-index: 1;
  pointer-events: none;
}

/* ── NPC presence strip ── */
#npc-presence {
  display: none;
  flex-direction: row;
  gap: 8px;
  padding: 8px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
  background: rgba(6, 6, 10, 0.6);
  flex-shrink: 0;
  min-height: 72px;
  align-items: center;
}
#npc-presence::-webkit-scrollbar { display: none; }

.npc-avatar-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: default;
  flex-shrink: 0;
  position: relative;
}
.npc-avatar-img {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.12);
  opacity: 0.88;
  transition: opacity 0.2s;
}
.npc-avatar-wrap:hover .npc-avatar-img { opacity: 1; }
/* Initial-letter fallback when no portrait yet */
.npc-avatar-wrap.no-portrait::before {
  content: attr(data-initial);
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  font-size: 18px;
  color: var(--dim);
}
.npc-avatar-label {
  font-size: 8px;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  color: var(--dim);
  max-width: 50px;
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Sense enrichment lines — aligned with .entry-text column ── */
.sense-line {
  /* match indent: avatar(28px) + gap(8px) + speaker(60px) + gap(8px) = 104px */
  padding: 1px 14px 1px 104px;
  font-size: 11.5px;
  line-height: 1.55;
  font-style: italic;
}
.sense-tag {
  font-style: normal;
  font-size: 8px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-right: 7px;
  color: rgba(255,255,255,0.3);  /* fallback, overridden per channel */
}
/* Per-channel tag colours */
.sense-line[data-channel="sight"]       .sense-tag { color: var(--c-sight); }
.sense-line[data-channel="sound"]       .sense-tag { color: var(--c-sound); }
.sense-line[data-channel="smell"]       .sense-tag { color: var(--c-smell); }
.sense-line[data-channel="touch"]       .sense-tag { color: var(--c-touch); }
.sense-line[data-channel="environment"] .sense-tag { color: var(--c-env); }
.sense-line[data-channel="mood"]        .sense-tag { color: #8844ff; }
.sense-body { color: rgba(205, 218, 230, 0.68); }

/* ── Gallery thumbnails ── */
#gallery-thumbs {
  height: 72px;
  flex-shrink: 0;
  display: flex;
  gap: 4px;
  padding: 4px;
  overflow-x: auto;
  border-top: 1px solid var(--border);
  scrollbar-width: none;
}
#gallery-thumbs::-webkit-scrollbar { display: none; }

.thumb-wrap {
  position: relative;
  flex-shrink: 0;
  width: 64px; height: 64px;
}
.thumb-wrap.active .gallery-thumb { opacity: 1; border-color: rgba(255,255,255,0.3); }
.gallery-thumb {
  height: 64px;
  width: 64px;
  object-fit: cover;
  border-radius: 3px;
  cursor: pointer;
  opacity: 0.65;
  transition: opacity 0.2s;
  border: 1px solid transparent;
  display: block;
}
.thumb-wrap:hover .gallery-thumb { opacity: 1; }

/* ── Entry rows ── */
.entry {
  display: flex;
  gap: 8px;
  align-items: baseline;
  overflow-wrap: anywhere;
  word-break: break-word;
}
.entry-avatar {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  object-fit: cover;
  opacity: 0.72;
  align-self: flex-start;
  margin-top: 1px;
  border: 1px solid rgba(255,255,255,0.06);
}
.entry-avatar.hidden { visibility: hidden; }
.entry-speaker {
  flex-shrink: 0;
  width: 60px;
  text-align: right;
  font-size: 10px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--dim);
  padding-top: 1px;
}
.entry-text { flex: 1; min-width: 0; }

/* channel colours */
.entry.say        .entry-text { color: var(--c-say); }
.entry.do         .entry-text { color: var(--c-do); font-style: italic; }
.entry.insights   .entry-text { color: var(--c-ins); font-style: italic; }
.entry.sense-touch       .entry-text { color: var(--c-touch); }
.entry.sense-smell       .entry-text { color: var(--c-smell); }
.entry.sense-sound       .entry-text { color: var(--c-sound); }
.entry.sense-sight       .entry-text { color: var(--c-sight); }
.entry.sense-taste       .entry-text { color: var(--c-taste); }
.entry.sense-environment .entry-text { color: var(--c-env);   }
.entry.is-player  .entry-text { color: var(--c-player); font-style: normal; }

/* NPC character dialogue — distinct speaker colour, slightly indented feel */
.entry.character-line .entry-speaker { color: rgba(255, 200, 100, 0.85); }
.entry.character-line .entry-text    { color: rgba(255, 220, 140, 0.80); font-style: italic; }

/* arrival animation */
.arriving { animation: arrive 0.22s ease-out both; }
@keyframes arrive {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: none; }
}

/* Spoken/converted media dissolve — text fades and collapses after TTS */
.fading-out {
  opacity: 0 !important;
  max-height: 0 !important;
  margin-top: 0 !important;
  margin-bottom: 0 !important;
  padding-top: 0 !important;
  padding-bottom: 0 !important;
  overflow: hidden;
  pointer-events: none;
  transition: opacity 2.5s ease,
              max-height 1.8s ease 1.8s,
              margin 1.8s ease 1.8s,
              padding 1.8s ease 1.8s;
}

/* Narrator [C=...] color tags — rendered inline by _formatText() */
.c-gold     { color: rgba(255, 200, 80, 0.92); }
.c-dim      { color: rgba(255, 255, 255, 0.38); }
.c-blue     { color: rgba(100, 185, 255, 0.90); }
.c-red      { color: rgba(255, 100,  80, 0.90); }
.c-teal     { color: rgba( 80, 220, 200, 0.90); }
.c-whisper  { color: rgba(255, 255, 255, 0.28); font-style: italic; }

/* Lore whisper — The Fortress narrating history; same weight as narrator prose */
.entry.lore-whisper { color: rgba(255, 200, 80, 0.70); }
.lore-icon { margin-right: 4px; opacity: 0.40; }

/* Sense receipt chips — dim per-turn accountability row */
.sense-receipt {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-top: 3px;
  padding-left: 104px; /* align with .entry-text column (avatar+gap+speaker+gap) */
  opacity: 0.38;
}
.sense-chip {
  font-size: 11px;
  padding: 1px 7px;
  border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  cursor: default;
  white-space: nowrap;
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: max-width 0.25s ease, opacity 0.2s;
}
.sense-receipt:hover { opacity: 0.70; }
.sense-chip:hover    { max-width: 420px; }
.sense-chip.chip-sight       { color: var(--c-sight); }
.sense-chip.chip-smell       { color: var(--c-smell); }
.sense-chip.chip-sound       { color: var(--c-sound); }
.sense-chip.chip-touch       { color: var(--c-touch); }
.sense-chip.chip-taste       { color: var(--c-taste); }
.sense-chip.chip-environment { color: var(--c-env);   }
.sense-chip.chip-mood        { color: rgba(255, 180,  90, 0.90); }
.sense-chip.chip-image       { color: rgba(180, 160, 255, 0.90); }

/* Narrator prose collapses to a dim one-liner after being voiced.
   Click any spoken entry to expand it back. */
.entry.narrator.spoken .entry-text {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  opacity: 0.38;
  cursor: pointer;
  transition: opacity 0.2s;
}
.entry.narrator.spoken:hover .entry-text  { opacity: 0.60; }
.entry.narrator.spoken.expanded .entry-text {
  white-space: normal;
  overflow: visible;
  text-overflow: clip;
  opacity: 0.85;
  cursor: default;
}

/* ── Input bar ── */
#bottombar {
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
}
#player-input {
  flex: 1;
  min-width: 0;
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 10px;
  font: inherit;
  font-size: 13px;
  resize: none;
  outline: none;
  line-height: 1.5;
}
#player-input::placeholder { color: var(--dim); }
#player-input:focus { border-color: rgba(255,255,255,0.18); }
#input-hint {
  flex-shrink: 0;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.3px;
  align-self: flex-end;
  padding-bottom: 8px;
  min-width: 28px;
  text-align: right;
  transition: color 0.3s;
}
#input-hint.urgent { color: rgba(196,106,90,0.8); }

/* ── VAD state — input border reflects mic activity ── */
#player-input[data-vad-state="speaking"]   { border-color: rgba(255,136,68,0.70); box-shadow: 0 0 0 2px rgba(255,136,68,0.12); }
#player-input[data-vad-state="processing"] { border-color: rgba(255,136,68,0.30); }
#player-input[data-vad-state="ready"]      { border-color: rgba(68,187,204,0.55); }

/* ── Sense toggles — always clickable in the shelf ── */
.light-wrap.toggleable { cursor: pointer; transition: opacity 0.3s; }
.light-wrap.toggleable:hover { opacity: 0.82; }
.light-wrap.toggleable.sense-off { opacity: 0.22; }
.light-wrap.toggleable.sense-off .light-dot { animation: none !important; }


/* ── Turn-complete green border ── */
#player-input.turn-complete {
  border-color: rgba(68,210,120,0.75);
  box-shadow: 0 0 0 2px rgba(68,210,120,0.18);
  transition: border-color 0.3s, box-shadow 0.3s;
}

/* ── Mood text entries (shown when muted instead of generating music) ── */
.mood-entry {
  display: flex; gap: 12px; align-items: baseline;
  opacity: 0.7;
}
.mood-label {
  flex-shrink: 0; width: 68px; text-align: right;
  font-size: 10px; letter-spacing: 0.5px; font-weight: bold;
  color: #8844ff;
}
.mood-text { flex: 1; min-width: 0; font-size: 12px; color: rgba(160,130,220,0.80); font-style: italic; }

/* ── META canon events ── */
.meta-event {
  display: flex; gap: 12px; align-items: baseline;
  color: #a07820; font-style: italic; opacity: 0.82;
}
.meta-label {
  flex-shrink: 0; width: 68px; text-align: right;
  font-size: 10px; letter-spacing: 0.5px; font-weight: bold;
  font-style: normal; color: #b8960c;
}
.meta-text { flex: 1; min-width: 0; font-size: 12px; }
.meta-btn {
  background: none; border: 1px solid #b8960c; color: #b8960c;
  border-radius: 3px; padding: 1px 6px; cursor: pointer;
  font: inherit; font-size: 11px; margin: 0 2px;
}
.meta-btn:hover { background: rgba(184,150,12,0.15); }
.meta-btn:disabled { opacity: 0.4; cursor: default; }

/* CSS-only tooltips via data-tip */
[data-tip] { position: relative; }
[data-tip]:hover::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: #1a1a24;
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--ink);
  font-size: 10px;
  padding: 4px 8px;
  border-radius: 4px;
  white-space: nowrap;
  z-index: 200;
  pointer-events: none;
  font-style: normal;
  letter-spacing: 0;
  text-transform: none;
}

/* ── Entity keyword refs — highlighted entity names in player turns ── */
.entity-ref {
  color: rgba(100, 200, 255, 0.90);
  border-bottom: 1px dotted rgba(100, 200, 255, 0.45);
  cursor: default;
  position: relative;
}
.entity-ref:hover::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 5px);
  left: 50%;
  transform: translateX(-50%);
  background: #15151e;
  border: 1px solid rgba(100,200,255,0.25);
  color: rgba(200,240,255,0.90);
  font-size: 10px;
  padding: 4px 9px;
  border-radius: 4px;
  white-space: nowrap;
  max-width: 240px;
  overflow: hidden;
  text-overflow: ellipsis;
  z-index: 300;
  pointer-events: none;
  font-style: normal;
}

/* ── Entity autocomplete suggest dropdown ── */
#entity-suggest {
  position: absolute;
  bottom: 100%;
  left: 0;
  right: 0;
  background: #15151e;
  border: 1px solid rgba(100,200,255,0.25);

  list-style: none;
  margin-bottom: 4px;
