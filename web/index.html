// ── Entity Keyword Linking ────────────────────────────────────────────────
// Polls /world-state every 10s to build an entity name index.
// 1) Post-submission: scans player turn text and wraps known names in tooltips.
// 2) Input: shows an autocomplete dropdown as the player types.

let _entityIndex = new Map(); // name_lc → {id, canonical_name, type, desc}

async function _pollEntityIndex() {
  try {
    const res = await fetch('/world-state');
    if (!res.ok) return;
    const data = await res.json();
    const entities = Array.isArray(data) ? data
      : (data.entities ? Object.values(data.entities) : []);
    const next = new Map();
    for (const e of entities) {
      if (!e || !e.canonical_name) continue;
      const key = e.canonical_name.toLowerCase();
      const desc = (Array.isArray(e.senses) && e.senses[0] && e.senses[0].value)
        || e.description || e.type || '';
      const entry = {id: e.id || key, canonical_name: e.canonical_name,
                     type: e.type || '', desc: String(desc).slice(0, 100)};
      next.set(key, entry);
      for (const alias of (e.aliases || [])) {
        if (alias) next.set(String(alias).toLowerCase(), entry);
      }
    }
    _entityIndex = next;
  } catch (_) {}
}
setInterval(_pollEntityIndex, 10000);
_pollEntityIndex();

function _scanPlayerTextForEntities(spanEl) {
  if (!_entityIndex.size) return;
  const rawText = spanEl.textContent;
  if (!rawText.trim()) return;
  // Sort names longest-first so longer names match before their substrings
  const names = [..._entityIndex.keys()].sort((a, b) => b.length - a.length);
  let html = esc(rawText);
  for (const name of names) {
    if (name.length < 3) continue; // skip very short names
    const e = _entityIndex.get(name);
    const tip = esc(
      e.canonical_name +
      (e.type ? ' [' + e.type + ']' : '') +
      (e.desc ? ' — ' + e.desc : '')
    );
    const safe = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`(?<![a-z0-9_-])(${safe})(?![a-z0-9_-])`, 'gi');
    html = html.replace(re, `<span class="entity-ref" data-tip="${tip}">$1</span>`);
  }
  spanEl.innerHTML = html;
}

// ── Discovery Notes ──────────────────────────────────────────────────────────
// Slide-in entity jot cards that appear when the narrator introduces or
// significantly mentions a known entity.  Click to prefill "Tell me about X".

const _discoveryFired = new Set(); // entity IDs fired this session

function _fireDiscoveryNote(entity, noteText) {
  if (_discoveryFired.has(entity.id)) return;
  _discoveryFired.add(entity.id);

  const container = document.getElementById('discovery-notes');
  if (!container) return;

  const el = document.createElement('div');
  el.className = 'disc-note';
  el.innerHTML =
    '<div class="dn-header">' +
      '<span class="dn-keyword">' + esc(entity.canonical_name) + '</span>' +
      (entity.type ? '<span class="dn-badge">' + esc(entity.type) + '</span>' : '') +
    '</div>' +
    '<div class="dn-prose">' + esc(noteText || entity.canonical_name + ' encountered') + '</div>' +
    '<div class="dn-hint">click to ask</div>';

  // Click → prefill textarea with "Tell me about [Name]" (don't auto-submit)
  el.addEventListener('click', () => {
    if (inputEl) {
      inputEl.value = 'Tell me about ' + entity.canonical_name;
      inputEl.focus();
    }
    el.remove();
  });

  container.appendChild(el);

  // Auto-dismiss after 5 seconds
  setTimeout(() => {
    el.classList.add('fading');
    setTimeout(() => { try { el.remove(); } catch (_) {} }, 650);
  }, 5000);
}

function _scanNarratorTextForDiscovery(rawText) {
  // Fire a discovery note for every known entity mentioned in narrator prose
  // that hasn't been fired yet this session.
  if (!rawText || !_entityIndex.size) return;
  const tl = rawText.toLowerCase();
  for (const [nameLc, entity] of _entityIndex) {
    if (nameLc.length < 3) continue;
    if (_discoveryFired.has(entity.id)) continue;
    if (tl.includes(nameLc)) {
      // Build a short note from the entity's stored description (first sentence)
      const desc = (entity.desc || '').split(/[.!?]/)[0].trim();
      _fireDiscoveryNote(entity, desc || entity.canonical_name + ' mentioned in The Fortress');
    }
  }
}

// Autocomplete suggest dropdown
const suggestEl = document.getElementById('entity-suggest');
let _suggestActiveIdx = -1;

function _getWordAtCursor() {
  const val = inputEl.value;
  const pos = inputEl.selectionStart;
  const m = val.slice(0, pos).match(/\S+$/);
  return m ? m[0] : '';
}

function _replaceWordAtCursor(word) {
  const val = inputEl.value;
  const pos = inputEl.selectionStart;
  const before = val.slice(0, pos);
  const after  = val.slice(pos);
  const m = before.match(/\S+$/);
  const start = m ? pos - m[0].length : pos;
  inputEl.value = val.slice(0, start) + word + after;
  inputEl.selectionStart = inputEl.selectionEnd = start + word.length;
}

function _showSuggest(matches) {
  suggestEl.innerHTML = '';
  _suggestActiveIdx = -1;
  if (!matches.length) { suggestEl.style.display = 'none'; return; }
  for (const e of matches) {
    const li = document.createElement('li');
    li.innerHTML = esc(e.canonical_name) +
      (e.type ? `<span class="es-type">${esc(e.type)}</span>` : '');
    li.dataset.name = e.canonical_name;
    li.addEventListener('mousedown', ev => {
      ev.preventDefault();
      _replaceWordAtCursor(e.canonical_name);
      suggestEl.style.display = 'none';
      inputEl.focus();
    });
    suggestEl.appendChild(li);
  }
  suggestEl.style.display = 'block';
}

function _updateSuggest() {
  const word = _getWordAtCursor();
  if (word.length < 2) { suggestEl.style.display = 'none'; return; }
  const wl = word.toLowerCase();
  const seen = new Set();
  const matches = [];
  for (const [key, e] of _entityIndex) {
    if (key.startsWith(wl) && !seen.has(e.id)) {
      seen.add(e.id);
      matches.push(e);
      if (matches.length >= 5) break;
    }
  }
  _showSuggest(matches);
}

inputEl.addEventListener('keydown', e => {
  const suggestOpen = suggestEl.style.display !== 'none';
  const items = () => suggestEl.querySelectorAll('li');
  if (e.key === 'ArrowDown' && suggestOpen) {
    e.preventDefault();
    items().forEach((li, i) => li.classList.toggle('active', i === _suggestActiveIdx));
    const all = items();
    if (_suggestActiveIdx >= 0) all[_suggestActiveIdx].classList.remove('active');
    _suggestActiveIdx = Math.min(_suggestActiveIdx + 1, all.length - 1);
    all[_suggestActiveIdx]?.classList.add('active');
    return;
  }
  if (e.key === 'ArrowUp' && suggestOpen) {
    e.preventDefault();
    const all = items();
    if (_suggestActiveIdx >= 0) all[_suggestActiveIdx].classList.remove('active');
    _suggestActiveIdx = Math.max(_suggestActiveIdx - 1, -1);
    if (_suggestActiveIdx >= 0) all[_suggestActiveIdx].classList.add('active');
    return;
  }
  if (e.key === 'Escape') {
    if (_contMode || _atMode) { _icClose(); return; }
    suggestEl.style.display = 'none';
    return;
  }
  // Chooser open (continuation or @ mode): delegate Tab/Arrow/Enter to chooser
  if (_contMode === 'awaiting_item' || _atMode) {
    if (e.key === 'Tab' || e.key === 'ArrowDown') { e.preventDefault(); _icSetActive(_icActive + 1); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); _icSetActive(_icActive - 1); return; }
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const active = icListEl.children[_icActive];
      if (active) _icSelect(active.dataset.name); else icFilterEl.focus();
      return;
    }
    // Any other key: redirect typing into the filter
    if (e.key.length === 1) { icFilterEl.focus(); }
    return;
  }
  if (e.key === 'Enter' && !e.shiftKey) {
    if (suggestOpen && _suggestActiveIdx >= 0) {
      e.preventDefault();
      const active = items()[_suggestActiveIdx];
      if (active) { _replaceWordAtCursor(active.dataset.name); suggestEl.style.display = 'none'; }
    } else {
      e.preventDefault();
      sendInput();
    }
  }
});
inputEl.addEventListener('input', () => {
  const word = _getWordAtCursor();

  // @ mention: open or update the chooser
  if (word.startsWith('@') && !_contMode) {
    const atStart = inputEl.selectionStart - word.length;
    const filter  = word.slice(1);
    if (!_atMode) {
      _icOpenAt(atStart, filter);
    } else {
      // Already in @ mode — keep filter in sync as user types
      icFilterEl.value = filter;
      _icRender(filter);
    }
    // Don't start countdown while chooser is open
    return;
  }

  // If @ was deleted, close the at-chooser
  if (_atMode && !word.startsWith('@')) {
    _icClose();
  }

  if (inputEl.value.trim()) _startCountdown(); else _clearTimers();
  _updateSuggest();
});
inputEl.addEventListener('blur', () => {
  setTimeout(() => {
    suggestEl.style.display = 'none';
    if (_atMode) _icClose();
  }, 150);
});

// ── Always-on VAD (Voice Activity Detection) ──
const _DEFAULT_PLACEHOLDER = 'Speak, act, or perceive…';

function _sttMime() {
  const candidates = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
  return candidates.find(t => { try { return MediaRecorder.isTypeSupported(t); } catch(_){return false;} }) || '';
}

let   _vadThreshold  = 0.008;  // RMS energy to count as speech — calibrated on init
const VAD_ONSET_MS   = 60;     // speech must persist this long before we start recording
const VAD_ONSET_GAP  = 120;    // ms of quiet tolerated mid-onset before resetting timer
const VAD_SILENCE_MS = 1400;   // silence after speech before we stop and transcribe

let _vadStream       = null;
let _vadAnalyser     = null;
let _vadRecorder     = null;
let _vadChunks       = [];
let _vadSpeaking     = false;
let _vadSpeechStart  = null;
let _vadSilStart     = null;
let _vadOnsetSilStart= null;   // grace-period timer: brief quiet during onset
let _vadBuf          = null;

function _vadRMS() {
  _vadAnalyser.getFloatTimeDomainData(_vadBuf);
  let s = 0;
  for (let v of _vadBuf) s += v * v;
  return Math.sqrt(s / _vadBuf.length);
}

function _vadTick() {
  if (!_vadAnalyser) return;
  requestAnimationFrame(_vadTick);

  // Don't capture while TTS is speaking or during post-TTS echo cooldown
  if (_ttsSource || Date.now() < _ttsEchoCooldownUntil) {
    _vadSpeaking = false; _vadSpeechStart = null; _vadOnsetSilStart = null; _vadSilStart = null; return;
  }
  // Don't overwrite if user is actively typing
  if (document.activeElement === inputEl && inputEl.value.trim()) return;

  const rms  = _vadRMS();

  // Visual mic level — glow scales with sound level well below speech threshold.
  // If even a shout produces no glow the analyser is returning silence (AudioContext issue).
  // At speech level the border turns fully orange via data-vad-state; this is just the
  // sub-threshold indicator so we can see the audio pipeline is alive.
  if (!_vadSpeaking) {
    const lvl = Math.min(rms / Math.max(_vadThreshold, 0.001), 1.0);
    inputEl.style.boxShadow = lvl > 0.02
      ? `0 0 0 ${(lvl * 4).toFixed(1)}px rgba(68,187,204,${(lvl * 0.55).toFixed(2)})`
      : '';
  }

  const loud = rms > _vadThreshold;
  const now  = Date.now();

  if (loud) {
    _vadSilStart      = null;
    _vadOnsetSilStart = null;   // reset onset grace period — we're loud again
    if (!_vadSpeaking) {
      if (!_vadSpeechStart) { _vadSpeechStart = now; }
      else if (now - _vadSpeechStart >= VAD_ONSET_MS) { _vadBeginRecord(); }
    }
  } else {
    if (!_vadSpeaking) {
      // Pre-speech: tolerate brief quiet frames (inter-phoneme gaps, plosives).
      // Only cancel the onset timer if silence lasts longer than VAD_ONSET_GAP.
      if (_vadSpeechStart) {
        if (!_vadOnsetSilStart) { _vadOnsetSilStart = now; }
        else if (now - _vadOnsetSilStart >= VAD_ONSET_GAP) {
          _vadSpeechStart = null; _vadOnsetSilStart = null;
        }
      }
    } else {
      // Mid-speech: end recording after sustained silence.
      if (!_vadSilStart) { _vadSilStart = now; }
      else if (now - _vadSilStart >= VAD_SILENCE_MS) { _vadEndRecord(); }
    }
  }
}

function _vadBeginRecord() {
  if (_vadSpeaking) return;
  _vadSpeaking = true;
  _vadChunks   = [];
  const mime   = _sttMime();
  _vadRecorder = new MediaRecorder(_vadStream, mime ? {mimeType: mime} : {});
  _vadRecorder.ondataavailable = e => { if (e.data.size > 0) _vadChunks.push(e.data); };
  _vadRecorder.onstop = _vadProcess;
  _vadRecorder.start();
  inputEl.dataset.vadState = 'speaking';
  inputEl.placeholder = 'Listening…';
  _setStatus('listening', true);
}

function _vadEndRecord() {
  _vadSpeaking = false;
  _vadSilStart = null;
  if (_vadRecorder && _vadRecorder.state === 'recording') _vadRecorder.stop();
  inputEl.dataset.vadState = 'processing';
  inputEl.placeholder = 'Transcribing…';
  _setStatus('listening', false);
  _setStatus('transcribing', true);
}

// ── Item / Inventory Continuation Mode ───────────────────────────────────────
// When the player types or speaks a sentence containing a continuation token
// (item / items / inventory), we pause before submitting and pop open the item
// chooser.  The player then speaks/types the item name to continue, then speaks
// the rest of the sentence.  The full sentence is assembled silently and sent
// when the player finishes speaking or the auto-send countdown expires.
//
// State:
//   null            — not in continuation mode (normal flow)
//   'awaiting_item' — showing chooser, waiting for item selection
//   'awaiting_rest' — item chosen, waiting for rest of sentence
//
// _contBase  = text before the chosen item slot
// _contAfter = text after the slot (if trigger was mid-sentence)

let _contMode  = null;
let _contBase  = '';
let _contAfter = '';

// @ mention mode — triggered by typing @ in the textarea (not a continuation,
// just inline entity insertion at cursor, like Claude Desktop's @ picker).
let _atMode    = false;
let _atStart   = -1;  // char index of the @ in the textarea

const _CONT_TOKEN_RE = /\b(item|items|inventory)\b/i;

const icEl       = document.getElementById('item-chooser');
const icFilterEl = document.getElementById('item-chooser-filter');
const icListEl   = document.getElementById('item-chooser-list');
let _icActive    = -1;  // active list index

function _icFilteredEntities(filterText) {
  const fl = (filterText || '').toLowerCase().trim();
  const seen = new Set();
  const results = [];
  for (const [, e] of _entityIndex) {
    if (seen.has(e.id)) continue;
    seen.add(e.id);
    if (!fl || e.canonical_name.toLowerCase().includes(fl)) results.push(e);
    if (results.length >= 20) break;
  }
  return results;
}

function _icRender(filterText) {
  const items = _icFilteredEntities(filterText);
  icListEl.innerHTML = '';
  _icActive = -1;
  for (const [i, e] of items.entries()) {
    const li = document.createElement('li');
    li.dataset.name = e.canonical_name;
    li.dataset.idx  = i;
    li.innerHTML =
      `<span class="ic-name">${esc(e.canonical_name)}</span>` +
      (e.type ? `<span class="ic-type">${esc(e.type)}</span>` : '') +
      `<span class="ic-key">${i < 9 ? i+1 : ''}</span>`;
    li.addEventListener('mousedown', ev => { ev.preventDefault(); _icSelect(e.canonical_name); });
    icListEl.appendChild(li);
  }
}

function _icSetActive(idx) {
  const items = icListEl.querySelectorAll('li');
  if (_icActive >= 0 && items[_icActive]) items[_icActive].classList.remove('active');
  _icActive = Math.max(-1, Math.min(items.length - 1, idx));
  if (_icActive >= 0 && items[_icActive]) {
    items[_icActive].classList.add('active');
    items[_icActive].scrollIntoView({block: 'nearest'});
  }
}

function _icSelect(name) {
  if (_atMode) {
    // @ mode: replace @word at cursor with chosen entity name
    const val = inputEl.value;
    const end = inputEl.selectionStart;  // cursor is after the @word
    inputEl.value = val.slice(0, _atStart) + name + val.slice(end);
    inputEl.selectionStart = inputEl.selectionEnd = _atStart + name.length;
    icEl.classList.remove('open');
    icFilterEl.value = '';
    _atMode  = false;
    _atStart = -1;
    if (inputEl.value.trim()) _startCountdown(); else _clearTimers();
    inputEl.focus();
    return;
  }
  // Continuation mode: assemble base + name + after-text
  _icClose();
  const assembled = (_contBase + name + _contAfter).trimEnd();
  inputEl.value = assembled;
  inputEl.dataset.cont = 'awaiting_rest';
  _contMode  = 'awaiting_rest';
  _contBase  = assembled + ' ';   // next VAD chunk appends here
  _contAfter = '';
  _startCountdown(4000);
  inputEl.focus();
}

function _icClose() {
  icEl.classList.remove('open');
  icFilterEl.value = '';
  inputEl.dataset.cont = '';
  _contMode  = null;
  _contBase  = '';
  _contAfter = '';
  _atMode    = false;
  _atStart   = -1;
  inputEl.focus();
}

function _icOpen(base, after) {
  _contMode  = 'awaiting_item';
  _contBase  = base;
  _contAfter = after;
  inputEl.dataset.cont = 'awaiting_item';
  inputEl.value = base.trimEnd() + '…';  // show hint in textarea
  _clearTimers();                          // hold auto-send
  _icRender('');
  icEl.classList.add('open');
  icFilterEl.value = '';
  icFilterEl.focus();
}

// @ mode: open chooser inline at the @ symbol (no continuation state).
function _icOpenAt(atStart, filterText) {
  _atMode  = true;
  _atStart = atStart;
  inputEl.dataset.cont = 'awaiting_item';  // reuse amber border
  _clearTimers();
  _icRender(filterText);
  icFilterEl.value = filterText;
  icEl.classList.add('open');
  icFilterEl.focus();
}

// Keyboard nav inside the chooser filter input
icFilterEl.addEventListener('keydown', e => {
  if (e.key === 'Escape')    { e.preventDefault(); _icClose(); return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); _icSetActive(_icActive + 1); return; }
  if (e.key === 'ArrowUp')   { e.preventDefault(); _icSetActive(_icActive - 1); return; }
  if (e.key === 'Tab')       { e.preventDefault(); _icSetActive((_icActive + 1) % Math.max(1, icListEl.children.length)); return; }
  if (e.key === 'Enter') {
    e.preventDefault();
    const active = icListEl.children[_icActive];
    if (active) _icSelect(active.dataset.name);
    return;
  }
  // Number shortcut 1-9
  if (/^[1-9]$/.test(e.key)) {
    const li = icListEl.children[parseInt(e.key) - 1];
    if (li) { e.preventDefault(); _icSelect(li.dataset.name); }
  }
});
icFilterEl.addEventListener('input', () => _icRender(icFilterEl.value));

// Check if STT text contains a continuation trigger.
// Returns {base, after, token} if found, else null.
function _detectContinuation(text) {
  const m = _CONT_TOKEN_RE.exec(text);
  if (!m) return null;
  const pre  = text.slice(0, m.index).trimEnd() + ' ';
  const post = text.slice(m.index + m[0].length).trimStart();
  return {base: pre, after: post ? ' ' + post : '', token: m[0]};
}

// Try to fuzzy-match a spoken item name against the entity index.
// Returns the canonical name if a confident match is found, else null.
function _matchItemFromSpeech(text) {
  const tl = text.toLowerCase().trim();
  // Exact match first
  if (_entityIndex.has(tl)) return _entityIndex.get(tl).canonical_name;
  // StartsWith / includes match (prefer longer matches)
  let best = null, bestLen = 0;
  for (const [key, e] of _entityIndex) {
    if (tl.includes(key) || key.includes(tl)) {
      if (key.length > bestLen) { best = e.canonical_name; bestLen = key.length; }
    }
  }
  return best;
}

// ── UI Voice Commands ──────────────────────────────────────────────────────
// Intercepts STT transcriptions before they reach the game.
// If a phrase matches, the UI action fires and the text is swallowed.
// Extend _UI_VOICE_CMDS as new panels / actions are added.
const _UI_VOICE_CMDS = [
  { pattern: /\b(reset|restart|reset world)\b/i,
    action: () => fetch('/reset', {method: 'POST'}) },
  { pattern: /\b(open gallery|show gallery)\b/i,
    action: () => document.querySelector('[data-tab="gallery"]')?.click() },
  { pattern: /\b(open map|show map)\b/i,
    action: () => document.querySelector('[data-tab="map"]')?.click() },
  { pattern: /\b(open log|show log|show journal)\b/i,
    action: () => document.querySelector('[data-tab="log"]')?.click() },
  // Status bar toggles
  { pattern: /\bshow star trek\b/i,   action: () => _flipToDev() },
  { pattern: /\bhide the madness\b/i, action: () => _flipToSimple() },
  // Page refresh
  { pattern: /\b(refresh view|refresh the view|reload)\b/i,
    action: () => window.location.reload() },
];

function _interceptVoiceCmd(text) {
  for (const cmd of _UI_VOICE_CMDS) {
    if (cmd.pattern.test(text)) { cmd.action(); return true; }
  }
  return false;
}

async function _vadProcess() {
  if (!_vadChunks.length) {
    inputEl.dataset.vadState = '';
    inputEl.placeholder = _DEFAULT_PLACEHOLDER;
    return;
  }
  const mime = (_vadRecorder && _vadRecorder.mimeType) || 'audio/webm';
  const ext  = mime.includes('ogg') ? 'ogg' : mime.includes('mp4') ? 'mp4' : 'webm';
  const blob = new Blob(_vadChunks, {type: mime});
  const form = new FormData();
  form.append('file', new File([blob], `rec.${ext}`, {type: mime}));
  form.append('model', 'whisper-1');
  form.append('response_format', 'json');
  try {
    const res  = await fetch('/api/stt/v1/audio/transcriptions', {method: 'POST', body: form});
    if (!res.ok) throw new Error(`STT ${res.status}`);
    const data = await res.json();
    const text = (data.text || '').trim();
    if (text) {
      if (_interceptVoiceCmd(text)) {
        // UI command handled — don't propagate to game input
        inputEl.dataset.vadState = '';

      } else if (_contMode === 'awaiting_item') {
        // Chooser is open — try to match spoken text to an entity name
        const match = _matchItemFromSpeech(text);
        if (match) {
          _icSelect(match);
          inputEl.dataset.vadState = 'ready';
        } else {
          // No entity match — update filter text so player can refine
          icFilterEl.value = text;
          _icRender(text);
          inputEl.dataset.vadState = '';
        }

      } else if (_contMode === 'awaiting_rest') {
        // Item was already chosen — append the rest of the sentence
        const full = (_contBase + text).trim();
        inputEl.value = full;
        inputEl.dataset.cont = '';
        _contMode = null;
        _contBase = '';
        inputEl.dataset.vadState = 'ready';
        _startCountdown(2500);

      } else {
        // Normal flow — check for continuation trigger first
        const cont = _detectContinuation(text);
        if (cont) {
          _icOpen(cont.base, cont.after);
          inputEl.dataset.vadState = '';
        } else {
          inputEl.value = text;
          inputEl.dataset.vadState = 'ready';
          _startCountdown(2500);
        }
      }
    } else {
      inputEl.dataset.vadState = '';
    }
  } catch (err) {
    console.warn('[vad]', err);
    inputEl.dataset.vadState = '';
  } finally {
    inputEl.placeholder = _DEFAULT_PLACEHOLDER;
    _setStatus('transcribing', false);
  }
}

let _vadStarted = false;

function _stopVAD() {
  // Tear down any active VAD stream so _initVAD can restart cleanly.
  _vadAnalyser = null;
  _vadBuf      = null;
  if (_vadStream) {
    _vadStream.getTracks().forEach(t => t.stop());
    _vadStream = null;
  }
  _vadStarted = false;
}

async function _initVAD() {
  if (_vadStarted) return;
  _vadStarted = true;
  try {
    // Always use Windows' default recording device — no device selection logic.
    // The user controls which mic is active via Windows Sound Settings.
    // devicechange listener below handles switching (USB→Bluetooth etc.) automatically.
    _vadStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    console.log('[vad] mic:', _vadStream.getAudioTracks()[0]?.label || 'default');
  } catch (e) {
    console.warn('[vad] mic unavailable:', e.message);
    _vadStarted = false;
    return;
  }
  const ctx = _ensureAudioCtx();
  // Ensure AudioContext is running — WebView2 may auto-suspend it
  if (ctx.state !== 'running') {
    try { await ctx.resume(); } catch (_) {}
  }
  const src     = ctx.createMediaStreamSource(_vadStream);
  _vadAnalyser  = ctx.createAnalyser();
  _vadAnalyser.fftSize = 256;
  _vadBuf       = new Float32Array(_vadAnalyser.fftSize);
  src.connect(_vadAnalyser);

  // Auto-calibrate threshold: sample ambient noise for 1 second, set threshold
  // to 4× the noise floor (minimum 0.006 to avoid false-triggers on silence).
  // This handles any microphone sensitivity automatically — no tuning needed.
  await new Promise(res => {
    const samples = [];
    const start   = performance.now();
    function sample() {
      _vadAnalyser.getFloatTimeDomainData(_vadBuf);
      let s = 0;
      for (let v of _vadBuf) s += v * v;
      samples.push(Math.sqrt(s / _vadBuf.length));
      if (performance.now() - start < 1000) requestAnimationFrame(sample);
      else {
        const ambient = samples.reduce((a, b) => a + b, 0) / samples.length;
        // USB mics in quiet rooms have near-zero ambient — use 2.5× with a low floor
        // so normal conversational distance (not right up on the mic) triggers reliably.
        _vadThreshold = Math.max(ambient * 2.5, 0.003);
        console.log(`[vad] calibrated — ambient RMS: ${ambient.toFixed(5)}  threshold: ${_vadThreshold.toFixed(5)}`);
        res();
      }
    }
    requestAnimationFrame(sample);
  });

  requestAnimationFrame(_vadTick);
  console.log('[vad] always-on listening active — AudioCtx:', ctx.state,
              '— sample rate:', _vadStream.getAudioTracks()[0]?.getSettings()?.sampleRate ?? '?');
}

// ── AudioContext self-healing ──
// Resume the AudioContext whenever the page becomes visible or the user interacts.
// Critical for exe mode: minimising/restoring the window suspends WebAudio.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && _audioCtx && _audioCtx.state !== 'running') {
    _audioCtx.resume().catch(() => {});
  }
});

// ── VAD stream health-check — runs every 5s ──
// If the mic track has ended (device unplugged, driver reset, etc.) reinitialise.
setInterval(() => {
  if (!_vadStream) return;
  const tracks = _vadStream.getAudioTracks();
  if (tracks.length === 0 || tracks.every(t => t.readyState === 'ended')) {
    console.log('[vad] stream ended — reinitialising');
    _stopVAD();
    _initVAD();
  }
}, 5000);

// ── Initialise on load ──
_initLightToggles();

// Try VAD immediately; also try on first user gesture in case AudioContext
// is suspended (WebView2 policy varies by Windows version)
_initVAD();
document.addEventListener('click',   () => _initVAD(), { once: true });
document.addEventListener('keydown', () => _initVAD(), { once: true });

// Re-init when a new audio device is plugged in (e.g. switching microphones).
// Stop the current stream first so getUserMedia picks the new default device.
if (navigator.mediaDevices && navigator.mediaDevices.addEventListener) {
  navigator.mediaDevices.addEventListener('devicechange', async () => {
    console.log('[vad] audio device change detected — reinitialising mic');
    _stopVAD();
    await _initVAD();
  });
}
</script>

<!-- Discovery notes — fixed-position slide-in entity cards -->
<div id="discovery-notes"></div>
