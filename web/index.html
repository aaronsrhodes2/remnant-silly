<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Remnant</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #09090e;
  --surface: #111118;
  --border:  rgba(255,255,255,0.06);
  --dim:     rgba(255,255,255,0.28);
  --ink:     #cdc5b0;
  /* channel colours */
  --c-say:   rgba(200, 220, 255, 0.88);
  --c-do:    rgba(186, 104, 200, 0.90);
  --c-touch: #ba68c8;
  --c-smell: #00c853;
  --c-sound: #29b6f6;
  --c-sight: #ff8c00;
  --c-taste: #ffd600;
  --c-env:   #81d4fa;
  --c-ins:   rgba(129, 212, 250, 0.72);
  --c-player:#64b5f6;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: "Iosevka", "Consolas", ui-monospace, monospace;
  font-size: 14px;
  line-height: 1.65;
  overflow: hidden;
}

/* ── Layout ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Top bar: location + connection state */
#topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 0.4px;
}
#topbar #location { color: var(--ink); opacity: 0.55; }
#topbar #conn-status { font-size: 10px; }
#topbar #conn-status.ok     { color: #6fa86a; }
#topbar #conn-status.err    { color: #c46a5a; }
#topbar #conn-status.wait   { color: #d6a85c; }

/* Narrative feed */
#feed {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 18px 24px 12px 24px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  scrollbar-width: none;
}
#feed::-webkit-scrollbar { display: none; }

#empty-msg {
  margin: auto;
  color: var(--dim);
  font-size: 12px;
  text-align: center;
}

/* ── Entry rows ── */
.entry {
  display: flex;
  gap: 12px;
  align-items: baseline;
  overflow-wrap: anywhere;
  word-break: break-word;
}
.entry-speaker {
  flex-shrink: 0;
  width: 68px;
  text-align: right;
  font-size: 10px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--dim);
  padding-top: 1px;
}
.entry-text { flex: 1; min-width: 0; }

/* channel colours */
.entry.say        .entry-text { color: var(--c-say); }
.entry.do         .entry-text { color: var(--c-do); font-style: italic; }
.entry.insights   .entry-text { color: var(--c-ins); font-style: italic; }
.entry.sense-touch       .entry-text { color: var(--c-touch); font-style: italic; }
.entry.sense-smell       .entry-text { color: var(--c-smell); font-style: italic; }
.entry.sense-sound       .entry-text { color: var(--c-sound); font-style: italic; }
.entry.sense-sight       .entry-text { color: var(--c-sight); font-style: italic; }
.entry.sense-taste       .entry-text { color: var(--c-taste); font-style: italic; }
.entry.sense-environment .entry-text { color: var(--c-env);   font-style: italic; }
.entry.is-player  .entry-text { color: var(--c-player); font-style: normal; }

/* arrival animation */
.arriving {
  animation: arrive 0.22s ease-out both;
}
@keyframes arrive {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: none; }
}

/* ── Input bar ── */
#bottombar {
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
}
#player-input {
  flex: 1;
  min-width: 0;
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 10px;
  font: inherit;
  font-size: 13px;
  resize: none;
  outline: none;
  line-height: 1.5;
}
#player-input::placeholder { color: var(--dim); }
#player-input:focus { border-color: rgba(255,255,255,0.18); }
/* auto-send countdown hint */
#input-hint {
  flex-shrink: 0;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.3px;
  align-self: flex-end;
  padding-bottom: 8px;
  min-width: 28px;
  text-align: right;
  transition: color 0.3s;
}
#input-hint.urgent { color: rgba(196,106,90,0.8); }

/* ── META canon events ── */
.meta-event {
  display: flex;
  gap: 12px;
  align-items: baseline;
  color: #a07820;
  font-style: italic;
  opacity: 0.82;
}
.meta-label {
  flex-shrink: 0;
  width: 68px;
  text-align: right;
  font-size: 10px;
  letter-spacing: 0.5px;
  font-weight: bold;
  font-style: normal;
  color: #b8960c;
}
.meta-text { flex: 1; min-width: 0; font-size: 12px; }
.meta-btn {
  background: none;
  border: 1px solid #b8960c;
  color: #b8960c;
  border-radius: 3px;
  padding: 1px 6px;
  cursor: pointer;
  font: inherit;
  font-size: 11px;
  margin: 0 2px;
}
.meta-btn:hover { background: rgba(184,150,12,0.15); }
.meta-btn:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span id="location">—</span>
    <span id="conn-status" class="wait">connecting…</span>
  </div>

  <div id="feed">
    <div id="empty-msg">Waiting for The Fortress…</div>
  </div>

  <div id="bottombar">
    <textarea id="player-input" rows="2" placeholder="Speak, act, or perceive…"></textarea>
    <span id="input-hint"></span>
  </div>
</div>

<script>
const feed      = document.getElementById('feed');
const emptyMsg  = document.getElementById('empty-msg');
const locationEl= document.getElementById('location');
const connEl    = document.getElementById('conn-status');

function esc(s) {
  return String(s).replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function renderTurn(turn, instant) {
  const blocks = turn.parsed_blocks || [];
  let added = 0;

  for (const b of blocks) {
    const text = (b.text || '').trim();
    if (!text) continue;

    const div = document.createElement('div');
    div.className = 'entry';

    // Channel / sense class
    if (b.senseType) {
      div.classList.add('sense-' + b.senseType.toLowerCase());
    } else if (b.channel) {
      div.classList.add(b.channel);
    }
    if (b.isPlayer) div.classList.add('is-player');
    if (!instant) div.classList.add('arriving');

    const speaker = b.isPlayer ? 'You' : (turn.narrator_name || 'Narrator');
    div.innerHTML =
      '<span class="entry-speaker">' + esc(speaker) + '</span>' +
      '<span class="entry-text">' + esc(text) + '</span>';

    feed.appendChild(div);
    added++;
  }

  if (added) {
    emptyMsg.style.display = 'none';
    feed.scrollTop = feed.scrollHeight;

    const loc = (turn.context || {}).location || '';
    if (loc) locationEl.textContent = loc.length > 90 ? loc.substring(0, 87) + '…' : loc;
  }
}

function renderMetaEvent(data) {
  const el = document.createElement('div');
  el.className = 'meta-event';
  if (!data.type) return;

  // Special path: clarify prompt renders interactive buttons
  if (data.type === 'player_clarify') {
    el.innerHTML =
      '<span class="meta-label">WHO ARE YOU?</span>' +
      '<span class="meta-text">Is <em>' + esc(data.name || '?') + '</em> ' +
      '<button class="meta-btn" data-choice="alias">another name for you</button>' +
      ' or ' +
      '<button class="meta-btn" data-choice="switch">a new story</button>?' +
      '</span>';
    el.querySelectorAll('.meta-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const clarText = btn.dataset.choice === 'alias'
          ? "that's me, I am also known as " + data.name
          : "that's not me, my name is " + data.name;
        fetch('/player-input', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({text: clarText}),
        });
        el.querySelectorAll('.meta-btn').forEach(b => b.disabled = true);
      });
    });
    feed.appendChild(el);
    emptyMsg.style.display = 'none';
    feed.scrollTop = feed.scrollHeight;
    return;
  }

  const label = data.type === 'reset'          ? 'RESET:' + (data.level || 'scene').toUpperCase()
              : data.type === 'portrait'        ? 'PORTRAIT'
              : data.type === 'portrait_saved'  ? 'FOREVER'
              : data.type === 'player_alias'    ? 'ALIAS'
              : data.type === 'player_switch'   ? 'NEW PLAYER'
              : data.type === 'player_restore'  ? 'RESTORED'
              :                                   'FOREVER';
  const text = data.name || data.text || (data.url ? data.url.split('/').pop() : '');
  el.innerHTML =
    '<span class="meta-label">' + esc(label) + '</span>' +
    '<span class="meta-text">' + esc(text) + '</span>';
  feed.appendChild(el);
  emptyMsg.style.display = 'none';
  feed.scrollTop = feed.scrollHeight;
}

// ── SSE connection ──
function connect() {
  const es = new EventSource('/game/events');

  es.addEventListener('history', e => {
    try {
      const turns = JSON.parse(e.data);
      for (const t of turns) renderTurn(t, true);
      feed.scrollTop = feed.scrollHeight;
    } catch (_) {}
  });

  es.addEventListener('turn', e => {
    try { renderTurn(JSON.parse(e.data), false); } catch (_) {}
  });

  es.addEventListener('meta', e => {
    try { renderMetaEvent(JSON.parse(e.data)); } catch (_) {}
  });

  es.onopen = () => {
    connEl.textContent = 'live';
    connEl.className = 'ok';
  };

  es.onerror = () => {
    connEl.textContent = 'reconnecting…';
    connEl.className = 'err';
    es.close();
    // EventSource auto-reconnects; we close and reopen to reset the label
    setTimeout(connect, 3000);
  };
}

connect();

// ── Player input — no escape ──
// Enter sends immediately. Inactivity for 30s auto-appends "…" and sends.
const inputEl  = document.getElementById('player-input');
const hintEl   = document.getElementById('input-hint');

const AUTO_SEND_MS = 30000;
let _autoTimer   = null;
let _countdown   = 0;
let _tickTimer   = null;
let _sending     = false;

function _clearTimers() {
  clearTimeout(_autoTimer);
  clearInterval(_tickTimer);
  _autoTimer = _tickTimer = null;
  hintEl.textContent = '';
  hintEl.classList.remove('urgent');
}

function _startCountdown() {
  _clearTimers();
  if (!inputEl.value.trim()) return;
  _countdown = Math.round(AUTO_SEND_MS / 1000);
  hintEl.textContent = _countdown + 's';
  _tickTimer = setInterval(() => {
    _countdown--;
    hintEl.textContent = _countdown > 0 ? _countdown + 's' : '';
    if (_countdown <= 10) hintEl.classList.add('urgent');
  }, 1000);
  _autoTimer = setTimeout(() => {
    let text = inputEl.value.trim();
    if (text) sendInput(text + '…');
  }, AUTO_SEND_MS);
}

async function sendInput(overrideText) {
  if (_sending) return;
  const text = overrideText || inputEl.value.trim();
  if (!text) return;
  _sending = true;
  _clearTimers();
  inputEl.value = '';
  try {
    await fetch('/player-input', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text}),
    });
  } catch (_) {}
  _sending = false;
  inputEl.focus();
}

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendInput();
    return;
  }
});

// Restart countdown on every keystroke that leaves text in the box
inputEl.addEventListener('input', () => {
  if (inputEl.value.trim()) {
    _startCountdown();
  } else {
    _clearTimers();
  }
});
</script>
</body>
</html>
