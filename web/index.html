  color: rgba(200,240,255,0.85);
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#entity-suggest li:hover,
#entity-suggest li.active { background: rgba(100,200,255,0.12); }
#entity-suggest li .es-type {
  font-size: 10px;
  color: rgba(100,200,255,0.45);
  margin-left: 6px;
}

/* ── Discovery notes — slide-in entity cards ── */
#discovery-notes {
  position: fixed;
  right: 16px;
  top: 80px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 900;
  pointer-events: none;
  width: 270px;
}
.disc-note {
  background: #111118;
  border: 1px solid rgba(0,200,255,0.28);
  border-radius: 6px;
  padding: 8px 10px;
  pointer-events: auto;
  cursor: pointer;
  animation: discSlideIn 0.3s ease;
  transition: opacity 0.6s;
  user-select: none;
}
.disc-note:hover { border-color: rgba(0,200,255,0.55); }
.disc-note.fading { opacity: 0; }
.disc-note .dn-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 3px;
}
.disc-note .dn-keyword {
  font-size: 12px;
  font-weight: bold;
  color: #fff;
  font-family: 'Courier New', monospace;
  letter-spacing: 0.04em;
}
.disc-note .dn-badge {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 10px;
  background: rgba(0,200,255,0.14);
  color: rgba(100,220,255,0.75);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.disc-note .dn-prose {
  font-size: 10px;
  color: rgba(200,220,240,0.5);
  line-height: 1.4;
}
.disc-note .dn-hint {
  font-size: 9px;
  color: rgba(100,200,255,0.35);
  margin-top: 4px;
}
@keyframes discSlideIn {
  from { transform: translateX(40px); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}

/* ── Item / Inventory continuation chooser ── */
#item-chooser {
  position: absolute;
  bottom: 100%;
  left: 0;
  right: 0;
  background: #0f0f18;
  border: 1px solid rgba(100,200,255,0.30);
  border-radius: 6px 6px 0 0;
  margin-bottom: 2px;
  z-index: 500;
  display: none;
  flex-direction: column;
  max-height: 260px;
  overflow: hidden;
}
#item-chooser.open { display: flex; }
#item-chooser-title {
  padding: 6px 12px 4px;
  font-size: 10px;
  letter-spacing: 0.5px;
  font-weight: bold;
  color: rgba(100,200,255,0.55);
  border-bottom: 1px solid rgba(100,200,255,0.12);
  flex-shrink: 0;
}
#item-chooser-title span {
  font-weight: normal;
  font-style: italic;
  color: rgba(200,240,255,0.40);
  margin-left: 6px;
}
#item-chooser-filter {
  flex-shrink: 0;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(100,200,255,0.12);
  color: var(--ink);
  font: inherit;
  font-size: 12px;
  padding: 5px 12px;
  outline: none;
}
#item-chooser-filter::placeholder { color: rgba(255,255,255,0.20); }
#item-chooser-list {
  list-style: none;
  overflow-y: auto;
  flex: 1;
}
#item-chooser-list li {
  padding: 6px 12px;
  font-size: 12px;
  color: rgba(200,240,255,0.85);
  cursor: pointer;
  display: flex;
  gap: 10px;
  align-items: baseline;
}
#item-chooser-list li:hover,
#item-chooser-list li.active {
  background: rgba(100,200,255,0.10);
  color: rgba(200,240,255,1);
}
#item-chooser-list li .ic-name { flex: 1; }
#item-chooser-list li .ic-type {
  font-size: 10px;
  color: rgba(100,200,255,0.40);
}
#item-chooser-list li .ic-key {
  font-size: 10px;
  color: rgba(255,255,255,0.18);
  font-family: monospace;
}
/* Continuation stage indicator on textarea */
#player-input[data-cont="awaiting_item"]  { border-color: rgba(255,200,50,0.70); box-shadow: 0 0 0 2px rgba(255,200,50,0.10); }
#player-input[data-cont="awaiting_rest"]  { border-color: rgba(100,255,150,0.60); box-shadow: 0 0 0 2px rgba(100,255,150,0.10); }

/* ── Splash overlay ── */
#splash-overlay {
  position: fixed; inset: 0; z-index: 9000;
  background: #070710;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.9s ease;
}
#splash-overlay.splash-hidden { opacity: 0; pointer-events: none; }
.splash-inner {
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; max-width: 520px; width: 90%; text-align: center;
}
.splash-logo {
  font-size: 2.4rem; letter-spacing: 0.35em; color: #c8a96e;
  font-weight: 300; text-transform: uppercase; margin-bottom: 6px;
}
#splash-mode-label {
  font-size: 0.72rem; letter-spacing: 0.25em; color: #556; text-transform: uppercase;
  margin-bottom: 18px;
}
#splash-mode-label.mode-continue { color: #7fa; }
.splash-steps { display: flex; flex-direction: column; gap: 6px; width: 100%; }
.splash-step {
  font-size: 0.8rem; color: #444; transition: color 0.4s, opacity 0.4s;
  opacity: 0.5; letter-spacing: 0.05em;
}
.splash-step.s-active  { color: #c8a96e; opacity: 1; }
.splash-step.s-done    { color: #4a9; opacity: 0.8; }
.splash-step.s-done::before { content: '✓ '; }
#splash-summary {
  margin-top: 22px; min-height: 56px; max-width: 460px;
  color: #a0a0b8; font-style: italic; font-size: 0.88rem;
  line-height: 1.65; opacity: 0;
  transition: opacity 0.6s ease 0.2s;
}
#splash-summary.visible { opacity: 1; }
</style>
</head>
<body>

<!-- ── Splash overlay — shown on every page load and after world reset ── -->
<div id="splash-overlay">
  <div class="splash-inner">
    <div class="splash-logo">The Fortress</div>
    <div id="splash-mode-label">INITIALISING…</div>
    <div class="splash-steps">
      <div class="splash-step" id="step-services">Warming up The Fortress…</div>
      <div class="splash-step" id="step-memories">Reviewing memories…</div>
      <div class="splash-step" id="step-visuals">Preparing visuals…</div>
    </div>
    <div id="splash-summary"></div>
  </div>
</div>

<div id="app">

  <!-- ── Status bar: simple face (click→dev) / dev face (click hide→simple) ── -->
  <div id="status-bar">

    <!-- Simple face: big amber status, left-justified, whole bar is clickable -->
    <div id="status-simple" title="Click to open diagnostics">
      <span id="status-dot"></span>
      <span id="status-text">Ready</span>
    </div>

    <!-- Dev face: star trek lights + hide button -->
    <div id="status-dev">
      <div class="light-cluster" id="all-lights">
        <div class="light-wrap" id="light-story" data-tip="Story — Ollama · diag · always on">
          <div class="light-dot"></div><span class="light-label">story</span></div>
        <div class="light-wrap toggleable" id="light-image" data-tip="Image — SD scenes &amp; portraits · click to toggle">
          <div class="light-dot"></div><span class="light-label">image</span></div>
        <div class="light-wrap toggleable" id="light-audio" data-tip="Audio — MusicGen, TTS, STT · click to toggle">
          <div class="light-dot"></div><span class="light-label">audio</span></div>
        <div class="light-wrap" id="light-gpu"  data-tip="GPU utilisation">
          <div class="light-dot"></div><span class="light-label">gpu</span></div>
        <div class="light-wrap" id="light-vram" data-tip="VRAM usage">
          <div class="light-dot"></div><span class="light-label">vram</span></div>
        <div class="light-wrap" id="light-cpu"  data-tip="CPU utilisation">
          <div class="light-dot"></div><span class="light-label">cpu</span></div>
        <div class="light-wrap" id="light-ram"  data-tip="System RAM">
          <div class="light-dot"></div><span class="light-label">ram</span></div>
        <div class="light-wrap" id="light-conn" data-tip="SSE connection">
          <div class="light-dot"></div><span class="light-label">conn</span></div>
        <span class="light-turn-count" id="narrator-turn-count" title="narrator turns this session">T0</span>
      </div>
      <button id="hide-dev-btn" title="Back to status view">hide the madness</button>
    </div>

  </div>
  <div id="activity-label"></div>

  <!-- ── Main area: narrative feed + image gallery ── -->
  <div id="main-area">
    <div id="feed">
      <div id="empty-msg">Waiting for The Fortress…</div>
    </div>

    <div id="gallery-panel">
      <div id="gallery-current">
        <img id="gallery-img" src="/game/assets/fortress-interior.jpg" alt="Current scene" title="Click to regenerate">
        <div id="gallery-status"></div>
        <div id="speech-bubble" role="status" aria-live="polite" aria-atomic="true">
          <div id="bubble-speaker"></div>
          <div id="bubble-text"></div>
        </div>
      </div>
      <div id="npc-presence"></div>
      <div id="gallery-thumbs"></div>
    </div>
  </div>

  <!-- ── Input bar ── -->
  <div id="bottombar" style="position:relative;">
    <!-- Entity autocomplete suggest (small, appears while typing) -->
    <ul id="entity-suggest"></ul>
    <!-- Item / Inventory continuation chooser (full-width, multi-stage voice input) -->
    <div id="item-chooser">
      <div id="item-chooser-title">CHOOSE ITEM <span>↑↓ or speak · Tab cycles · Enter/click selects · Esc cancels</span></div>
      <input id="item-chooser-filter" type="text" placeholder="filter…" autocomplete="off" spellcheck="false">
      <ul id="item-chooser-list"></ul>
    </div>
    <textarea id="player-input" rows="2" placeholder="Speak, act, or perceive…"></textarea>
    <span id="input-hint"></span>
  </div>
</div>

<script>
const feed     = document.getElementById('feed');
const emptyMsg = document.getElementById('empty-msg');
let _lastLocation = '';
let _thinkTimer   = null;
const _pendingPlayerTexts = new Set();

// ── NPC voice pool — Kokoro voices for character dialogue ─────────────────
// Permanent crew have pinned voices that match their personality.
// All other speakers get a deterministic voice from the pool via name hash.
const _PINNED_VOICES = {
  'The Remnant':  'am_echo',    // sharp, crisp, rapid-fire — arrogant AI
  'The Fortress': 'af_heart',   // warm American female — gentle, vast, primary narrator
  'Sherri':       'af_sarah',   // warm American female — cheerful automaton
};

const _NPC_VOICES = [
  'af_sarah', 'am_adam', 'bf_emma',  'bm_george',
  'af_heart', 'am_echo', 'bf_alice', 'bm_lewis',
  'af_nicole', 'am_eric',
];
const _speakerVoiceCache = new Map();

function _voiceForSpeaker(name) {
  // Permanent crew always get their canonical voice
  if (_PINNED_VOICES[name]) return _PINNED_VOICES[name];
  if (_speakerVoiceCache.has(name)) return _speakerVoiceCache.get(name);
  let h = 0;
  for (const c of (name || 'NPC')) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  const v = _NPC_VOICES[h % _NPC_VOICES.length];
  _speakerVoiceCache.set(name, v);
  return v;
}

// Speaker portrait map — defaults from static assets, updated by SSE meta portrait events.
// '__player__' is the player's avatar (SVG inline, no file needed).
// Canonical portraits live in web/assets/characters/ (tracked in git, !web/assets/** in .gitignore).
const _PLAYER_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='8' r='4' fill='%2364b5f6' opacity='0.75'/%3E%3Cpath d='M4 21v-1a8 8 0 0 1 16 0v1' fill='%2364b5f6' opacity='0.5'/%3E%3C/svg%3E";

const _portraitMap = {
  'Narrator':     '/game/assets/characters/the-fortress.png',
  'The Fortress': '/game/assets/characters/the-fortress.png',
  'The Remnant':  '/game/assets/characters/the-remnant-true-form.jpg',
  'Sherri':       '/game/assets/characters/sherri-galley.jpg',
  '__player__':   _PLAYER_AVATAR,
};

/**
 * Look up a portrait URL for a speaker name.
 * Tries exact match first, then word-overlap fallback so "Artisan Kaelo"
 * matches a map entry keyed as "Kaelo" or vice-versa.
 */
function _lookupPortrait(name) {
  if (!name) return '';
  if (_portraitMap[name]) return _portraitMap[name];
  const parts = name.trim().split(/\s+/);
  for (const [k, v] of Object.entries(_portraitMap)) {
    if (k === '__player__') continue;
    const kparts = k.split(/\s+/);
    if (parts.some(p => kparts.includes(p))) return v;
  }
  return '';
}

// Scene image URL saved before a character portrait swaps in, so we can restore it.
let _preSpeakerImg = null;

// ── Comic speech bubble helpers ──────────────────────────────────────────────

function _showCharacterBubble(speakerName, text) {
  const portrait = _lookupPortrait(speakerName);

  // Crossfade gallery to character portrait (save scene image on first swap per turn)
  if (portrait) {
    const currentSrc = galleryImg.src || '';
    // Only save if it's not already a character portrait (avoids overwriting on multi-char turns)
    if (!_preSpeakerImg && !currentSrc.includes('/characters/')) {
      _preSpeakerImg = currentSrc;
    }
    if (galleryImg.getAttribute('data-speaker') !== speakerName) {
      galleryImg.style.opacity = '0';
      setTimeout(() => {
        galleryImg.src = portrait;
        galleryImg.setAttribute('data-speaker', speakerName);
        galleryImg.style.opacity = '1';
      }, 180);
      // Add SD-generated portraits (data URLs) to gallery history.
      // Skip static asset paths (/game/assets/…) — they render as broken thumbs.
      if (_galleryHistory && typeof _renderGalleryThumbs === 'function' && portrait.startsWith('data:')) {
        _galleryHistory.unshift({dataUrl: portrait, ts: Date.now(), kind: 'character', description: speakerName});
        if (_galleryHistory.length > 20) _galleryHistory.pop();
        _renderGalleryThumbs();
      }
    }
  }

  // Fill and show the bubble
  const bubble = document.getElementById('speech-bubble');
  document.getElementById('bubble-speaker').textContent = speakerName;
  document.getElementById('bubble-text').textContent = text;
  bubble.classList.remove('fading');
  bubble.classList.add('visible');
}

function _hideCharacterBubble(restoreScene) {
  const bubble = document.getElementById('speech-bubble');
  bubble.classList.remove('visible');
  bubble.classList.add('fading');
  setTimeout(() => bubble.classList.remove('fading'), 520);

  if (restoreScene && _preSpeakerImg) {
    const prev = _preSpeakerImg;
    _preSpeakerImg = null;
    // Brief portrait linger (600ms) before restoring scene image
    setTimeout(() => {
      galleryImg.style.opacity = '0';
      galleryImg.removeAttribute('data-speaker');
      setTimeout(() => {
        galleryImg.src = prev;
        galleryImg.style.opacity = '1';
      }, 200);
    }, 600);
  } else if (restoreScene) {
    galleryImg.removeAttribute('data-speaker');
    _preSpeakerImg = null;
  }
}

// Current player name — set by player_alias / player_switch meta events.
let _playerName = 'You';

// Track last rendered speaker to suppress repeated avatar/label.
let _lastSpeaker = '';

// NPC presence map — name → {name, description, portraitUrl}
// Populated by INTRODUCE markers; cleared on location change.
const _presentNPCs = new Map();

// ── Console light helpers ──
function _setLight(id, state, tipSuffix) {
  const el = document.getElementById('light-' + id);
  if (!el) return;
  // Lock to 'off' when the sense for this light is disabled by the user
  if ((id === 'audio' && !_sense.audio) || (id === 'image' && !_sense.image)) {
    state = 'off';
  }
  // Use classList so we preserve extra classes (toggleable, sense-off, etc.)
  el.classList.remove('idle', 'active', 'busy', 'off');
  if (state) el.classList.add(state);
  if (tipSuffix !== undefined) {
    const base = (el.dataset.tip || '').split(' ·')[0].trim();
    el.dataset.tip = base + (tipSuffix ? ' · ' + tipSuffix : '');
  }
}

function _setResourceLight(id, pct, tipSuffix) {
  if (pct == null) return;
  const state = pct < 5 ? 'idle' : pct >= 85 ? 'busy' : 'active';
  _setLight(id, state, tipSuffix);
}

// Pre-wrap text locally so optimistic render matches SSE echo.
function _localWrap(text) {
  const t = text.trim();
  if (t.startsWith('"'))  return { channel: 'say', wrapped: t.endsWith('"') ? t : t + '"' };
  if (t.startsWith("'"))  return { channel: 'say', wrapped: t };
  if (t.startsWith('*'))  return { channel: 'do',  wrapped: t.endsWith('*') ? t : t + '*' };
  if (t.startsWith('['))  return { channel: 'sense', wrapped: t };
  return { channel: 'do', wrapped: '*' + t + '*' };
}

function esc(s) {
  return String(s).replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

// ── NPC presence ──
const _introduceRe = /\[INTRODUCE\(([^)]+)\)\s*:\s*"?([^"\]\n]+)"?\]/gi;

// Names that are narrator/ambient voices — never shown in the NPC presence shelf.
const _NARRATOR_NAMES = new Set(['The Fortress','The Remnant','Narrator','Fortress','Remnant']);

function _renderNpcPresence() {
  const el = document.getElementById('npc-presence');
  if (!el) return;
  el.innerHTML = '';
  const visible = [..._presentNPCs.values()].filter(n => !_NARRATOR_NAMES.has(n.name));
  if (visible.length === 0) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  for (const npc of visible) {
    const wrap = document.createElement('div');
    wrap.className = 'npc-avatar-wrap';
    wrap.dataset.tip = npc.description || npc.name;
    const portraitUrl = npc.portraitUrl || _lookupPortrait(npc.name);
    if (portraitUrl) {
      const img = document.createElement('img');
      img.className = 'npc-avatar-img';
      img.src = portraitUrl;
      img.alt = npc.name;
      wrap.appendChild(img);
      wrap.style.cursor = 'pointer';
      wrap.addEventListener('click', () => {
        galleryImg.style.opacity = '0';
        setTimeout(() => {
          galleryImg.src = portraitUrl;
          galleryImg.title = npc.name;
          galleryImg.style.opacity = '1';
        }, 150);
      });
    } else {
      wrap.classList.add('no-portrait');
      wrap.dataset.initial = (npc.name[0] || '?').toUpperCase();
    }
    const label = document.createElement('span');
    label.className = 'npc-avatar-label';
    label.textContent = npc.name.split(' ')[0];
    wrap.appendChild(label);
    el.appendChild(wrap);
  }
}

function _extractIntroductions(rawText) {
  if (!rawText) return;
  _introduceRe.lastIndex = 0;
  let m;
  let changed = false;
  while ((m = _introduceRe.exec(rawText)) !== null) {
    const name = m[1].trim();
    const desc = m[2].trim();
    if (!_presentNPCs.has(name)) {
      _presentNPCs.set(name, {
        name,
        description: desc,
        portraitUrl: _lookupPortrait(name),
      });
      changed = true;
    }
  }
  if (changed) _renderNpcPresence();
}

function _removeThinking() {
  const el = document.getElementById('thinking-indicator');
  if (el) el.remove();
  if (_thinkTimer) { clearTimeout(_thinkTimer); _thinkTimer = null; }
  _setLight('story', 'idle');
  _setThinking(false);
}

// ── Turn dedup — prevents double-render on SSE reconnect ──────────────────
const _renderedTurnIds = new Set();

function renderTurn(turn, instant) {
  // Deduplicate by turn_id: SSE reconnect replays history which can cause
  // the same turn to appear from both the live 'turn' event AND 'history'.
  if (turn.turn_id) {
    if (_renderedTurnIds.has(turn.turn_id)) return;
    _renderedTurnIds.add(turn.turn_id);
    if (_renderedTurnIds.size > 500) {
      _renderedTurnIds.delete(_renderedTurnIds.values().next().value);
    }
  }

  const blocks = turn.parsed_blocks || [];
  let added = 0;
  const isNarratorTurn = blocks.some(b => !b.isPlayer);

  if (isNarratorTurn && !instant) _removeThinking();

  if (isNarratorTurn) {
    const loc = (turn.context || {}).location || '';
    if (loc && loc !== _lastLocation) {
      _lastLocation = loc;
      _lastSpeaker = ''; // reset so first speaker after location break shows avatar
      // Location changed — clear NPCs (they haven't followed unless re-introduced)
      _presentNPCs.clear();
      _renderNpcPresence();
      const locEl = document.createElement('div');
      locEl.className = 'meta-event' + (instant ? '' : ' arriving');
      locEl.innerHTML =
        '<span class="meta-label">LOCATION</span>' +
        '<span class="meta-text">' + esc(loc) + '</span>';
      feed.appendChild(locEl);
      added++;
    }
    // Extract NPC introductions from raw text
    _extractIntroductions(turn.raw_text || '');
    // Fire discovery notes for any known entity mentioned in this narrator turn
    _scanNarratorTextForDiscovery(turn.raw_text || '');
  }

  // Build entries and TTS segment list in a single pass so each DOM element
  // can be paired with its audio segment for post-speech dissolve.
  const segments  = []; // {text, voice, speakerName}
  const _proseEls = []; // narrator prose divs — collapsed to one-liner after TTS plays
  for (const b of blocks) {
    const text = (b.text || '').trim();
    if (!text) continue;
    // Skip blocks that are purely system tags (3+ uppercase chars after [).
    // Short format tags like [B], [I], [BI], [C=...] are display tags — keep them.
    if (/^\[[A-Z][A-Z_]{2,}/.test(text) && !b.isPlayer) continue;

    const div = document.createElement('div');
    div.className = 'entry';

    if (b.senseType) {
      div.classList.add('sense-' + b.senseType.toLowerCase());
    } else if (b.channel) {
      div.classList.add(b.channel);
    }
    if (b.isPlayer) div.classList.add('is-player');
    if (!instant) div.classList.add('arriving');

    const isCharacter = b.channel === 'character';
    if (isCharacter) div.classList.add('character-line');
    const speaker = b.isPlayer
      ? (_playerName || 'You')
      : (isCharacter ? (b.speaker || 'NPC') : (turn.narrator_name || 'The Fortress'));
    const avatarUrl = b.isPlayer ? (_portraitMap['__player__'] || _PLAYER_AVATAR) : _lookupPortrait(speaker);
    const speakerChanged = speaker !== _lastSpeaker;
    _lastSpeaker = speaker;
    div.innerHTML =
      '<img class="entry-avatar' + (!speakerChanged || !avatarUrl ? ' hidden' : '') + '"' +
      (b.isPlayer ? ' data-player-avatar="1"' : '') +
      ' src="' + (avatarUrl ? esc(avatarUrl) : '') + '" alt="">' +
      '<span class="entry-speaker"' + (!speakerChanged ? ' style="visibility:hidden"' : '') + '>' + esc(speaker) + '</span>' +
      '<span class="entry-text">' + _formatText(text) + '</span>';

    feed.appendChild(div);
    added++;

    // Collect TTS segments — only non-player, non-sense lines are spoken.
    // Character lines appear in BOTH the text feed (permanent) and the comic
    // speech bubble overlaid on the character portrait (transient, tied to TTS).
    if (!b.isPlayer && !b.senseType) {
      const isCharSeg = b.channel === 'character';
      const voice = isCharSeg
        ? _voiceForSpeaker(b.speaker || 'NPC')
        : 'am_michael';
      // ALL feed entries are permanent — the text feed is the story transcript.
      // Speech bubbles are the transient visual; TTS is the transient audio.
      // Narrator prose collapses to a dim one-liner after being voiced (click to expand).
      segments.push({
        text,
        voice,
        speakerName: isCharSeg ? (b.speaker || 'NPC') : null,
      });
      if (!isCharSeg) {
        // Track prose divs for post-TTS collapse; click toggles expand.
        _proseEls.push(div);
        div.addEventListener('click', () => {
          if (div.classList.contains('spoken')) div.classList.toggle('expanded');
        });
      }
    }
  }

  if (added) {
    emptyMsg.style.display = 'none';
    feed.scrollTop = feed.scrollHeight;
  }

  // Sense receipt chips — compact dim row confirming which sense channels
  // were captured and written into entity memory this turn.
  if (isNarratorTurn && !instant && added) {
    const rawUp = (turn.raw_text || '').toUpperCase();
    const CHIP_META = {
      sight: '👁', smell: '👃', sound: '👂',
      touch: '✋', taste: '👅', environment: '🌐',
    };
    const chips = [];
    const seenSense = new Set();
    for (const b of blocks) {
      const st = b.senseType ? b.senseType.toLowerCase() : null;
      if (st && !seenSense.has(st)) {
        seenSense.add(st);
        chips.push({type: st, text: (b.text || '').replace(/<[^>]+>/g, '').trim()});
      }
    }
    // Mood and image from raw tags
    const moodMatch = (turn.raw_text || '').match(/\[MOOD\s*:\s*"([^"]+)"\]/i);
    if (moodMatch) chips.push({type: 'mood', text: moodMatch[1]});
    if (rawUp.includes('[GENERATE_IMAGE')) chips.push({type: 'image', text: 'image generating…'});

    if (chips.length) {
      const receipt = document.createElement('div');
      receipt.className = 'sense-receipt arriving';
      receipt.innerHTML = chips.map(c => {
        const icon = CHIP_META[c.type] || (c.type === 'mood' ? '🎵' : '🖼');
        const preview = c.text.slice(0, 55) + (c.text.length > 55 ? '…' : '');
        return `<span class="sense-chip chip-${c.type}" title="${esc(c.text)}">${icon} ${esc(preview)}</span>`;
      }).join('');
      feed.appendChild(receipt);
    }
  }

  // Speak narrator + NPC text for new (non-history) turns, then dissolve
  // character lines from the feed once their audio has finished playing.
  if (!instant && isNarratorTurn) {
    const myTTSGen = ++_ttsGenId;
    const wasStreamed = (_chunkTurnId === (turn.turn_id || ''));

    if (_sense.audio && segments.length) {
      if (wasStreamed) {
        // Prose already enqueued via chunk events; only add character dialogue here.
        // Character segments are identified by having speakerName (not fadeAfter — that's gone).
        const charSegs = segments.filter(s => s.speakerName);
        charSegs.forEach(seg =>
          _ttsEnqueue(_stripForTTS(seg.text), seg.voice, myTTSGen, seg.speakerName));
      } else {
        // Non-streamed: clear stale audio and enqueue everything fresh.
        _ttsClearTurn();
        segments.forEach(seg =>
          _ttsEnqueue(_stripForTTS(seg.text), seg.voice, myTTSGen, seg.speakerName));
      }
      // Sentinel: fires ttsReady once all this turn's audio has played.
      // Also collapses narrator prose to dim one-liners (click any to re-expand).
      _ttsQ.push({_cb: () => {
        if (_ttsGenId === myTTSGen) {
          _turnState.ttsReady = true;
          _checkTurnComplete();
          _proseEls.forEach(el => el.classList.add('spoken'));
        }
      }});
      if (!_ttsActive) _ttsNext();
    } else {
      _turnState.ttsReady = true;
      _checkTurnComplete();
    }

    // If no image tag present, image won't arrive — mark imageReady immediately
    // so green border isn't blocked on a scene_image that will never come.
    const hasImageTag = (turn.raw_text || '').toUpperCase().includes('[GENERATE_IMAGE');
    if (!hasImageTag) {
      _turnState.imageReady = true;
      _flushPendingMood();
      _checkTurnComplete();
    }
  }
}

function renderMetaEvent(data) {
  const el = document.createElement('div');
  el.className = 'meta-event';
  if (!data.type) return;

  if (data.type === 'portrait' && data.name && data.url) {
    _portraitMap[data.name] = data.url;
    // Update any NPC whose name fuzzy-matches (handles "Artisan Kaelo" ↔ "Kaelo" etc.)
    const nameParts = data.name.trim().split(/\s+/);
    let npcsUpdated = false;
    for (const [k, npc] of _presentNPCs.entries()) {
      const kparts = k.trim().split(/\s+/);
      if (k === data.name || kparts.some(p => nameParts.includes(p))) {
        npc.portraitUrl = data.url;
        npcsUpdated = true;
      }
    }
    if (npcsUpdated) _renderNpcPresence();
  }

  if ((data.type === 'player_alias' || data.type === 'player_switch' || data.type === 'player_restore') && data.name) {
    _playerName = data.name;
    _lastSpeaker = ''; // force avatar to show on next player turn
  }

  if (data.type === 'player_portrait' && data.url) {
    // Sherri finished outfitting — replace SVG placeholder with real SD portrait
    _portraitMap['__player__'] = data.url;
    _lastSpeaker = ''; // force re-render with new avatar on next player turn
    // Backfill: update all already-rendered player avatar imgs in the feed
    document.querySelectorAll('img[data-player-avatar="1"]').forEach(img => {
      img.src = data.url;
      img.classList.remove('hidden');
    });
  }

  if (data.type === 'reset' && (data.level === 'world' || data.level === 'all')) {
    // World reset — clear discovery note session state so entities can re-fire
    _discoveryFired.clear();
    // Remove any lingering discovery note cards from previous session
    const dn = document.getElementById('discovery-notes');
    if (dn) dn.innerHTML = '';
    // Re-show splash briefly to signal the fresh start
    _showResetSplash(data.level);
  }

  const label = data.type === 'reset'           ? 'RESET:' + (data.level || 'scene').toUpperCase()
              : data.type === 'portrait'         ? 'PORTRAIT'
              : data.type === 'portrait_saved'   ? 'FOREVER'
              : data.type === 'player_alias'     ? 'ALIAS'
              : data.type === 'player_switch'    ? 'NEW PLAYER'
              : data.type === 'player_restore'   ? 'RESTORED'
              : data.type === 'player_dressed'   ? 'DRESSED'
              : data.type === 'player_portrait'  ? 'AVATAR'
              :                                    'FOREVER';
  const text = data.name || data.text || (data.url ? data.url.split('/').pop() : '');
  el.innerHTML =
    '<span class="meta-label">' + esc(label) + '</span>' +
    '<span class="meta-text">' + esc(text) + '</span>';
  feed.appendChild(el);
  emptyMsg.style.display = 'none';
  feed.scrollTop = feed.scrollHeight;
}

// ── Scene background removed — gallery panel handles scene images ──

async function loadLatestSceneImage() {
  try {
    const res = await fetch('/scene-image');
    if (!res.ok) return;
    const data = await res.json();
    if (data && data.image) {
      _setGalleryImage(data.image, data.kind, data.description);
    }
  } catch (_) {}
}

// ── Gallery ──
const galleryImg    = document.getElementById('gallery-img');
const galleryStatus = document.getElementById('gallery-status');
const galleryThumbs = document.getElementById('gallery-thumbs');
const _galleryHistory = [];

function _setGalleryImage(dataUrl, kind, description) {
  // Clear any pending-regen blur so the incoming image arrives cleanly.
  galleryImg.classList.remove('regen-pending');
  galleryImg.style.opacity = '0';
  setTimeout(() => {
    galleryImg.src = dataUrl;
    galleryImg.style.opacity = '1';
    if (description) galleryImg.title = description;
  }, 200);
  _galleryHistory.unshift({dataUrl, ts: Date.now(),
                            kind: kind || 'location',
                            description: description || ''});
  if (_galleryHistory.length > 20) _galleryHistory.pop();
  _renderGalleryThumbs();
  // Persist gallery so it survives a page reload (best-effort; fails silently on quota).
  try { localStorage.setItem('remnant_gallery', JSON.stringify(_galleryHistory.slice(0, 10))); } catch (_) {}
}

function _renderGalleryThumbs() {
  galleryThumbs.innerHTML = '';
  _galleryHistory.forEach((item, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'thumb-wrap' + (i === 0 ? ' active' : '');

    const img = document.createElement('img');
    img.src = item.dataUrl;
    img.className = 'gallery-thumb';
    if (item.description) img.title = item.description;
    img.addEventListener('click', () => {
      galleryImg.src = item.dataUrl;
      if (item.description) galleryImg.title = item.description;
      galleryThumbs.querySelectorAll('.thumb-wrap').forEach(w => w.classList.remove('active'));
      wrap.classList.add('active');
    });

    wrap.appendChild(img);
    galleryThumbs.appendChild(wrap);
  });
}

// Restore gallery from previous session (best-effort).
// Done here — after _renderGalleryThumbs and galleryImg are defined — so the
// gallery strip is populated immediately on load, before SSE events arrive.
try {
  const _saved = JSON.parse(localStorage.getItem('remnant_gallery') || '[]');
  if (Array.isArray(_saved) && _saved.length) {
    _galleryHistory.push(..._saved);
    _renderGalleryThumbs();
    const _first = _galleryHistory[0];
    if (_first) {
      galleryImg.src = _first.dataUrl;
      if (_first.description) galleryImg.title = _first.description;
    }
  }
} catch (_) {}

// Click main gallery image → blur it in-place and request regeneration.
// The blurred original stays visible while SD renders; incoming scene_image SSE
// clears the filter and swaps the image normally.
galleryImg.addEventListener('click', async () => {
  if (galleryImg.classList.contains('regen-pending')) return; // already pending
  galleryImg.classList.add('regen-pending');
  const desc = galleryImg.title || '';
  try {
    await fetch('/regenerate-scene', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({description: desc}),
    });
  } catch (_) {
    galleryImg.classList.remove('regen-pending'); // server error — restore
  }
});

// Music skip — right-click audio sense icon to crossfade to next track
function _skipToNextTrack() {
  const keys = Object.keys(_STATIC_TRACKS);
  if (!keys.length) return;
  const next = keys.find(k => k !== _currentMoodText) || keys[0];
  _currentMoodText = next;
  _onMoodEvent(next);
}
document.getElementById('light-audio').addEventListener('contextmenu', e => {
  e.preventDefault();
  _skipToNextTrack();
});

// ── Topbar polling ──
async function _pollServiceStatus() {
  try {
    const res = await fetch('/diagnostics/ai.json');
    if (!res.ok) return;
    const data = await res.json();
    const svcs = data.services || {};
    const ollamaModel = (data.environment || {}).OLLAMA_MODEL || 'llm';

    const _svcState = (svc) => {
      const probe = (svcs[svc] || {}).probe || {};
      const sf    = (svcs[svc] || {}).status_file || {};
      const phase = sf.phase || (probe.reachable ? 'ready' : 'down');
      return { phase, probe, reachable: probe.reachable, lat: probe.latency_ms };
    };

    const ollama = _svcState('ollama');
    const st     = _svcState('sillytavern');
    const sd     = _svcState('flask-sd');

    // story = any text processing service reachable (Ollama, SillyTavern)
    _setLight('story', ollama.reachable ? 'idle' : 'off',
              `Story · ${ollamaModel} · ${ollama.phase}` + (ollama.lat ? ` · ${Math.round(ollama.lat)}ms` : ''));
    _setLight('image', sd.reachable ? 'idle' : 'off',
              `Image · SD · ${sd.phase}` + (sd.lat ? ` · ${Math.round(sd.lat)}ms` : ''));
    // audio = tts + stt + music consolidated
    const music = _svcState('flask-music');
    const audioUp = svcs['tts'] || svcs['stt'] || music.reachable;
    const audioTip = [
      svcs['tts']      ? 'TTS'           : null,
      svcs['stt']      ? 'STT'           : null,
      music.reachable  ? 'MusicGen'      : null,
    ].filter(Boolean).join(', ') || 'none';
    _setLight('audio', audioUp ? 'idle' : 'off', `Audio · ${audioTip}`);
  } catch(_) {}
}

async function _pollSystemMetrics() {
  try {
    const res = await fetch('/system-metrics');
    if (!res.ok) return;
    const d = await res.json();
    if (d.gpu)  _setResourceLight('gpu',  d.gpu.util_pct,
                  `${d.gpu.name} · ${d.gpu.util_pct}%`);
    if (d.gpu)  _setResourceLight('vram', Math.round(d.gpu.vram_used_mb * 100 / d.gpu.vram_total_mb),
                  `${(d.gpu.vram_used_mb/1024).toFixed(1)}G / ${Math.round(d.gpu.vram_total_mb/1024)}G`);
    if (d.cpu)  _setResourceLight('cpu',  d.cpu.pct, `${d.cpu.pct}%`);
    if (d.ram)  _setResourceLight('ram',  d.ram.pct, `${(d.ram.used_mb/1024).toFixed(1)}G`);
  } catch(_) {}
}

// ── SSE connection ──
function connect() {
  const es = new EventSource('/game/events');

  // Narrator turn counter — counts non-player turns received this session.
  let _narratorTurnCount = 0;
  function _updateNarratorCount() {
    const el = document.getElementById('narrator-turn-count');
    if (el) el.textContent = `T${_narratorTurnCount}`;
  }

  // ── Streaming prose chunks ─────────────────────────────────────────────────
  // The backend streams narrator prose sentences as "chunk" SSE events while
  // Ollama is still generating.  We queue them for sequential TTS so the player
  // hears the scene description within seconds instead of waiting for the full
  // response.  When the "turn" event arrives, character dialogue is appended to
  // the same sequential chain — narrator prose plays first, dialogue after.
  let _chunkTurnId = null;         // turn_id of the turn currently being streamed

  es.addEventListener('chunk', e => {
    try {
      const c = JSON.parse(e.data);
      if (!_sense.audio) return;
      const text = _stripForTTS(c.text || '');
      if (!text) return;
      if (_chunkTurnId !== c.turn_id) {
        // New streaming turn — drain pending queue but let current utterance finish.
        // Clearing the queue prevents stale prose from the previous turn continuing
        // to play, but stopping _ttsSource would cut off the current word mid-syllable.
        _chunkTurnId = c.turn_id;
        _ttsQ.length = 0;
        _ttsSeenTexts.clear();
        _ttsLoopGen++; // invalidate any pending _ttsNext loop
        _ttsActive = false;
        // Note: _ttsSource is intentionally NOT stopped — current word plays to completion.
      }
      _ttsEnqueue(text, 'am_michael', undefined, null, 0.55);
    } catch (_) {}
  });

  es.addEventListener('history', e => {
    try {
      const turns = JSON.parse(e.data);
      for (const t of turns) {
        renderTurn(t, true);
        if (!(t.parsed_blocks || []).some(b => b.isPlayer)) _narratorTurnCount++;
      }
      _updateNarratorCount();
      feed.scrollTop = feed.scrollHeight;
      // Startup music: play intro theme then crossfade to Sherri's Routine.
      // Small delay so the page is visually settled before audio starts.
      setTimeout(_playStartupSequence, 800);
      // Magnetic Thrum: station ambient hum starts slightly after music,
      // fades in slowly over 6s at 4% gain.
      setTimeout(_startMagneticThrum, 2000);
    } catch (_) {}
  });

  es.addEventListener('turn', e => {
    try {
      const turn = JSON.parse(e.data);
      const isPlayerTurn = (turn.parsed_blocks || []).some(b => b.isPlayer);
      if (isPlayerTurn) {
        // Adopt the optimistic element rendered by sendInput() rather than using
        // fragile text-comparison (client and server may wrap differently: DO *…* vs SAY "…").
        const optimEl = feed.querySelector('.is-player[data-pending]');
        if (optimEl) {
          const rawText = (turn.raw_text || '').trim();
          if (rawText) optimEl.querySelector('.entry-text').textContent = rawText;
          optimEl.removeAttribute('data-pending');
          _pendingPlayerTexts.clear();
          if (turn.turn_id) _renderedTurnIds.add(turn.turn_id);
          return;
        }
        // No optimistic element — history replay or multi-client; fall through to renderTurn()
      } else {
        _narratorTurnCount++;
        _updateNarratorCount();
        // Reset per-turn sense completion tracking for green border
        _turnState = { imageReady: false, ttsReady: false, musicReady: false, pendingMoodPrompt: null };
      }
      renderTurn(turn, false);
    } catch (_) {}
  });

  es.addEventListener('meta', e => {
    try { renderMetaEvent(JSON.parse(e.data)); } catch (_) {}
  });

  es.addEventListener('scene_image', e => {
    try {
      const data = JSON.parse(e.data);
      if (data.image && _sense.image) {
        _setGalleryImage(data.image, data.kind, data.description);
        galleryStatus.textContent = '';
      }
      // GPU scheduling: image generation (flask-sd) is done; GPU is now free
      // for music generation (flask-music on CUDA). Fire any buffered mood prompt.
      _turnState.imageReady = true;
      _flushPendingMood();
      _checkTurnComplete();
    } catch (_) {}
  });

  es.addEventListener('scene_caption', e => {
    try {
      const data = JSON.parse(e.data);
      if (data.caption && _galleryHistory.length) {
        _galleryHistory[0].description = data.caption;
        const thumbs = galleryThumbs.querySelectorAll('.thumb-wrap .gallery-thumb');
        if (thumbs.length) thumbs[0].title = data.caption;
        if (galleryImg.src === _galleryHistory[0].dataUrl) galleryImg.title = data.caption;
      }
    } catch (_) {}
  });

  es.addEventListener('activity', e => {
    try {
      const data = JSON.parse(e.data);
      const text = data.text || '';
      document.getElementById('activity-label').textContent = text;
      const lc = text.toLowerCase();
      if (lc.includes('image') || lc.includes('render') || lc.includes('scene') ||
          lc.includes('portrait') || lc.includes('sketch') || lc.includes('paint') || lc.includes('repaint')) {
        _setLight('image', text ? 'busy' : 'idle');
        _setStatus('painting', !!text);
        galleryStatus.textContent = text || '';
      } else if (lc.includes('thinking') || lc.includes('narrator') || lc.includes('continuing') ||
                 lc.includes('music') || lc.includes('mood') || lc.includes('tts') || lc.includes('speech')) {
        _setLight('story', text ? 'busy' : 'idle');
        if (lc.includes('music') || lc.includes('mood') || lc.includes('tts') || lc.includes('speech')) {
          _setLight('audio', text ? 'busy' : 'idle');
        }
      }
      if (!text) {
        _setLight('image', 'idle');
        _setLight('story', 'idle');
        _setLight('audio', 'idle');
        _setStatus('painting', false);
        galleryStatus.textContent = '';
      }
    } catch (_) {}
  });

  es.addEventListener('sense', e => {
    try {
      const data = JSON.parse(e.data);
      if (!data.channel || !data.text) return;
      const div = document.createElement('div');
      div.className = 'sense-line';
      div.dataset.channel = data.channel.toLowerCase();
      div.innerHTML = `<span class="sense-tag">[${data.channel.toUpperCase()}]</span> <span class="sense-body">${data.text}</span>`;
      feed.appendChild(div);
      feed.scrollTop = feed.scrollHeight;
      // Sense info is transient — dissolve after 14s so it doesn't clutter the feed
      setTimeout(() => div.classList.add('fading-out'), 14000);
    } catch (_) {}
  });

  es.addEventListener('lore_whisper', e => {
    try {
      const data = JSON.parse(e.data);
      if (!data.text) return;
      const el = document.createElement('div');
      el.className = 'entry lore-whisper arriving';
      el.innerHTML = '<span class="lore-icon">📖</span><span class="entry-text">' + _formatText(data.text) + '</span>';
      feed.appendChild(el);
      feed.scrollTop = feed.scrollHeight;
      // Lore is permanent — no fade. Voice follows the Fortress pin.
      // Route through the TTS queue so it doesn't cut off narrator speech.
      // speakerName=null (no character bubble for lore), volume=0.55 (whispered).
      if (_sense.audio) {
        const fortressVoice = _PINNED_VOICES['The Fortress'] || 'af_heart';
        _ttsEnqueue(_stripForTTS(data.text), fortressVoice, 0, null, 0.55);
      }
    } catch (_) {}
  });

  es.addEventListener('npc_greeting', e => {
    try {
      const data = JSON.parse(e.data);
      if (!data.text || !_sense.audio) return;
      // Play greeting in the NPC's voice after narrator TTS finishes.
      // Route through queue so it doesn't cut off narrator speech.
      const voice = _PINNED_VOICES[data.name] || _voiceForSpeaker(data.name);
      _ttsEnqueue(_stripForTTS(data.text), voice, 0, data.name);
    } catch (_) {}
  });

  es.addEventListener('mood', e => {
    try {
      const data = JSON.parse(e.data);
      if (!data.text) return;
      // GPU scheduling: buffer mood prompt until image generation is done.
      // flask-sd (image) and flask-music both need GPU; run them sequentially.
      _turnState.pendingMoodPrompt = data.text;
      if (_turnState.imageReady) {
        _flushPendingMood();           // image already done — fire immediately
      }
      // else: _flushPendingMood() will be called when scene_image arrives
    } catch (_) {}
  });

  es.addEventListener('sfx', e => {
    try {
      const data = JSON.parse(e.data);
      if (data.text && _sense.audio) _onSfxEvent(data.text);
    } catch (_) {}
  });

  es.onopen = () => {
    _setLight('conn', 'active');
    loadLatestSceneImage();
    _pollServiceStatus();
    _pollSystemMetrics();
    // Signal splash that The Fortress is connected
    if (window._splashServicesDone) {
      window._splashServicesDone();
      window._splashServicesDone = null;
    }
  };

  es.onerror = () => {
    _setLight('conn', 'busy');
    es.close();
    setTimeout(connect, 3000);
  };
}

// ── Sense toggles ──
const _sense = { audio: true, image: true };

// ── Status bar flip ──
let _devOpen = localStorage.getItem('remnant-dev') === '1';

function _flipToDev() {
  _devOpen = true;
  localStorage.setItem('remnant-dev', '1');
  document.getElementById('status-bar').classList.add('dev-open');
}
function _flipToSimple() {
  _devOpen = false;
  localStorage.setItem('remnant-dev', '0');
  document.getElementById('status-bar').classList.remove('dev-open');
}

function _initLightToggles() {
  // Apply persisted state
  if (_devOpen) document.getElementById('status-bar').classList.add('dev-open');

  // Simple face → flip to dev on click
  const simple = document.getElementById('status-simple');
  if (simple) simple.addEventListener('click', _flipToDev);

  // "hide the madness" → flip back to simple
  const hideBtn = document.getElementById('hide-dev-btn');
  if (hideBtn) hideBtn.addEventListener('click', _flipToSimple);

  function _toggleSense(id, key) {
    const el = document.getElementById('light-' + id);
    if (!el) return;
    el.addEventListener('click', () => {
      _sense[key] = !_sense[key];
      el.classList.toggle('sense-off', !_sense[key]);
      if (!_sense[key]) {
        // Disabling — kill any in-flight activity
        if (key === 'audio') {
          if (_ttsAbort)  { _ttsAbort.abort();  _ttsAbort  = null; }
          if (_ttsSource) { try { _ttsSource.stop(); } catch (_) {} _ttsSource = null; }
          if (_musicGain && _audioCtx) {
            _musicGain.gain.linearRampToValueAtTime(0, _audioCtx.currentTime + 0.5);
            const old = _musicSource;
            setTimeout(() => { try { old.stop(); } catch (_) {} }, 700);
            _musicSource = null; _musicGain = null;
          }
          _setStatus('speaking', false);
          _setStatus('composing', false);
        }
        _setLight(id, 'off');   // _setLight will lock to 'off' while sense is false
      } else {
        // Re-enabling — let service status restore naturally on next poll
        _setLight(id, 'idle');
      }
    });
  }
  _toggleSense('audio', 'audio');
  _toggleSense('image', 'image');
}

// ── System status widget (always-on — culmination of all activity) ──
// Priority order: thinking > painting > speaking > composing > transcribing > listening > idle
const _STATUS_PRIORITY = ['thinking','painting','speaking','composing','transcribing','listening'];
const _STATUS_META = {
  thinking:     { text: 'Thinking…',     color: '#4488ff' },
  painting:     { text: 'Painting…',     color: '#cc44cc' },
  speaking:     { text: 'Speaking…',     color: '#ff8844' },
  composing:    { text: 'Composing…',    color: '#ff8844' },
  transcribing: { text: 'Transcribing…', color: '#ff8844' },
  listening:    { text: 'Listening…',    color: 'rgba(255,136,68,0.45)' },
  idle:         { text: 'Ready',         color: 'rgba(255,255,255,0.10)' },
};

const _activeStatuses = new Set();
const _statusDot  = document.getElementById('status-dot');
const _statusText = document.getElementById('status-text');

function _updateStatus() {
  let current = 'idle';
  for (const key of _STATUS_PRIORITY) {
    if (_activeStatuses.has(key)) { current = key; break; }
  }
  const meta    = _STATUS_META[current] || _STATUS_META.idle;
  const isActive = current !== 'idle';
  if (_statusDot) {
    _statusDot.style.background = meta.color;
    _statusDot.style.boxShadow  = isActive ? `0 0 7px 2px ${meta.color}` : 'none';
    _statusDot.style.setProperty('--lc', meta.color);
    _statusDot.classList.toggle('pulsing', isActive && current !== 'listening');
  }
  if (_statusText) {
    _statusText.textContent = meta.text;
    _statusText.classList.toggle('active', isActive);
  }
}

function _setStatus(key, active) {
  if (active) _activeStatuses.add(key);
  else        _activeStatuses.delete(key);
  _updateStatus();
}

// Backward-compat shim: _setThinking used by _removeThinking and sendInput
function _setThinking(active) { _setStatus('thinking', active); }

// ── Text formatting helpers ───────────────────────────────────────────────────

/**
 * Strip all formatting and system tags from text before sending to TTS.
 * The TTS engine reads [B], *, ** etc. aloud — strip them all.
 */
function _stripForTTS(text) {
  return text
    // Strip display-format tags: [B], [/B], [I], [/I], [BI], [/BI], [C=...], [/C]
    .replace(/\[\/?(B|I|BI|C(?:=[^\]]*)?)\]/gi, '')
    // Strip any remaining system tags like [MOOD(...)], [SOUND(...)] etc.
    .replace(/\[[^\]]{1,80}\]/g, '')
    // Strip markdown bold/italic: **word** → word, *word* → word
    .replace(/\*{1,3}([^*\n]*?)\*{1,3}/g, '$1')
    // Strip markdown underline: _word_ → word
    .replace(/_{1,2}([^_\n]*?)_{1,2}/g, '$1')
    // Strip stray unmatched markers
    .replace(/[*_]/g, '')
    // Collapse extra whitespace
    .replace(/\s{2,}/g, ' ')
    .trim();
}

/**
 * Format text for display: HTML-escape, then convert square-bracket
 * formatting tags to HTML.  Also converts any leaked markdown to HTML
 * as a fallback so it at least renders correctly rather than showing raw *.
 */
function _formatText(text) {
  // 0. Strip any machine directive tags the server may have missed (e.g. GENERATEIMAGE without underscore,
  //    or tags appearing mid-prose that bypass the line-start filter).
  text = text.replace(/\[\/?\s*[A-Z][A-Z_]{2,}(?:\([^)]*\))?\s*(?::\s*"[^"]*")?\]/g, '').trim();
  // 1. HTML-escape (handles &, <, >, ")
  let s = esc(text);
  // 2. Square-bracket display tags → HTML (order matters: BI before B/I)
  s = s.replace(/\[BI\]([\s\S]*?)\[\/BI\]/gi, '<strong><em>$1</em></strong>');
  s = s.replace(/\[B\]([\s\S]*?)\[\/B\]/gi,   '<strong>$1</strong>');
  s = s.replace(/\[I\]([\s\S]*?)\[\/I\]/gi,   '<em>$1</em>');
  s = s.replace(/\[C=([^\]]+)\]([\s\S]*?)\[\/C\]/gi, '<span class="c-$1">$2</span>');
  // 3. Fallback: convert leaked markdown so it at least renders
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g,     '<em>$1</em>');
  return s;
}

// ── TTS engine ──
let _ttsSource            = null;
let _ttsAbort             = null;
let _ttsGenId             = 0;   // incremented each turn; old speech loops stop when stale
let _ttsEchoCooldownUntil = 0;   // ms timestamp; VAD blocked until this passes (post-TTS echo)

// ── TTS governor state (shared by connect() SSE handlers + top-level functions) ──
const _ttsQ = [];                // pending items: {text,voice,ttsGen,speakerName} | {_cb}
let _ttsActive = false;          // true while _ttsNext loop owns the queue
const _ttsSeenTexts = new Set(); // dedup within a turn boundary
let _ttsLoopGen = 0;             // incremented on clear; stale loops self-terminate

// ── TTS governor functions ──────────────────────────────────────────
// _ttsEnqueue  — add one item to the queue; kick off loop if idle
// _ttsNext     — drain loop (one active instance at a time)
// _ttsClearTurn — stop current audio, drain queue, reset dedup

function _ttsEnqueue(text, voice, ttsGen, speakerName, volume) {
  const key = `${voice || 'am_michael'}:${text}`;
  if (!text || !text.trim() || _ttsSeenTexts.has(key)) return;
  _ttsSeenTexts.add(key);
  _ttsQ.push({
    text,
    voice: voice || 'am_michael',
    ttsGen: ttsGen || 0,
    speakerName: speakerName || null,
    volume: (volume !== undefined) ? volume : (speakerName ? 1.05 : 0.55),
  });
  if (!_ttsActive) _ttsNext();
}

async function _ttsNext() {
  if (_ttsActive) return;           // another instance is already running
  _ttsActive = true;
  const myGen = ++_ttsLoopGen;
  while (_ttsQ.length) {
    if (_ttsLoopGen !== myGen) break; // superseded by _ttsClearTurn
    const item = _ttsQ.shift();
    if (item._cb) { item._cb(); continue; }
    const {text, voice, ttsGen, speakerName, volume} = item;
    if (!_sense.audio) continue;
    if (ttsGen && _ttsGenId !== ttsGen) continue; // stale turn

    // Voice-specific speed: The Fortress speaks slowly for gravitas
    const speed = (voice === 'af_heart') ? 0.88 : 1.0;

    if (speakerName) {
      // Comic bubble path: show portrait + bubble, speak, hide bubble after.
      // Peek ahead: if the next item is also a character line, keep the portrait
      // and only restore the scene image after the LAST speaker in this turn.
      const nextItem = _ttsQ.length > 0 ? _ttsQ[0] : null;
      const nextIsChar = nextItem && !nextItem._cb && nextItem.speakerName;
      _showCharacterBubble(speakerName, text);
      await _speakTTS(text, voice, speed, volume);
      if (_ttsLoopGen !== myGen) break;
      _hideCharacterBubble(/*restoreScene=*/ !nextIsChar);
    } else {
      await _speakTTS(text, voice, speed, volume);
      if (_ttsLoopGen !== myGen) break;
      // Nothing to fade — feed entries are permanent.
    }
  }
  if (_ttsLoopGen === myGen) _ttsActive = false;
}

function _ttsClearTurn() {
  _ttsQ.length = 0;
  _ttsSeenTexts.clear();
  if (_ttsAbort) { _ttsAbort.abort(); _ttsAbort = null; }
  if (_ttsSource) { try { _ttsSource.stop(); } catch (_) {} _ttsSource = null; }
  _ttsActive = false;
  _ttsLoopGen++; // invalidate any running loop
  // If a speech bubble was visible when audio was cleared, hide it immediately
  _hideCharacterBubble(/*restoreScene=*/ true);
}

function _speakTTS(text, voice = 'am_michael', speed = 1.0, volume = 0.85) {
  // Cancel any in-flight TTS request and stop any playing speech
  if (_ttsAbort) { _ttsAbort.abort(); _ttsAbort = null; }
  if (_ttsSource) { try { _ttsSource.stop(); } catch (_) {} _ttsSource = null; }
  if (!_sense.audio) return Promise.resolve();

  return new Promise(resolve => {
    const ctrl = new AbortController();
    _ttsAbort = ctrl;
    _setLight('audio', 'busy');
    _setStatus('speaking', true);
    const done = () => { _setLight('audio', 'idle'); _setStatus('speaking', false); resolve(); };

    // Hard timeout: if flask-tts doesn't respond within 15s the queue would
    // freeze forever.  Abort and continue to the next item instead.
    const _ttsTimeout = setTimeout(() => {
      console.warn('[tts] timeout — skipping item');
      ctrl.abort();
    }, 15_000);
    const doneClear = () => { clearTimeout(_ttsTimeout); done(); };

    fetch('/api/tts/v1/audio/speech', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({model: 'kokoro', input: text, voice, speed}),
      signal: ctrl.signal,
    })
    .then(res => { if (!res.ok) { doneClear(); return null; } return res.arrayBuffer(); })
    .then(buf => {
      if (!buf) return;
      clearTimeout(_ttsTimeout);
      const ctx = _ensureAudioCtx();
      ctx.decodeAudioData(buf).then(audio => {
        const src = ctx.createBufferSource();
        src.buffer = audio;
        // Route through a gain node so TTS volume is balanced with music/SFX.
        // Narrator prose uses 0.55 (muted whisper), NPC dialogue uses 1.05 (direct, full).
        const gain = ctx.createGain();
        gain.gain.value = volume;
        src.connect(gain);
        gain.connect(ctx.destination);
        src.onended = () => {
          _ttsSource = null; _ttsAbort = null;
          // Echo cooldown: block VAD for 1.8s after TTS ends so room reverb
          // doesn't get transcribed as player speech ("Thank you very much…").
          _ttsEchoCooldownUntil = Date.now() + 1800;
          done();
        };
        _ttsSource = src;
        src.start();
      }).catch(() => doneClear());
    })
    .catch(e => {
      if (e.name !== 'AbortError') console.warn('[tts]', e);
      doneClear();
    });
  });
}

// ── Music engine (Web Audio API) ──────────────────────────────────────────
let _audioCtx    = null;
let _musicSource = null;
let _musicGain   = null;
let _currentMoodText  = null;   // track active mood for bridge generation
let _startupDone      = false;  // true after startup sequence completes/skips

// SFX channel — looping SFX sources keyed by description (for dedup + stop)
const _sfxSources = new Map();

// ── Permanent world music tracks (static files, bypasses MusicGen) ────────
// Generated once, stored in web/assets/music/, served from /game/assets/music/.
// Canonical descriptions and generation prompts live in docker/diag/seed/world.json.
const _STATIC_TRACKS = {
  'heart-of-null-space': '/game/assets/music/heart-of-null-space.wav',
  'sherris-routine':     '/game/assets/music/sherris-routine.wav',
  'breach-chiral-foam':  '/game/assets/music/breach-chiral-foam.wav',
  'archives-drift':      '/game/assets/music/archives-drift.wav',
  'lower-depths':        '/game/assets/music/lower-depths.wav',
  'terravore-breath':    '/game/assets/music/terravore-breath.wav',
};

// Keyword matchers: if a mood text contains any of these, serve the static track
// instead of generating via MusicGen.
const _MOOD_TO_TRACK = [
  { id: 'breach-chiral-foam',  keys: ['action', 'intense', 'breach', 'claustrophobic', 'danger', 'threat', 'primal fire', 'forge'] },
  { id: 'heart-of-null-space', keys: ['cosmic', 'null space', 'crystalline resonance', 'awe', 'dimensional', 'arrival tension', 'black hole', 'void', 'vast'] },
  { id: 'sherris-routine',     keys: ['kitchen', 'clockwork', 'workshop', 'mechanical tinkering', 'fabrication', 'inspection', 'cozy industrial', 'lo-fi mechanical'] },
  { id: 'archives-drift',      keys: ['archives', 'research wing', 'contemplative', 'decaying grandeur', 'observatory', 'equilibrium', 'data crystal', 'ancient waiting'] },
  { id: 'lower-depths',        keys: ['lower decks', 'lower depths', 'industrial unease', 'gantry', 'dripping', 'sub-bass rumble', 'machinery fault', 'depths'] },
  { id: 'terravore-breath',    keys: ['terravore', 'alien woodwind', 'bio-rhythmic', 'root network', 'canopy', 'star-eater', 'living braid', 'organic pulse'] },
];

function _matchStaticTrack(moodText) {
  if (!moodText) return null;
  const lower = moodText.toLowerCase();
  for (const { id, keys } of _MOOD_TO_TRACK) {
    if (keys.some(k => lower.includes(k))) return id;
  }
  return null;
}

function _ensureAudioCtx() {
  if (!_audioCtx) _audioCtx = new AudioContext();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

// Fetch audio and decode into an AudioBuffer.
// For canonical mood texts that match a static track, serves the pre-generated
// file directly; otherwise falls through to MusicGen generation.
async function _fetchMusicBuffer(prompt, duration, endpoint = '/api/music/generate') {
  // Static track shortcut — serve pre-generated WAV, skip MusicGen entirely
  const staticId = _matchStaticTrack(prompt);
  if (staticId && _STATIC_TRACKS[staticId]) {
    try {
      const res = await fetch(_STATIC_TRACKS[staticId]);
      if (res.ok) {
        const ctx = _ensureAudioCtx();
        const buf = await ctx.decodeAudioData(await res.arrayBuffer());
        console.log(`[music] static: ${staticId}`);
        return { buffer: buf, loops: true };
      }
    } catch (_) {}   // fall through to MusicGen on any fetch error
  }
  // Dynamic generation via MusicGen
  const res = await fetch(endpoint, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({prompt, duration}),
  });
  if (!res.ok) throw new Error(`music HTTP ${res.status}`);
  const data = await res.json();
  if (!data.audio) throw new Error('no audio field');
  const loops = data.loops ?? false;  // sfx endpoint returns this flag
  const bytes = Uint8Array.from(atob(data.audio), c => c.charCodeAt(0));
  const ctx = _ensureAudioCtx();
  const buf = await ctx.decodeAudioData(bytes.buffer.slice(0));
  return {buffer: buf, loops};
}

// ── Startup music sequence ────────────────────────────────────────────────
// Plays "The Heart of Null Space" as the opening theme, then crossfades into
// "Sherri's Routine" when the intro finishes. Called once on first history load.
async function _playStartupSequence() {
  if (_startupDone || !_sense.audio) return;
  _startupDone = true;
  try {
    // Fetch both tracks in parallel so the crossfade is seamless
    const [introRes, relaxedRes] = await Promise.all([
      fetch(_STATIC_TRACKS['heart-of-null-space']),
      fetch(_STATIC_TRACKS['sherris-routine']),
    ]);
    if (!introRes.ok || !relaxedRes.ok) return;
    const ctx = _ensureAudioCtx();
    const [introBuf, relaxedBuf] = await Promise.all([
      ctx.decodeAudioData(await introRes.arrayBuffer()),
      ctx.decodeAudioData(await relaxedRes.arrayBuffer()),
    ]);
    // Start the intro theme
    _playMusicBuffer(introBuf);
    _currentMoodText = 'heart-of-null-space';
    console.log('[music] intro: The Heart of Null Space');
    // Schedule crossfade to Sherri's Routine 4s before the intro loop restarts,
    // so the transition feels intentional rather than abrupt.
    const fadeAt = Math.max((introBuf.duration - 4) * 1000, 5000);
    setTimeout(() => {
      if (_currentMoodText === 'heart-of-null-space') {
        _playMusicBuffer(relaxedBuf);
        _currentMoodText = 'sherris-routine';
        console.log("[music] crossfade: Sherri's Routine");
      }
    }, fadeAt);
  } catch (e) {
    console.warn('[music] startup sequence failed:', e);
  }
}

// Replace the looping ambient music track (crossfade over 2s).
// Starts at 0.08 (barely audible) so there's no stone-silent gap at the seam,
// then ramps to 0.72 — louder and more present than the old 0.55 ceiling.
function _playMusicBuffer(audioBuffer) {
  const ctx = _ensureAudioCtx();
  const newGain = ctx.createGain();
  newGain.gain.setValueAtTime(0.08, ctx.currentTime);
  newGain.gain.linearRampToValueAtTime(0.72, ctx.currentTime + 2);
  newGain.connect(ctx.destination);
  const src = ctx.createBufferSource();
  src.buffer = audioBuffer;
  src.loop = true;
  src.connect(newGain);
  src.start();
  if (_musicGain) {
    _musicGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 2);
    const old = _musicSource;
    setTimeout(() => { try { old.stop(); } catch (_) {} }, 3000);
  }
  _musicSource = src;
  _musicGain   = newGain;
}

// Play a once-only clip (bridge or SFX), returns a Promise that resolves when done.
function _playOnce(audioBuffer, {volume = 0.45, loop = false} = {}) {
  return new Promise(resolve => {
    const ctx = _ensureAudioCtx();
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.connect(ctx.destination);
    const src = ctx.createBufferSource();
    src.buffer = audioBuffer;
    src.loop   = loop;
    src.connect(gain);
    src.onended = () => {
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
      resolve(src);
    };
    src.start();
    return src;
  });
}


function _renderMoodAsText(moodText) {
  const el = document.createElement('div');
  el.className = 'mood-entry arriving';
  el.innerHTML =
    '<span class="mood-label">MOOD</span>' +
    '<span class="mood-text">' + esc(moodText) + '</span>';
  feed.appendChild(el);
  emptyMsg.style.display = 'none';
  feed.scrollTop = feed.scrollHeight;
}

// ── Per-turn sense completion state (for green border) ─────────────────────
// Reset on each new narrator turn; updated as each sense channel completes.
let _turnState = { imageReady: false, ttsReady: false, musicReady: false, pendingMoodPrompt: null };

function _flushPendingMood() {
  const prompt = _turnState.pendingMoodPrompt;
  if (prompt) {
    _turnState.pendingMoodPrompt = null;
    _onMoodEvent(prompt);
  }
}

function _checkTurnComplete() {
  // Green border appears when image + TTS + music have all reported ready.
  // TTS marks itself done via _turnState.ttsReady when audio ends.
  // Music marks itself done when buffer starts playing.
  if (_turnState.imageReady && _turnState.ttsReady && _turnState.musicReady) {
    const inp = document.getElementById('player-input');
    if (inp) {
      inp.classList.add('turn-complete');
      setTimeout(() => inp.classList.remove('turn-complete'), 2500);
    }
  }
}

async function _onMoodEvent(moodText) {
  if (!_sense.audio) {
    _renderMoodAsText(moodText);
    _turnState.musicReady = true;
    _checkTurnComplete();
    return;
  }

  _setLight('audio', 'busy');
  _setStatus('composing', true);

  const oldMood = _currentMoodText;
  _currentMoodText = moodText;

  try {
    const isStaticNew = !!_matchStaticTrack(moodText);
    const isStaticOld = !!_matchStaticTrack(oldMood);

    if (oldMood && oldMood !== moodText && _musicSource) {
      if (isStaticNew || isStaticOld) {
        // ── Static track transition — crossfade directly, no MusicGen bridge ─
        // Static tracks crossfade cleanly via _playMusicBuffer's 4s ramp.
        const {buffer} = await _fetchMusicBuffer(moodText, 30);
        _playMusicBuffer(buffer);
      } else {
        // ── DJ transition: bridge + new preview in parallel ──────────────────
        // Bridge prompt describes the transition between moods so the music
        // flows like a DJ mix rather than cutting abruptly.
        const bridgePrompt =
          `smooth musical bridge, transitioning from: ${oldMood}, ` +
          `gradually shifting into: ${moodText}, ` +
          `seamless tempo and key continuity, 5 seconds`;

        // Request bridge (5s) and new preview (8s) simultaneously.
        const [bridgeResult, previewResult] = await Promise.allSettled([
          _fetchMusicBuffer(bridgePrompt, 5),
          _fetchMusicBuffer(moodText, 8),
        ]);

        // Fade current track down while bridge plays (keep at 0.28, not 0.12,
        // so there's always audible music — not a near-silence gap).
        if (_musicGain) {
          const ctx = _ensureAudioCtx();
          _musicGain.gain.linearRampToValueAtTime(0.28, ctx.currentTime + 0.8);
        }
        if (bridgeResult.status === 'fulfilled') {
          await _playOnce(bridgeResult.value.buffer, {volume: 0.50});
        }
        if (previewResult.status === 'fulfilled') {
          _playMusicBuffer(previewResult.value.buffer);
        }
      }
    } else {
      // ── Fresh start — serve static immediately, or quick 8s MusicGen preview
      const {buffer} = await _fetchMusicBuffer(moodText, isStaticNew ? 60 : 8);
      _playMusicBuffer(buffer);
    }

    _setLight('audio', 'idle');
    _setStatus('composing', false);
    _turnState.musicReady = true;
    _checkTurnComplete();

    // ── Phase 2: upgrade to 30s loop in background (dynamic moods only) ────
    // Generates while the 8s preview loops; swaps in seamlessly when ready.
    // Skipped for static tracks — they're already full-length.
    if (!isStaticNew) {
      _fetchMusicBuffer(moodText, 30).then(({buffer}) => {
        if (_currentMoodText === moodText) {   // mood hasn't changed since we started
          _playMusicBuffer(buffer);
          console.log('[music] upgraded to 30s loop');
        }
      }).catch(() => {});
    }

  } catch (e) {
    console.warn('[music]', e);
    _setLight('audio', 'off');
    _setStatus('composing', false);
    _turnState.musicReady = true;
    _checkTurnComplete();
  }
}

function _matchStaticSfx(description) {
  if (!description) return null;
  const lower = description.toLowerCase();
  for (const { id, keys } of _SFX_KEYWORDS) {
    if (keys.some(k => lower.includes(k))) return id;
  }
  return null;
}

// ── Magnetic Thrum — global ambient loop ─────────────────────────────────
// The station's constant low-level hum. Starts when audio is first enabled,
// loops forever at 4% gain — barely perceptible, just felt.
let _thrumSource = null;
let _thrumGain   = null;

async function _startMagneticThrum() {
  if (_thrumSource || !_sense.audio) return;
  try {
    const res = await fetch(_STATIC_SFX['magnetic-thrum']);
    if (!res.ok) return;
    const ctx = _ensureAudioCtx();
    const buf = await ctx.decodeAudioData(await res.arrayBuffer());
    _thrumGain = ctx.createGain();
    _thrumGain.gain.setValueAtTime(0, ctx.currentTime);
    _thrumGain.gain.linearRampToValueAtTime(0.04, ctx.currentTime + 6);
    _thrumGain.connect(ctx.destination);
    _thrumSource = ctx.createBufferSource();
    _thrumSource.buffer = buf;
    _thrumSource.loop   = true;
    _thrumSource.connect(_thrumGain);
    _thrumSource.start();
    console.log('[sfx] magnetic thrum started');
  } catch (e) {
    console.warn('[sfx] thrum failed:', e);
  }
}

// SFX play at lower volume on a separate gain node.
// Looping SFX (engines, fans, etc.) are stored so they can be stopped
// when a new turn starts with a different scene.
async function _onSfxEvent(description) {
  try {
    let audioBuffer, shouldLoop;

    // Static SFX shortcut — serve pre-generated file, skip MusicGen
    const staticId = _matchStaticSfx(description);
    if (staticId && _STATIC_SFX[staticId]) {
      const res = await fetch(_STATIC_SFX[staticId]);
      if (res.ok) {
        const ctx = _ensureAudioCtx();
        audioBuffer  = await ctx.decodeAudioData(await res.arrayBuffer());
        // Looping SFX: conveyor, magnetic-thrum (if triggered explicitly), barrier-warning
        shouldLoop = ['conveyor-rattle','barrier-warning'].includes(staticId);
        console.log(`[sfx] static: ${staticId} loop=${shouldLoop}`);
      }
    }

    if (!audioBuffer) {
      // Dynamic generation via MusicGen
      const res = await fetch('/api/music/sfx', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt: description, duration: 4}),
      });
      if (!res.ok) return;
      const data = await res.json();
      if (!data.audio) return;
      const bytes = Uint8Array.from(atob(data.audio), c => c.charCodeAt(0));
      const ctx = _ensureAudioCtx();
      audioBuffer = await ctx.decodeAudioData(bytes.buffer.slice(0));
      shouldLoop  = !!data.loops;
    }

    const ctx = _ensureAudioCtx();

    // Stop any previous looping SFX with the same description
    if (shouldLoop && _sfxSources.has(description)) {
      try { _sfxSources.get(description).stop(); } catch (_) {}
    }

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.30, ctx.currentTime + 1.0);
    gain.connect(ctx.destination);

    const src = ctx.createBufferSource();
    src.buffer = audioBuffer;
    src.loop   = shouldLoop;
    src.connect(gain);
    src.start();

    if (shouldLoop) {
      _sfxSources.set(description, src);
      src.onended = () => _sfxSources.delete(description);
    } else {
      // Fade out one-shot SFX gracefully at the end
      const fadeStart = ctx.currentTime + audioBuffer.duration - 0.5;
      if (fadeStart > ctx.currentTime) {
        gain.gain.setValueAtTime(0.30, fadeStart);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + audioBuffer.duration);
      }
    }
  } catch (e) {
    console.warn('[sfx]', e);
  }
}

async function initSplash() {
  const overlay   = document.getElementById('splash-overlay');
  if (!overlay) { connect(); return; }
  const modeLabel = document.getElementById('splash-mode-label');
  const summaryEl = document.getElementById('splash-summary');

  const startedAt = Date.now();

  // Step 1: fetch session state (fast, no Ollama)
  _stepSplash('step-services', 's-active');
  let session = { mode: 'new', sorting_hat_ready: false, turns: 0 };
  try {
    const r = await fetch('/session-state');
    if (r.ok) session = await r.json();
  } catch (_) {}

  if (modeLabel) {
    if (session.mode === 'continue') {
      modeLabel.textContent = 'CONTINUING YOUR JOURNEY';
      modeLabel.classList.add('mode-continue');
    } else {
      modeLabel.textContent = 'NEW JOURNEY';
    }
  }

  // Step 2: SSE connection (connect() fires in parallel — signals via _splashServicesDone)
  window._splashServicesDone = () => _stepSplash('step-services', 's-done');
  connect();  // start SSE connection now; splash stays up over it

  _stepSplash('step-services', 's-done');

  // Step 3: memories — only fetch summary if continuing
  _stepSplash('step-memories', 's-active');
  let summary = '';
  if (session.mode === 'continue' && session.turns > 2) {
    try {
      const r = await fetch('/session-summary');
      if (r.ok) {
        const data = await r.json();
        summary = (data.summary || '').trim();
      }
    } catch (_) {}
  }
  _stepSplash('step-memories', 's-done');
  if (summary && summaryEl) {
    summaryEl.textContent = summary;
    summaryEl.classList.add('visible');
  }

  // Step 4: visuals — fire prewarm request (fire-and-forget)
  _stepSplash('step-visuals', 's-active');
  fetch('/player-input', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text: '__prewarm__', prewarm: true }),
  }).catch(() => {});
  await new Promise(r => setTimeout(r, 900));
  _stepSplash('step-visuals', 's-done');

  // Enforce minimum splash duration
  const elapsed = Date.now() - startedAt;
  if (elapsed < _SPLASH_MIN_MS) {
    await new Promise(r => setTimeout(r, _SPLASH_MIN_MS - elapsed));
  }

  // Dismiss
  overlay.classList.add('splash-hidden');
  setTimeout(() => { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 950);
}
