# Remnant nginx — native dev variant.
#
# Runs in a lightweight nginx:1.27-alpine container published on
# ${HOST_PORT:-1580}, and proxies to services running natively on
# the developer's host machine (flask-sd, ollama, sillytavern, diag)
# via host.docker.internal. This gives native dev the same unified
# single-origin entry point as the docker stack does at :1582, so
# the extension's /diagnostics/ai.json same-origin fetch works
# identically in both environments.
#
# This config also hosts the "librarian" locations (/hf/, /pypi/,
# /npm/, /pytorch/, /ollama-dl/) that make nginx the SINGLE EGRESS
# KEYHOLE for the native dev environment — the exact same invariant
# the docker stack enforces at :1582. Host-side package managers
# (hf_hub, pip, npm) are pointed at localhost:1580/<librarian>/ via
# scripts/native-env.sh, so no dev-side process ever makes a
# direct request to the public internet.
#
# Design parity with docker/nginx/nginx.conf:
#   /                       — splash passthrough (static HTML)
#   /app/                   — reverse proxy to host SillyTavern
#   /socket.io/             — SillyTavern websocket passthrough
#   /diagnostics/           — static dashboard + diag sidecar keyholes
#   /diagnostics/ai.json    — diag /ai.json
#   /diagnostics/actions    — diag /actions (+ POST)
#   /api/flask-sd/          — passthrough to host flask-sd
#   /api/ollama/            — passthrough to host ollama
#   /status/                — shared status json directory
#   /health                 — liveness ping
#   /hf/, /hf-lfs/, /hf-xet/ — HuggingFace passthrough (hf_hub caches client-side)
#   /pypi/                  — pip wheels cache
#   /npm/                   — npm tarballs cache
#   /pytorch/               — pytorch wheels cache
#   /ollama-dl/             — ollama.com static assets cache

worker_processes  1;
events { worker_connections 256; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # ST's POST /api/settings/save payload can be many MB once a user
    # has characters, chats, and extension state. Default 1m truncates
    # it with 413. Also covers character PNG uploads, background
    # uploads, and chat imports.
    client_max_body_size 200m;

    # Upstream cache — mirrors docker/nginx/nginx.conf proxy_cache_path.
    # Stored inside the container; ephemeral across restarts. Not worth
    # bind-mounting to the host in native dev since hf_hub (the biggest
    # consumer) caches in its own ~/.cache/huggingface on the host.
    proxy_cache_path /var/cache/nginx/upstream
                     levels=1:2
                     keys_zone=upstream_cache:64m
                     max_size=10g
                     inactive=365d
                     use_temp_path=off;

    server {
        listen       80 default_server;
        server_name  _;

        # host.docker.internal is injected into /etc/hosts by the
        # `--add-host=host.docker.internal:host-gateway` flag in
        # scripts/native-up.sh, so nginx can resolve it at config-load
        # time.
        #
        # For the librarian upstreams (huggingface.co, pypi.org, etc.)
        # we use public DNS via this resolver so nginx resolves them
        # per-request from variable-form proxy_pass directives — same
        # pattern as docker/nginx/nginx.conf. This lets `nginx -t`
        # pass in ephemeral test containers and survives transient
        # DNS hiccups. Standalone containers on Docker Desktop get
        # internet DNS via /etc/resolv.conf, which forwards to the
        # host resolver; 1.1.1.1 + 8.8.8.8 are just explicit fallbacks
        # for the variable-resolution path.
        resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
        set $hf_api_upstream    "huggingface.co";
        set $hf_lfs_upstream    "cdn-lfs.huggingface.co";
        set $hf_xet_upstream    "cas-bridge.xethub.hf.co";
        set $pypi_upstream      "pypi.org";
        set $npm_upstream       "registry.npmjs.org";
        set $pytorch_upstream   "download.pytorch.org";
        set $ollama_dl_upstream "ollama.com";

        # Shared status directory — bind-mounted from the host repo at
        # scripts/splash/status/ (same dir the native splash uses).
        location /status/ {
            alias /remnant-status/;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
            expires -1;
            try_files $uri =404;
        }

        # Diagnostics dashboard — static HTML fan-out.
        location = /diagnostics {
            return 301 /diagnostics/;
        }
        location = /diagnostics/ {
            root /usr/share/nginx/html;
            try_files /diagnostics.html =404;
        }

        # Diagnostics log — shared append-only file.
        location = /diagnostics/log.txt {
            alias /remnant-status/diagnostics.log;
            default_type text/plain;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            expires -1;
            try_files $uri =204;
        }

        # Gateway liveness.
        location = /health {
            default_type application/json;
            add_header Cache-Control "no-store" always;
            return 200 '{"gateway":"ok","port":1580,"mode":"native"}';
        }

        # AI diagnostic snapshot keyhole — same path as docker.
        location = /diagnostics/ai.json {
            proxy_pass http://host.docker.internal:8700/ai.json;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;
            proxy_next_upstream error timeout;
        }

        # Action catalog + POST execute — same path as docker.
        location /diagnostics/actions {
            rewrite ^/diagnostics(/.*)$ $1 break;
            proxy_pass http://host.docker.internal:8700;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 1800s;
            proxy_send_timeout 1800s;
            proxy_next_upstream off;
        }

        # Service passthroughs used by the dashboard and curl pokes.
        location /api/flask-sd/ {
            proxy_pass http://host.docker.internal:5000/;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout;
        }
        location /api/ollama/ {
            proxy_pass http://host.docker.internal:11434/;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout;
        }

        # Static splash assets (bind-mounted from scripts/splash/).
        # The splash lives at /splash.html (NOT /), so ST can own the
        # root path. Owning root is what makes ST's absolute-path
        # imports (`import '/scripts/foo.js'`) resolve to the SAME URL
        # as relative imports that bake through the upstream `<base
        # href="/">` — which is the only way to avoid the ES module
        # URL-namespace split that causes the app to init twice and
        # leaves the "Initializing..." overlay stuck forever. Previous
        # versions tried to rewrite `<base>` to `/app/` via sub_filter,
        # but that only unified RELATIVE imports — absolute imports
        # stayed at `/scripts/` and every shared module got loaded
        # once from `/scripts/foo.js` and once from `/app/scripts/foo.js`,
        # running module top-level init twice. Hosting ST at root is
        # the structural fix; the sub_filter hack is gone.
        location = /splash.html { root /usr/share/nginx/html; }
        location = /splash.css  { root /usr/share/nginx/html; }
        location = /splash.js   { root /usr/share/nginx/html; }

        # Exact match for `/` — proxy to ST. Without this, `location = /`
        # wouldn't exist and requests to `/` would still hit `location /`
        # (catch-all), which also proxies to ST. The explicit exact
        # match is here for documentation/clarity — it's where the game
        # HTML shell is served from and the most common entry point.
        location = / {
            proxy_pass http://host.docker.internal:8000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Real-IP "";
            proxy_buffering off;
        }

        # ST's /csrf-token endpoint emits an ETag header with no
        # Cache-Control, so browsers cache it aggressively and serve
        # stale 304s from HTTP cache. csrf-sync reuses the same token
        # per session, so a stale cached body whose token was minted
        # against a prior session cookie causes silent CSRF 403s on
        # every subsequent POST (settings/save, tokenizers, worldinfo,
        # etc.). Forcing no-store here makes the browser always revalidate
        # and get a body whose token matches the current session.
        location = /csrf-token {
            proxy_pass http://host.docker.internal:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Real-IP "";
            proxy_hide_header ETag;
            proxy_hide_header Last-Modified;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            proxy_buffering off;
        }

        # Catch-all: proxy every path not claimed by a more-specific
        # location above to ST at root. ST is hosted at `/` (not under
        # `/app/`) specifically so that its absolute-path imports
        # (`import '/scripts/foo.js'`, CSS `@import url('/lib/...')`)
        # land at the same URL as its relative imports — any mismatch
        # causes ES modules to load twice and init to run twice. Every
        # non-remnant prefix (/status/, /diagnostics/, /hf/, /pypi/,
        # /npm/, /pytorch/, /ollama-dl/, /api/flask-sd/, /api/ollama/,
        # /splash.html, /splash.css, /splash.js, /socket.io/, /health,
        # /csrf-token) is a more-specific match and takes precedence,
        # so ST only sees its own paths.
        location / {
            proxy_pass http://host.docker.internal:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Real-IP "";
            proxy_buffering off;
        }

        # ST websocket / socket.io passthrough.
        location /socket.io/ {
            proxy_pass http://host.docker.internal:8000/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_buffering off;
        }

        # ---------------------------------------------------------------
        # Librarian locations — the single egress keyhole for native dev.
        #
        # Host-side package managers (hf_hub, pip, npm) are pointed at
        # these paths via scripts/native-env.sh, so every public-internet
        # fetch from the dev environment goes through this container.
        #
        # Upstreams use the `$xxx_upstream` variable form so nginx
        # resolves them per-request via the public `resolver` declared
        # above, matching the pattern in docker/nginx/nginx.conf.
        # ---------------------------------------------------------------

        # HuggingFace passthrough — no proxy_cache. hf_hub is the smart
        # client that handles the API+LFS+Xet redirect chain, checksums,
        # and resume semantics; it also caches on its own in the host's
        # ~/.cache/huggingface/hub. nginx's only job here is to be the
        # egress keyhole. proxy_redirect rewrites 302 Location headers
        # so the client's follow-up range requests for LFS/Xet-backed
        # weight files also land on this container.
        location /hf/ {
            rewrite ^/hf(/.*)$ $1 break;
            proxy_pass https://$hf_api_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $hf_api_upstream;
            # Rewrite Location headers so redirects loop back through
            # nginx. Most specific first (absolute CDN URLs), then the
            # self-referential absolute case, then a regex catch-all
            # for the RELATIVE Locations HF actually emits for its
            # canonical-model-id rewrites (e.g. bert-base-uncased ->
            # /api/models/google-bert/bert-base-uncased).
            proxy_redirect https://cdn-lfs.huggingface.co/ /hf-lfs/;
            proxy_redirect https://cas-bridge.xethub.hf.co/ /hf-xet/;
            proxy_redirect https://huggingface.co/ /hf/;
            proxy_redirect ~^(/.*)$ $scheme://$http_host/hf$1;
            proxy_read_timeout 600s;
            proxy_buffering off;
        }
        location /hf-lfs/ {
            rewrite ^/hf-lfs(/.*)$ $1 break;
            proxy_pass https://$hf_lfs_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $hf_lfs_upstream;
            proxy_read_timeout 600s;
            proxy_buffering off;
        }
        location /hf-xet/ {
            rewrite ^/hf-xet(/.*)$ $1 break;
            proxy_pass https://$hf_xet_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $hf_xet_upstream;
            proxy_read_timeout 600s;
            proxy_buffering off;
        }

        # PyPI simple index — pip wheels cache. Frozen-content caching
        # (365d + use_stale): wheels are immutable once published.
        location /pypi/ {
            rewrite ^/pypi(/.*)$ $1 break;
            proxy_pass https://$pypi_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $pypi_upstream;
            proxy_cache upstream_cache;
            proxy_cache_valid 200 206 365d;
            proxy_cache_use_stale updating error timeout;
            proxy_read_timeout 600s;
            proxy_buffering on;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        # npm registry — package tarballs cache.
        location /npm/ {
            rewrite ^/npm(/.*)$ $1 break;
            proxy_pass https://$npm_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $npm_upstream;
            proxy_cache upstream_cache;
            proxy_cache_valid 200 206 365d;
            proxy_cache_use_stale updating error timeout;
            proxy_read_timeout 600s;
            proxy_buffering on;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        # PyTorch wheels (including cuXXX GPU variants).
        location /pytorch/ {
            rewrite ^/pytorch(/.*)$ $1 break;
            proxy_pass https://$pytorch_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $pytorch_upstream;
            proxy_cache upstream_cache;
            proxy_cache_valid 200 206 365d;
            proxy_cache_use_stale updating error timeout;
            proxy_read_timeout 600s;
            proxy_buffering on;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        # Ollama.com static assets — install.sh + CUDA runner tarballs.
        # NOT the ollama model registry (registry.ollama.ai) — that's a
        # non-cacheable protocol and ollama talks to it directly. The
        # hybrid exception matches the docker stack's bootstrap-ollama.
        location /ollama-dl/ {
            rewrite ^/ollama-dl(/.*)$ $1 break;
            proxy_pass https://$ollama_dl_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $ollama_dl_upstream;
            proxy_cache upstream_cache;
            proxy_cache_valid 200 206 365d;
            proxy_cache_use_stale updating error timeout;
            proxy_read_timeout 600s;
            proxy_buffering on;
            add_header X-Cache-Status $upstream_cache_status always;
        }
    }
}
