# Remnant nginx — native dev config TEMPLATE.
#
# DO NOT use this file directly with nginx. It contains {{PLACEHOLDER}}
# tokens that scripts/native-up.sh substitutes before starting nginx.
# The resolved config is written to:
#   scripts/splash/status/.native-run/nginx.conf
#
# Placeholders:
#   {{NGINX_PORT}}         host port nginx listens on (default 1580)
#   {{ST_UPSTREAM}}        SillyTavern  host:port  (127.0.0.1:1581)
#   {{FLASK_SD_UPSTREAM}}  Flask SD     host:port  (127.0.0.1:5000)
#   {{OLLAMA_UPSTREAM}}    Ollama       host:port  (127.0.0.1:11434)
#   {{DIAG_UPSTREAM}}      Diag         host:port  (127.0.0.1:8700)
#   {{TTS_UPSTREAM}}       Kokoro TTS   host:port  (127.0.0.1:8880)
#   {{STT_UPSTREAM}}       Whisper STT  host:port  (127.0.0.1:9000)
#   {{SPLASH_ROOT}}        abs path to scripts/splash/  (nginx root for splash files)
#   {{DIAG_HTML_DIR}}      abs path to docker/nginx/    (nginx root for diagnostics.html)
#   {{GAME_HTML_DIR}}      abs path to web/             (nginx alias root for /game/)
#   {{STATUS_DIR}}         abs path to scripts/splash/status/
#   {{CACHE_DIR}}          abs path to dev-cache/nginx-cache/
#   {{MIME_TYPES}}         abs path to nginx's own mime.types
#   {{NGINX_PID_FILE}}     abs path for nginx.pid
#   {{NGINX_ERROR_LOG}}    abs path for nginx-error.log
#   {{NGINX_ACCESS_LOG}}   abs path for nginx-access.log
#
# Design parity with docker/nginx/nginx.conf:
#   /                       — SillyTavern (catch-all reverse proxy)
#   /api/flask-sd/          — Flask SD passthrough
#   /api/ollama/            — Ollama passthrough
#   /api/tts/               — Kokoro TTS passthrough
#   /api/stt/               — Whisper STT passthrough
#   /game/                  — v3.0 game UI (static)
#   /game/events            — SSE stream from diag sidecar
#   /diagnostics/           — diagnostics dashboard + diag sidecar
#   /status/                — shared status JSON dir (no-cache)
#   /splash.html            — boot splash
#   /health                 — gateway liveness
#   /hf/, /hf-lfs/, /hf-xet/ — HuggingFace librarian
#   /pypi/, /npm/, /pytorch/, /ollama-dl/ — package librarians

pid       {{NGINX_PID_FILE}};
error_log {{NGINX_ERROR_LOG}} warn;

worker_processes  1;
events { worker_connections 256; }

http {
    include       {{MIME_TYPES}};
    default_type  application/octet-stream;
    access_log    {{NGINX_ACCESS_LOG}};
    sendfile      on;
    keepalive_timeout  65;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    client_max_body_size 200m;

    proxy_cache_path {{CACHE_DIR}}
                     levels=1:2
                     keys_zone=upstream_cache:64m
                     max_size=10g
                     inactive=365d
                     use_temp_path=off;

    server {
        listen       {{NGINX_PORT}} default_server;
        server_name  _;

        # Public DNS for the librarian variable-form proxy_pass upstreams.
        resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
        set $hf_api_upstream    "huggingface.co";
        set $hf_lfs_upstream    "cdn-lfs.huggingface.co";
        set $hf_xet_upstream    "cas-bridge.xethub.hf.co";
        set $pypi_upstream      "pypi.org";
        set $npm_upstream       "registry.npmjs.org";
        set $pytorch_upstream   "download.pytorch.org";
        set $ollama_dl_upstream "ollama.com";

        # Shared status directory.
        location /status/ {
            alias {{STATUS_DIR}}/;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
            expires -1;
            try_files $uri =404;
        }

        # v3.0 game UI — static files from web/ directory.
        location = /game {
            return 301 /game/;
        }
        location /game/ {
            alias {{GAME_HTML_DIR}}/;
            try_files $uri $uri/ /game/index.html =404;
            add_header Cache-Control "no-store" always;
        }

        # SSE event stream for the game UI (long-lived, no buffering).
        location = /game/events {
            proxy_pass http://{{DIAG_UPSTREAM}}/events;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 5s;
            add_header Cache-Control "no-store" always;
            add_header X-Accel-Buffering "no" always;
        }

        # Diagnostics dashboard — static HTML fan-out.
        location = /diagnostics {
            return 301 /diagnostics/;
        }
        location = /diagnostics/ {
            root {{DIAG_HTML_DIR}};
            try_files /diagnostics.html =404;
        }

        # Diagnostics log — shared append-only file.
        location = /diagnostics/log.txt {
            alias {{STATUS_DIR}}/diagnostics.log;
            default_type text/plain;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            expires -1;
            try_files $uri =204;
        }

        # Gateway liveness.
        location = /health {
            default_type application/json;
            add_header Cache-Control "no-store" always;
            return 200 '{"gateway":"ok","port":{{NGINX_PORT}},"mode":"native"}';
        }

        # AI diagnostic snapshot keyhole.
        location = /diagnostics/ai.json {
            proxy_pass http://{{DIAG_UPSTREAM}}/ai.json;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;
            proxy_next_upstream error timeout;
        }

        # Action catalog + POST execute.
        location /diagnostics/actions {
            rewrite ^/diagnostics(/.*)$ $1 break;
            proxy_pass http://{{DIAG_UPSTREAM}};
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 1800s;
            proxy_send_timeout 1800s;
            proxy_next_upstream off;
        }

        # Narrator turn log — POSTed by extension each generation, polled by diagnostics page.
        location /diagnostics/narrator-turn {
            rewrite ^/diagnostics(/.*)$ $1 break;
            proxy_pass http://{{DIAG_UPSTREAM}};
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            proxy_next_upstream off;
        }
        location /diagnostics/narrator-turns {
            rewrite ^/diagnostics(/.*)$ $1 break;
            proxy_pass http://{{DIAG_UPSTREAM}};
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            proxy_next_upstream off;
        }

        # World graph state — GET returns accumulated entity JSON.
        location /diagnostics/world-state {
            rewrite ^/diagnostics(/.*)$ $1 break;
            proxy_pass http://{{DIAG_UPSTREAM}};
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            proxy_next_upstream off;
        }

        # Service passthroughs.
        location /api/flask-sd/ {
            proxy_pass http://{{FLASK_SD_UPSTREAM}}/;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout;
        }
        location /api/ollama/ {
            proxy_pass http://{{OLLAMA_UPSTREAM}}/;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout;
        }
        location /api/tts/ {
            proxy_pass http://{{TTS_UPSTREAM}}/;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
            proxy_next_upstream error timeout;
        }
        location /api/stt/ {
            proxy_pass http://{{STT_UPSTREAM}}/;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
            client_max_body_size 50m;
            proxy_next_upstream error timeout;
        }

        # Static splash assets.
        location = /splash.html { root {{SPLASH_ROOT}}; }
        location = /splash.css  { root {{SPLASH_ROOT}}; }
        location = /splash.js   { root {{SPLASH_ROOT}}; }

        # Exact-match root — proxy to ST.
        location = / {
            proxy_pass http://{{ST_UPSTREAM}}/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Real-IP "";
            proxy_buffering off;
        }

        # ST's /csrf-token — force no-store to prevent CSRF 403s.
        location = /csrf-token {
            proxy_pass http://{{ST_UPSTREAM}};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Real-IP "";
            proxy_hide_header ETag;
            proxy_hide_header Last-Modified;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            proxy_buffering off;
        }

        # ST websocket / socket.io passthrough.
        location /socket.io/ {
            proxy_pass http://{{ST_UPSTREAM}}/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_buffering off;
        }

        # Catch-all: everything else is ST.
        location / {
            proxy_pass http://{{ST_UPSTREAM}};
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Real-IP "";
            proxy_buffering off;
        }

        # ---------------------------------------------------------------
        # Librarian locations — single egress keyhole for native dev.
        # ---------------------------------------------------------------

        location /hf/ {
            rewrite ^/hf(/.*)$ $1 break;
            proxy_pass https://$hf_api_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $hf_api_upstream;
            proxy_redirect https://cdn-lfs.huggingface.co/ /hf-lfs/;
            proxy_redirect https://cas-bridge.xethub.hf.co/ /hf-xet/;
            proxy_redirect https://huggingface.co/ /hf/;
            proxy_redirect ~^(/.*)$ $scheme://$http_host/hf$1;
            proxy_read_timeout 600s;
            proxy_buffering off;
        }
        location /hf-lfs/ {
            rewrite ^/hf-lfs(/.*)$ $1 break;
            proxy_pass https://$hf_lfs_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $hf_lfs_upstream;
            proxy_read_timeout 600s;
            proxy_buffering off;
        }
        location /hf-xet/ {
            rewrite ^/hf-xet(/.*)$ $1 break;
            proxy_pass https://$hf_xet_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $hf_xet_upstream;
            proxy_read_timeout 600s;
            proxy_buffering off;
        }
        location /pypi/ {
            rewrite ^/pypi(/.*)$ $1 break;
            proxy_pass https://$pypi_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $pypi_upstream;
            proxy_cache upstream_cache;
            proxy_cache_valid 200 206 365d;
            proxy_cache_use_stale updating error timeout;
            proxy_read_timeout 600s;
            proxy_buffering on;
            add_header X-Cache-Status $upstream_cache_status always;
        }
        location /npm/ {
            rewrite ^/npm(/.*)$ $1 break;
            proxy_pass https://$npm_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $npm_upstream;
            proxy_cache upstream_cache;
            proxy_cache_valid 200 206 365d;
            proxy_cache_use_stale updating error timeout;
            proxy_read_timeout 600s;
            proxy_buffering on;
            add_header X-Cache-Status $upstream_cache_status always;
        }
        location /pytorch/ {
            rewrite ^/pytorch(/.*)$ $1 break;
            proxy_pass https://$pytorch_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $pytorch_upstream;
            proxy_cache upstream_cache;
            proxy_cache_valid 200 206 365d;
            proxy_cache_use_stale updating error timeout;
            proxy_read_timeout 600s;
            proxy_buffering on;
            add_header X-Cache-Status $upstream_cache_status always;
        }
        location /ollama-dl/ {
            rewrite ^/ollama-dl(/.*)$ $1 break;
            proxy_pass https://$ollama_dl_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $ollama_dl_upstream;
            proxy_cache upstream_cache;
            proxy_cache_valid 200 206 365d;
            proxy_cache_use_stale updating error timeout;
            proxy_read_timeout 600s;
            proxy_buffering on;
            add_header X-Cache-Status $upstream_cache_status always;
        }
    }
}
