# Remnant splash + gateway nginx config.
#
# Two lives:
#   1. Native dev test: served from repo at scripts/splash/, nginx root
#      points at this directory, upstreams disabled (use meta-refresh).
#   2. Docker (via docker/nginx/Dockerfile): same file, upstreams enabled
#      (flask-sd, ollama, sillytavern are on the compose network).
#
# Behaviour:
#   /              -> splash.html while any service is still downloading;
#                     proxied to sillytavern once remnant-status says ready.
#   /status/*.json -> served from the shared remnant-status volume so the
#                     splash page can poll per-service progress.
#   /splash/*      -> static splash assets (css, images).
#
# The "is ready" check is done client-side in splash.html: it polls the
# three status files and only navigates to "/" (which proxies to ST) when
# all three phases == "ready". This keeps nginx dumb.

worker_processes  1;
events { worker_connections 256; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # No caching of status JSON — we want fresh polls.
    map $uri $no_cache {
        default                 0;
        "~^/status/.*\.json$"   1;
    }

    # Upstreams are only reachable inside the compose network.
    # In native dev these names don't resolve; the upstream block is
    # commented so nginx still starts. Docker build uncomments it.
    #
    # upstream sillytavern_upstream { server sillytavern:8000; }

    server {
        listen       80 default_server;
        server_name  _;

        # Status JSON lives in a shared volume mounted read-only here
        # in Docker. In native dev it's the sibling ./status/ directory.
        location /status/ {
            alias /remnant-status/;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
            expires -1;
            # If a status file doesn't exist yet (service hasn't started
            # writing), return an empty "bootstrapping" shape so the
            # splash's fetch doesn't explode.
            try_files $uri =404;
        }

        # Static splash assets (css, js, images).
        location /splash/ {
            alias /usr/share/nginx/html/splash/;
            expires 1h;
        }

        # Root: serve splash.html unconditionally. The splash JS decides
        # when to redirect to "/app/" (which proxies to sillytavern).
        # A dumb reverse proxy without client-side gating could also
        # work, but then a user hitting "/" mid-download would see ST's
        # uninitialised UI. Client-side gating is friendlier.
        location = / {
            root /usr/share/nginx/html;
            try_files /splash.html =404;
        }

        # Proxied sillytavern passthrough. Once the splash decides all
        # services are ready it navigates here.
        #
        # DOCKER-ONLY: uncomment in docker/nginx/nginx.conf when porting.
        #
        # location /app/ {
        #     proxy_pass http://sillytavern_upstream/;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection "upgrade";
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_read_timeout 3600s;
        # }
    }
}
