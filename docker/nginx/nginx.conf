# Remnant nginx — Docker variant.
#
# Differs from scripts/splash/nginx.conf (the native dev copy) only in:
#   - Upstream `sillytavern` resolves via docker DNS on play-net.
#   - /status/ alias points at the shared remnant-status volume mount.
#   - /splash/* assets live under /usr/share/nginx/html/ (baked into image).
#
# Responsibilities:
#   - /            -> static splash.html while any service is still
#                     downloading; splash JS polls /status/*.json and
#                     navigates to /app/ once all three are "ready".
#   - /status/*    -> no-cache passthrough to the remnant-status volume.
#   - /app/        -> reverse proxy to sillytavern:1590 (play-net DNS).

worker_processes  1;
events { worker_connections 512; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # Bigger websocket timeouts for SillyTavern event-stream responses.
    # proxy_buffering is NOT set globally — it defaults to 'on', which
    # is what the upstream cache locations need. The SillyTavern proxy
    # locations below turn it off per-location for streaming responses.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # ST's POST /api/settings/save payload can be many MB once a user
    # has characters, chats, and extension state. Default 1m truncates
    # it with 413. Also covers character PNG uploads, background
    # uploads, and chat imports.
    client_max_body_size 200m;

    # ---------------------------------------------------------------
    # Upstream cache — nginx as the single caching librarian.
    #
    # Every byte the docker stack fetches from the internet goes
    # through nginx and is cached here. Bootstrap services talk to
    # /hf/, /pypi/, /pytorch/, /ollama-dl/ on nginx instead of the
    # real upstream hostnames. Cached content has effectively-
    # infinite validity (365d + use_stale) because models are frozen
    # — invalidation is a manual act (wipe the nginx-cache volume).
    #
    # 30 GB cap is enough for HF weights + pip torch wheels + ollama
    # libs with headroom. Bump if the stack grows.
    # ---------------------------------------------------------------
    proxy_cache_path /var/cache/nginx/upstream
                     levels=1:2
                     keys_zone=upstream_cache:64m
                     max_size=30g
                     inactive=365d
                     use_temp_path=off;

    server {
        listen       80 default_server;
        server_name  _;

        # Docker's embedded DNS. Resolving at request time (via
        # variables in proxy_pass below) is the only way to tolerate
        # the upstream container not existing yet when nginx starts,
        # AND to let `nginx -t` pass outside docker compose.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $flask_sd_upstream     "flask-sd:1592";
        set $ollama_upstream       "ollama:1593";
        set $diag_upstream         "diag:1591";
        set $flask_music_upstream  "flask-music:1596";
        set $tts_upstream          "tts:8880";
        set $stt_upstream          "stt:9000";

        # External upstream hostnames for the caching librarian
        # locations. Using variables (not literals) is what lets
        # `nginx -t` pass without DNS access — resolution happens
        # per-request via the `resolver` directive above, which
        # uses docker's embedded DNS (127.0.0.11) that forwards
        # external names to the host's configured resolver.
        #
        # HuggingFace hostnames — nginx reverse-proxies these as a
        # PASSTHROUGH (no proxy_cache). The huggingface_hub Python
        # client is HF's own repository manager and handles the
        # API+LFS+Xet redirect chain, checksums, and resume semantics
        # correctly; it also does its own on-disk caching in the
        # hf-cache volume. nginx's job here is purely to be the
        # single egress keyhole so no other container has direct
        # internet access. Caching would duplicate what hf_hub
        # already does and introduce bugs around presigned URL
        # signatures and backend migrations.
        set $hf_api_upstream      "huggingface.co";
        set $hf_lfs_upstream      "cdn-lfs.huggingface.co";
        set $hf_xet_upstream      "cas-bridge.xethub.hf.co";
        set $pypi_upstream        "pypi.org";
        set $npm_upstream         "registry.npmjs.org";
        set $pytorch_upstream     "download.pytorch.org";
        set $ollama_dl_upstream   "ollama.com";

        # Status JSON files live in a shared named volume mounted
        # read-only at /remnant-status. Bootstrap downloaders write
        # there; nginx serves from there.
        #
        # Missing files return {} (200) instead of 404. The diagnostics
        # dashboard's renderService() already handles the empty-object
        # case (shows "unknown" phase), and this avoids console.error
        # flood for services that have no bootstrap status writer (ST).
        location /status/ {
            alias /remnant-status/;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
            expires -1;
            try_files $uri @status_missing;
        }
        location @status_missing {
            default_type application/json;
            add_header Cache-Control "no-store" always;
            return 200 '{}';
        }

        # ---------------------------------------------------------------
        # Diagnostics surface (same port — 1582 is the ONLY exposed port).
        #
        # Design: the play-net is `internal: true` with no egress, but
        # nginx sits on both nets so it can proxy host:1582 to any
        # upstream inside play-net. This gives dev a single keyhole to
        # peek at service health without opening extra ports.
        # ---------------------------------------------------------------

        # v3.0 game UI — static files served from /usr/share/nginx/html/game/
        location = /game {
            return 301 /game/;
        }
        location /game/ {
            alias /usr/share/nginx/html/game/;
            try_files $uri $uri/ /game/index.html =404;
            add_header Cache-Control "no-store" always;
        }

        # SSE event stream for the game UI (long-lived, no buffering).
        location = /game/events {
            proxy_pass http://$diag_upstream/events;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 5s;
            add_header Cache-Control "no-store" always;
            add_header X-Accel-Buffering "no" always;
        }

        # Aggregated diagnostics dashboard — static HTML that fans out
        # on the client side to /status/*, /health, /api/*/healthcheck,
        # /diagnostics/log.txt.
        location = /diagnostics {
            return 301 /diagnostics/;
        }
        location = /diagnostics/ {
            root /usr/share/nginx/html;
            try_files /diagnostics.html =404;
        }

        # Shared append-only log written by all runtime/bootstrap
        # entrypoints (milestone lines + errors). Served raw so a
        # dev can `curl host:1582/diagnostics/log.txt` or tail it
        # in the dashboard.
        location = /diagnostics/log.txt {
            alias /remnant-status/diagnostics.log;
            default_type text/plain;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            expires -1;
            # Missing log file is fine on cold boot — return empty.
            try_files $uri =204;
        }

        # Single JSON aggregation of all service status files. The
        # dashboard hits this for a one-shot overview; it's also
        # scriptable for `curl | jq`.
        location = /health {
            default_type application/json;
            add_header Cache-Control "no-store" always;
            # nginx can't synthesize JSON from multiple files, so the
            # dashboard fetches /status/*.json in parallel instead.
            # This endpoint returns a minimal liveness probe only.
            return 200 '{"gateway":"ok","port":1582}';
        }

        # AI-friendly diagnostic snapshot + narrow remediation action
        # surface, served by the `diag` sidecar. Everything an agent
        # needs (or a dev curl'ing the container) goes through these
        # two keyholes, still on the single published port 1582.
        #
        #   GET  /diagnostics/ai.json        — rich state snapshot
        #   GET  /diagnostics/actions        — action catalog
        #   POST /diagnostics/actions/<id>   — execute allowlisted action
        #   POST /diagnostics/browser-health — report browser console counts
        location = /diagnostics/ai.json {
            proxy_pass http://$diag_upstream/ai.json;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;
            proxy_next_upstream error timeout;
        }
        location = /diagnostics/browser-health {
            rewrite ^/diagnostics(/.*)$ $1 break;
            proxy_pass http://$diag_upstream;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
            proxy_next_upstream error timeout;
        }
        location /diagnostics/actions {
            # Strip the /diagnostics prefix:
            #   /diagnostics/actions        -> /actions
            #   /diagnostics/actions/foo    -> /actions/foo
            # We can't put a URI on proxy_pass when the upstream is a
            # variable, so the rewrite has to produce the full path.
            rewrite ^/diagnostics(/.*)$ $1 break;
            proxy_pass http://$diag_upstream;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            # Long pulls (ollama.pull) can take many minutes.
            proxy_read_timeout 1800s;
            proxy_send_timeout 1800s;
            proxy_next_upstream off;
        }

        # Per-service log tails — plain-text, human and agent browsable.
        #   GET /diagnostics/logs/flask-sd      → last 100 lines of flask-sd activity
        #   GET /diagnostics/logs/ollama        → last 100 lines of ollama activity
        #   GET /diagnostics/logs/sillytavern   → last 100 lines of ST activity
        #   GET /diagnostics/logs/diag          → last 100 lines of sidecar activity
        location /diagnostics/logs/ {
            rewrite ^/diagnostics(/logs/.+)$ $1 break;
            proxy_pass http://$diag_upstream;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
            proxy_next_upstream error timeout;
        }

        # Player input relay — POSTed by /game/ UI, consumed by extension polling loop.
        location = /player-input {
            proxy_pass http://$diag_upstream/player-input;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 15s;
            add_header Cache-Control "no-store" always;
        }
        location = /pending-player-input {
            proxy_pass http://$diag_upstream/pending-player-input;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
            add_header Cache-Control "no-store" always;
        }

        # Permanence system — META command relay and canon log.
        location = /pending-reset {
            proxy_pass http://$diag_upstream/pending-reset;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
            add_header Cache-Control "no-store" always;
        }
        location = /pending-portrait {
            proxy_pass http://$diag_upstream/pending-portrait;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
            add_header Cache-Control "no-store" always;
        }
        location = /pending-player-context {
            proxy_pass http://$diag_upstream/pending-player-context;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
            add_header Cache-Control "no-store" always;
        }
        location = /scene-image {
            proxy_pass http://$diag_upstream/scene-image;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            add_header Cache-Control "no-store" always;
        }
        location = /system-metrics {
            proxy_pass http://$diag_upstream/system-metrics;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            add_header Cache-Control "no-store" always;
        }
        location = /activity {
            proxy_pass http://$diag_upstream/activity;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            add_header Cache-Control "no-store" always;
        }
        location = /sense-enrichment {
            proxy_pass http://$diag_upstream/sense-enrichment;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            add_header Cache-Control "no-store" always;
        }
        location = /narrator-turns {
            proxy_pass http://$diag_upstream/narrator-turns;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 5s;
            add_header Cache-Control "no-store" always;
        }
        location = /world-state {
            proxy_pass http://$diag_upstream/world-state;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 5s;
            add_header Cache-Control "no-store" always;
        }
        location = /forever {
            proxy_pass http://$diag_upstream/forever;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 5s;
            add_header Cache-Control "no-store" always;
        }
        location = /forever-portrait {
            proxy_pass http://$diag_upstream/forever-portrait;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 5s;
            add_header Cache-Control "no-store" always;
        }
        location = /reset {
            proxy_pass http://$diag_upstream/reset;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            add_header Cache-Control "no-store" always;
        }

        # Signature — composite SHA256 fingerprint of all content + logic files.
        # Use this to verify the docker build included everything correctly.
        location = /signature {
            proxy_pass http://$diag_upstream/signature;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            add_header Cache-Control "no-store" always;
        }

        # Bootstrap manifest — lists large model downloads + sentinel status.
        location = /bootstrap-manifest {
            proxy_pass http://$diag_upstream/bootstrap-manifest;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            add_header Cache-Control "no-store" always;
        }

        # Narrator turn log — POSTed by extension each generation, polled by dashboard.
        location /diagnostics/narrator-turn {
            rewrite ^/diagnostics(/.*)$ $1 break;
            proxy_pass http://$diag_upstream;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            proxy_next_upstream off;
        }
        location /diagnostics/narrator-turns {
            rewrite ^/diagnostics(/.*)$ $1 break;
            proxy_pass http://$diag_upstream;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            proxy_next_upstream off;
        }

        # World graph state — GET returns accumulated entity JSON.
        location /diagnostics/world-state {
            rewrite ^/diagnostics(/.*)$ $1 break;
            proxy_pass http://$diag_upstream;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            proxy_next_upstream off;
        }

        # Passthrough proxies to service HTTP APIs, used by the
        # diagnostics dashboard, by the image-generator extension
        # (POST /api/flask-sd/api/generate), and by `curl`-based dev
        # pokes. Variables force per-request DNS resolution via the
        # docker resolver.
        #
        # IMPORTANT: when proxy_pass contains a variable, nginx does
        # NOT perform the usual location-prefix stripping — a trailing
        # `/` in the proxy_pass URI is silently ignored and the full
        # request URI is *not* rewritten. The net effect previously
        # was that `POST /api/flask-sd/api/generate` arrived at Flask
        # as `POST /` (matched the GET-only root route, 405), and
        # `GET /api/ollama/api/tags` arrived at Ollama as `GET /`
        # (returns the "Ollama is running" stub, not the models list).
        # Fix: use an explicit `rewrite … break;` to strip the prefix
        # before the variable proxy_pass. Same pattern as the
        # /diagnostics/actions/ location above.
        location /api/flask-sd/ {
            rewrite ^/api/flask-sd/(.*)$ /$1 break;
            proxy_pass http://$flask_sd_upstream;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 120s;
            # Don't let a dead backend hang the dashboard forever.
            proxy_next_upstream error timeout;
        }
        location /api/ollama/ {
            rewrite ^/api/ollama/(.*)$ /$1 break;
            proxy_pass http://$ollama_upstream;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 120s;
            proxy_next_upstream error timeout;
        }
        location /api/tts/ {
            rewrite ^/api/tts/(.*)$ /$1 break;
            proxy_pass http://$tts_upstream;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
            proxy_next_upstream error timeout;
        }
        location /api/stt/ {
            rewrite ^/api/stt/(.*)$ /$1 break;
            proxy_pass http://$stt_upstream;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
            client_max_body_size 50m;
            proxy_next_upstream error timeout;
        }

        # Flask-Music — MusicGen ambient audio generation.
        # Timeouts: musicgen-small 8s clip takes ~30-40s on CPU, ~2-5s on GPU.
        # 360s gives headroom for cold model load + first GPU generation.
        location /api/music/ {
            rewrite ^/api/music/(.*)$ /$1 break;
            proxy_pass http://$flask_music_upstream;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 360s;
            add_header Cache-Control "no-store" always;
        }

        # Static splash assets (baked into the image). The splash lives
        # at /splash.html so ST can own `/`. Hosting ST at root is
        # critical — ST has a mix of absolute (`import '/scripts/x.js'`)
        # and relative (`import './scripts/y.js'`) imports, and ES
        # modules are keyed by their fully-resolved URL. If ST is at
        # /app/, the two forms resolve to different URLs, every shared
        # module loads twice, and init runs twice (leaving the
        # "Initializing..." overlay stuck forever). See matching
        # comment in scripts/native-nginx.conf for the full trace.
        location = /splash.html { root /usr/share/nginx/html; }
        location = /splash.css  { root /usr/share/nginx/html; }
        location = /splash.js   { root /usr/share/nginx/html; }

        # Root → game UI redirect. ST is still reachable at :1581 directly for dev.
        location = / {
            return 301 /game/;
        }

        # Root redirects to the game UI. SillyTavern has been removed;
        # all narrative logic runs directly in diag → Ollama.
        location = / {
            return 301 /game/;
        }

        location / {
            return 404;
        }

        # ---------------------------------------------------------------
        # Upstream cache locations — nginx as the single caching librarian.
        #
        # Bootstrap services fetch internet assets through these locations
        # instead of talking to upstream hostnames directly. nginx caches
        # every 2xx response (see proxy_cache_path in http block) with
        # effectively-infinite validity. First fetch is MISS + upstream
        # round-trip; every subsequent fetch is HIT served from local disk.
        #
        # Only nginx attaches to bootstrap-net; all other services stay
        # on the internal play-net. The /hf/ redirect rewrites keep the
        # HF 302-to-CDN dance entirely inside nginx.
        # ---------------------------------------------------------------

        # HuggingFace passthrough — nginx is the single egress keyhole,
        # hf_hub is the smart client that handles the protocol. No
        # proxy_cache: caching is the client's job via the hf-cache
        # volume. bootstrap-flask-sd has HF_ENDPOINT=http://nginx/hf
        # so all API calls land here; the proxy_redirect lines rewrite
        # 302 Location headers on /resolve/ responses so the client's
        # follow-up range requests for LFS/Xet-backed weight files
        # also come back to nginx (not direct to the HF CDNs).
        location /hf/ {
            rewrite ^/hf(/.*)$ $1 break;
            proxy_pass https://$hf_api_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $hf_api_upstream;
            # Rewrite Location headers so redirects loop back through
            # nginx. Most specific first (absolute CDN URLs), then the
            # self-referential absolute case, then a regex catch-all
            # for the RELATIVE Locations HF actually emits for its
            # canonical-model-id rewrites (e.g. bert-base-uncased ->
            # /api/models/google-bert/bert-base-uncased).
            proxy_redirect https://cdn-lfs.huggingface.co/ /hf-lfs/;
            proxy_redirect https://cas-bridge.xethub.hf.co/ /hf-xet/;
            proxy_redirect https://huggingface.co/ /hf/;
            proxy_redirect ~^(/.*)$ $scheme://$http_host/hf$1;
            proxy_read_timeout 600s;
            proxy_buffering off;
        }

        # HuggingFace classic LFS CDN — 302 target from /hf/ for
        # files stored in the old LFS backend. Passthrough only.
        location /hf-lfs/ {
            rewrite ^/hf-lfs(/.*)$ $1 break;
            proxy_pass https://$hf_lfs_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $hf_lfs_upstream;
            proxy_read_timeout 600s;
            proxy_buffering off;
        }

        # HuggingFace Xet CDN — 302 target from /hf/ for files stored
        # in the newer Xet-backed CAS system. Passthrough only.
        location /hf-xet/ {
            rewrite ^/hf-xet(/.*)$ $1 break;
            proxy_pass https://$hf_xet_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $hf_xet_upstream;
            proxy_read_timeout 600s;
            proxy_buffering off;
        }

        # PyPI simple index — forward-compat for the slimming work that
        # will move torch + diffusers + transformers to first-boot pip
        # install. Not used by current bootstrap code.
        location /pypi/ {
            rewrite ^/pypi(/.*)$ $1 break;
            proxy_pass https://$pypi_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $pypi_upstream;
            proxy_cache upstream_cache;
            proxy_cache_valid 200 206 365d;
            proxy_cache_use_stale updating error timeout;
            proxy_read_timeout 600s;
            proxy_buffering on;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        # npm registry — package tarballs cache. Mirrors the /pypi/
        # pattern; consumed by host-side `npm install` via
        # npm_config_registry=http://nginx/npm/ in scripts/native-env.sh,
        # and available for any docker Dockerfile that wants to pin
        # its node dependencies to the single egress keyhole.
        location /npm/ {
            rewrite ^/npm(/.*)$ $1 break;
            proxy_pass https://$npm_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $npm_upstream;
            proxy_cache upstream_cache;
            proxy_cache_valid 200 206 365d;
            proxy_cache_use_stale updating error timeout;
            proxy_read_timeout 600s;
            proxy_buffering on;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        # PyTorch wheels (including the cuXXX GPU variants). Forward-
        # compat for the slimming work.
        location /pytorch/ {
            rewrite ^/pytorch(/.*)$ $1 break;
            proxy_pass https://$pytorch_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $pytorch_upstream;
            proxy_cache upstream_cache;
            proxy_cache_valid 200 206 365d;
            proxy_cache_use_stale updating error timeout;
            proxy_read_timeout 600s;
            proxy_buffering on;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        # Ollama.com static assets — install.sh + CUDA runner tarballs
        # that future slimming work will fetch at first boot. NOT the
        # ollama model registry (registry.ollama.ai) — that's a non-
        # cacheable protocol and bootstrap-ollama keeps its own
        # bootstrap-net egress for those pulls.
        location /ollama-dl/ {
            rewrite ^/ollama-dl(/.*)$ $1 break;
            proxy_pass https://$ollama_dl_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host $ollama_dl_upstream;
            proxy_cache upstream_cache;
            proxy_cache_valid 200 206 365d;
            proxy_cache_use_stale updating error timeout;
            proxy_read_timeout 600s;
            proxy_buffering on;
            add_header X-Cache-Status $upstream_cache_status always;
        }
    }
}
