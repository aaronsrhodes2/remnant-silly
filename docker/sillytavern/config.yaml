# SillyTavern pre-seeded config for The Remnant Fortress stack.
# Keep this minimal — upstream defaults apply for anything not set here.

# Bind to all interfaces inside the container; docker compose publishes
# the port to the host.
listen: true
protocol:
  ipv4: true
  ipv6: false
port: 1590

# The stack is local-only and the only published port is on the host
# loopback (or LAN if the user chooses). ST 1.17+ refuses to listen on
# non-localhost without one of: whitelist, basic auth, or user accounts.
# Use the designed escape hatch for trusted-network deployments.
whitelistMode: true
whitelist:
  - 0.0.0.0/0
  - ::/0
securityOverride: true

# CRITICAL: enables the built-in /proxy/:url middleware that The Remnant
# extension uses to reach flask-sd without browser CORS.
enableCorsProxy: true

# No login — this is a local single-user stack.
basicAuthMode: false
enableUserAccounts: false

# No auto-updater inside a container.
autorun: false
